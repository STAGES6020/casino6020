// ── DECK UTILITIES ─────────────────────────────────────────

function createDeck() {
  const deck = [];
  for (const suit of SUITS) {
    for (const rank of RANKS) {
      deck.push({ rank, suit });
    }
  }
  return shuffleDeck(deck);
}

function shuffleDeck(deck) {
  const d = [...deck];
  for (let i = d.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [d[i], d[j]] = [d[j], d[i]];
  }
  return d;
}

// ── HAND EVALUATION ENGINE ─────────────────────────────────
// Evaluates best 5-card hand from 7 cards (2 hole + 5 community)

function evaluateHand(cards) {
  if (cards.length < 5) return { rank: -1, name: "Incomplete", kickers: [], cards: [] };

  // Generate all 5-card combinations from available cards
  const combos = getCombinations(cards, 5);
  let best = null;

  for (const combo of combos) {
    const result = evaluate5Cards(combo);
    if (!best || compareHandResult(result, best) > 0) {
      best = result;
    }
  }
  return best;
}

function getCombinations(arr, k) {
  if (k === 0) return [[]];
  if (arr.length === 0) return [];
  const [first, ...rest] = arr;
  const withFirst = getCombinations(rest, k - 1).map(c => [first, ...c]);
  const withoutFirst = getCombinations(rest, k);
  return [...withFirst, ...withoutFirst];
}

function evaluate5Cards(cards) {
  const values = cards.map(c => RANK_VALUES[c.rank]).sort((a, b) => b - a);
  const suits = cards.map(c => c.suit);
  const isFlush = suits.every(s => s === suits[0]);

  // Check for straight (including A-low: A,2,3,4,5)
  let isStraight = false;
  let straightHigh = 0;
  const uniqueVals = [...new Set(values)].sort((a, b) => b - a);
  if (uniqueVals.length === 5) {
    if (uniqueVals[0] - uniqueVals[4] === 4) {
      isStraight = true;
      straightHigh = uniqueVals[0];
    }
    // Wheel: A,2,3,4,5
    if (uniqueVals[0] === 14 && uniqueVals[1] === 5 && uniqueVals[2] === 4 && uniqueVals[3] === 3 && uniqueVals[4] === 2) {
      isStraight = true;
      straightHigh = 5; // 5-high straight
    }
  }

  // Count ranks
  const counts = {};
  for (const v of values) counts[v] = (counts[v] || 0) + 1;
  const groups = Object.entries(counts).map(([v, c]) => ({ value: parseInt(v), count: c }));
  groups.sort((a, b) => b.count - a.count || b.value - a.value);

  // Determine hand rank
  if (isFlush && isStraight && straightHigh === 14) {
    return { rank: HAND_RANKS.ROYAL_FLUSH, name: HAND_NAMES[9], kickers: [14], cards };
  }
  if (isFlush && isStraight) {
    return { rank: HAND_RANKS.STRAIGHT_FLUSH, name: HAND_NAMES[8], kickers: [straightHigh], cards };
  }
  if (groups[0].count === 4) {
    const quad = groups[0].value;
    const kicker = groups[1].value;
    return { rank: HAND_RANKS.FOUR_KIND, name: HAND_NAMES[7], kickers: [quad, kicker], cards };
  }
  if (groups[0].count === 3 && groups[1].count === 2) {
    return { rank: HAND_RANKS.FULL_HOUSE, name: HAND_NAMES[6], kickers: [groups[0].value, groups[1].value], cards };
  }
  if (isFlush) {
    return { rank: HAND_RANKS.FLUSH, name: HAND_NAMES[5], kickers: values, cards };
  }
  if (isStraight) {
    return { rank: HAND_RANKS.STRAIGHT, name: HAND_NAMES[4], kickers: [straightHigh], cards };
  }
  if (groups[0].count === 3) {
    const trips = groups[0].value;
    const kickers = groups.filter(g => g.count === 1).map(g => g.value).sort((a, b) => b - a);
    return { rank: HAND_RANKS.THREE_KIND, name: HAND_NAMES[3], kickers: [trips, ...kickers], cards };
  }
  if (groups[0].count === 2 && groups[1].count === 2) {
    const pairs = [groups[0].value, groups[1].value].sort((a, b) => b - a);
    const kicker = groups[2].value;
    return { rank: HAND_RANKS.TWO_PAIR, name: HAND_NAMES[2], kickers: [...pairs, kicker], cards };
  }
  if (groups[0].count === 2) {
    const pair = groups[0].value;
    const kickers = groups.filter(g => g.count === 1).map(g => g.value).sort((a, b) => b - a);
    return { rank: HAND_RANKS.ONE_PAIR, name: HAND_NAMES[1], kickers: [pair, ...kickers], cards };
  }
  return { rank: HAND_RANKS.HIGH_CARD, name: HAND_NAMES[0], kickers: values, cards };
}

function compareHandResult(a, b) {
  if (a.rank !== b.rank) return a.rank - b.rank;
  for (let i = 0; i < Math.min(a.kickers.length, b.kickers.length); i++) {
    if (a.kickers[i] !== b.kickers[i]) return a.kickers[i] - b.kickers[i];
  }
  return 0;
}

// ── POT CALCULATION ────────────────────────────────────────

function calculatePots(players) {
  // Build list of active players with their total bets
  const eligible = players
    .map((p, i) => ({ idx: i, totalBet: p.totalBet || 0, folded: p.folded, allIn: p.allIn }))
    .filter(p => p.totalBet > 0)
    .sort((a, b) => a.totalBet - b.totalBet);

  const pots = [];
  let prevBet = 0;

  for (let i = 0; i < eligible.length; i++) {
    const bet = eligible[i].totalBet;
    if (bet <= prevBet) continue;
    const contribution = bet - prevBet;
    const eligiblePlayers = eligible.filter(p => p.totalBet >= bet && !p.folded).map(p => p.idx);
    const allContributors = eligible.filter(p => p.totalBet >= bet).length;
    const potAmount = contribution * allContributors;

    if (pots.length > 0 && JSON.stringify(pots[pots.length - 1].eligible) === JSON.stringify(eligiblePlayers)) {
      pots[pots.length - 1].amount += potAmount;
    } else {
      pots.push({ amount: potAmount, eligible: eligiblePlayers });
    }
    prevBet = bet;
  }

  return pots;
}

// ── AI DECISION ENGINE ─────────────────────────────────────

function getHandStrength(holeCards, communityCards) {
  // Simple preflop hand strength (Chen formula approximation)
  if (communityCards.length === 0) {
    return getPreflopStrength(holeCards);
  }
  // Postflop: evaluate actual hand
  const allCards = [...holeCards, ...communityCards];
  const result = evaluateHand(allCards);
  // Normalize to 0-1 scale
  const baseStrength = result.rank / 9;
  const kickerBonus = (result.kickers[0] || 0) / 14 * 0.1;
  return Math.min(1, baseStrength + kickerBonus + 0.15); // +0.15 base for having SOME hand
}

function getPreflopStrength(cards) {
  const v1 = RANK_VALUES[cards[0].rank], v2 = RANK_VALUES[cards[1].rank];
  const high = Math.max(v1, v2), low = Math.min(v1, v2);
  const suited = cards[0].suit === cards[1].suit;
  const pair = v1 === v2;

  // Premium hands
  if (pair && high >= 12) return 0.95; // QQ+
  if (pair && high >= 10) return 0.85; // TT-JJ
  if (high === 14 && low >= 12 && suited) return 0.90; // AKs, AQs
  if (high === 14 && low >= 12) return 0.85; // AKo, AQo
  if (high === 14 && low >= 10 && suited) return 0.75; // AJs, ATs
  if (high === 13 && low >= 11 && suited) return 0.75; // KQs, KJs
  if (pair && high >= 7) return 0.70; // 77-99
  if (high === 14 && suited) return 0.65; // Axs
  if (high === 14 && low >= 8) return 0.60; // A8o+
  if (suited && high - low <= 2 && high >= 7) return 0.55; // suited connectors
  if (pair) return 0.55; // small pairs
  if (suited && high >= 10) return 0.50; // suited broadway
  if (high >= 11 && low >= 9) return 0.45; // broadway cards
  if (suited && high - low <= 3) return 0.40; // suited gappers
  if (high >= 10 && low >= 7) return 0.35; // middling cards
  return 0.20; // junk
}

// ── BOARD TEXTURE ANALYSIS ─────────────────────────────────

function analyzeBoardTexture(communityCards) {
  if (communityCards.length === 0) return { wet: false, paired: false, flushy: false, straighty: false, highCards: 0 };
  const suits = {};
  const values = communityCards.map(c => RANK_VALUES[c.rank]).sort((a, b) => b - a);
  for (const c of communityCards) suits[c.suit] = (suits[c.suit] || 0) + 1;
  const maxSuit = Math.max(...Object.values(suits));
  const uniqueVals = [...new Set(values)];
  const gaps = [];
  for (let i = 0; i < uniqueVals.length - 1; i++) gaps.push(uniqueVals[i] - uniqueVals[i + 1]);

  return {
    paired: uniqueVals.length < communityCards.length,
    flushy: maxSuit >= 3,
    flushDraw: maxSuit === 2 && communityCards.length <= 4,
    straighty: gaps.filter(g => g <= 2).length >= 2,
    highCards: values.filter(v => v >= 11).length,
    wet: maxSuit >= 3 || gaps.filter(g => g <= 2).length >= 2,
    monotone: maxSuit === communityCards.length && communityCards.length >= 3,
  };
}

function countOuts(holeCards, communityCards) {
  // Estimate drawing outs for flush and straight draws
  const allCards = [...holeCards, ...communityCards];
  let outs = 0;

  // Flush draw check
  const suitCounts = {};
  for (const c of allCards) suitCounts[c.suit] = (suitCounts[c.suit] || 0) + 1;
  for (const count of Object.values(suitCounts)) {
    if (count === 4) outs += 9; // flush draw = ~9 outs
  }

  // Open-ended straight draw check
  const values = [...new Set(allCards.map(c => RANK_VALUES[c.rank]))].sort((a, b) => a - b);
  for (let i = 0; i <= values.length - 4; i++) {
    if (values[i + 3] - values[i] === 3) {
      // 4 consecutive values = open-ended straight draw
      outs += 8;
      break;
    }
  }
  // Gutshot check
  for (let i = 0; i <= values.length - 4; i++) {
    if (values[i + 3] - values[i] === 4) {
      const missing = [];
      for (let v = values[i]; v <= values[i + 3]; v++) {
        if (!values.includes(v)) missing.push(v);
      }
      if (missing.length === 1) { outs += 4; break; }
    }
  }

  return Math.min(outs, 20); // cap at 20
}

// ── PROFESSIONAL AI DECISION ENGINE ────────────────────────
// Models professional poker player behavior with:
// - Proper preflop hand ranges by position
// - Pot odds and implied odds calculations
// - Board texture reading
// - C-bet and barrel strategy
// - Balanced bluffing frequencies
// - Stack-to-pot ratio awareness

function getAIDecision(player, gameState) {
  const { communityCards, pot, currentBet, minRaise, phase, bigBlind, numActivePlayers } = gameState;
  const toCall = currentBet - (player.currentBet || 0);
  const potOdds = toCall > 0 ? toCall / (pot + toCall) : 0;
  const spr = pot > 0 ? player.stack / pot : 100; // stack-to-pot ratio
  const bbStack = player.stack / bigBlind; // stack in big blinds
  const position = player.positionIndex || 3; // 0=BTN, 1=SB, 2=BB, higher=earlier
  const isLatePosition = position <= 2; // BTN, SB, BB (post-flop advantage for BTN)
  const personality = player.personality;

  // ── PREFLOP DECISIONS ──
  if (phase === PHASES.PREFLOP) {
    return getPreflopDecision(player, gameState, toCall, potOdds, bbStack, position, personality);
  }

  // ── POSTFLOP DECISIONS ──
  return getPostflopDecision(player, gameState, toCall, potOdds, spr, bbStack, position, personality);
}

function getPreflopDecision(player, gs, toCall, potOdds, bbStack, position, personality) {
  const { currentBet, minRaise, pot, bigBlind } = gs;
  const cards = player.holeCards;
  const v1 = RANK_VALUES[cards[0].rank], v2 = RANK_VALUES[cards[1].rank];
  const high = Math.max(v1, v2), low = Math.min(v1, v2);
  const suited = cards[0].suit === cards[1].suit;
  const pair = v1 === v2;
  const gap = high - low;
  const connected = gap <= 1;

  // Hand tier classification (professional ranges)
  let tier = 6; // junk
  if (pair && high >= 13) tier = 1; // AA, KK
  else if (pair && high === 12) tier = 1; // QQ
  else if (high === 14 && low === 13 && suited) tier = 1; // AKs
  else if (pair && high >= 10) tier = 2; // JJ, TT
  else if (high === 14 && low === 13) tier = 2; // AKo
  else if (high === 14 && low >= 12 && suited) tier = 2; // AQs
  else if (high === 13 && low === 12 && suited) tier = 2; // KQs
  else if (pair && high >= 7) tier = 3; // 77-99
  else if (high === 14 && low >= 10 && suited) tier = 3; // ATs-AJs
  else if (high === 14 && low >= 11) tier = 3; // AJo-AQo
  else if (high >= 12 && low >= 11 && suited) tier = 3; // KJs, QJs
  else if (suited && connected && high >= 8) tier = 3; // 89s-JTs
  else if (pair && high >= 4) tier = 4; // 44-66
  else if (high === 14 && suited) tier = 4; // Axs
  else if (high === 14 && low >= 8) tier = 4; // A8o-ATo
  else if (suited && connected && high >= 5) tier = 4; // 56s-78s
  else if (high >= 11 && low >= 10) tier = 4; // KTo, QTo, JTo
  else if (suited && gap <= 2 && high >= 7) tier = 5; // suited one-gappers
  else if (pair) tier = 5; // 22-33
  else if (high === 14) tier = 5; // Ax trash
  else if (suited && high >= 9) tier = 5;

  // Position-based opening ranges
  // EP (UTG): tiers 1-3
  // MP (HJ, CO): tiers 1-4
  // LP (BTN): tiers 1-5
  // Blinds defending: depends on action
  let maxTierToPlay;
  if (position >= 4) maxTierToPlay = 3; // EP: tight
  else if (position >= 2) maxTierToPlay = 4; // MP
  else if (position === 0) maxTierToPlay = 5; // BTN: widest
  else maxTierToPlay = 4; // Blinds

  // Personality adjustments — make these impactful
  if (personality === "maniac") maxTierToPlay += 2;
  else if (personality === "loose-aggressive") maxTierToPlay += 1.5;
  else if (personality === "loose-passive") maxTierToPlay += 1;
  if (personality === "tight-passive") maxTierToPlay -= 0.5;
  if (personality === "tight-aggressive") maxTierToPlay -= 0.25;

  const facingRaise = toCall > bigBlind;
  const facingThreeBet = currentBet > bigBlind * 6;
  const raiseIsSmall = toCall <= bigBlind * 3.5; // standard 2.5-3x open

  // Tighten against big 3-bets, but only slightly vs standard opens
  if (facingThreeBet) maxTierToPlay = Math.min(maxTierToPlay, 3);
  else if (facingRaise && !raiseIsSmall) maxTierToPlay -= 0.5;
  // Standard opens: don't tighten much — players should call with playable hands

  // Short stack adjustments (push/fold territory)
  if (bbStack <= 15 && tier <= 3) {
    return { action: "allin" };
  }
  if (bbStack <= 10 && tier <= 4) {
    return { action: "allin" };
  }

  // Fold junk
  if (tier > maxTierToPlay + 0.5) {
    if (toCall === 0) return { action: "check" }; // BB can check
    return { action: "fold" };
  }

  // Decide: raise, call, or 3-bet
  if (toCall === 0 || toCall === bigBlind) {
    // We're first to act or in the BB facing just the blind
    if (tier <= 2) {
      // Premium: raise for value
      const raiseSize = Math.max(minRaise, bigBlind * (2.5 + Math.random() * 1));
      return { action: "raise", amount: Math.min(Math.round(raiseSize), player.stack + player.currentBet) };
    }
    if (tier <= 4) {
      // Good hands: standard open
      const raiseSize = Math.max(minRaise, bigBlind * (2.2 + Math.random() * 0.6));
      return { action: "raise", amount: Math.min(Math.round(raiseSize), player.stack + player.currentBet) };
    }
    // Playable but marginal
    if (toCall === 0) return { action: "check" };
    return { action: "call" };
  }

  // Facing a raise
  if (tier <= 1) {
    // Premium: 3-bet or 4-bet
    const reraiseSize = Math.max(minRaise, currentBet * (2.5 + Math.random()));
    if (pair && high >= 13) {
      // AA/KK: sometimes slow-play (15% of time)
      if (Math.random() < 0.15) return { action: "call" };
    }
    return { action: "raise", amount: Math.min(Math.round(reraiseSize), player.stack + player.currentBet) };
  }
  if (tier <= 2) {
    // Strong: 3-bet some, call some
    if (Math.random() < (personality === "tight-aggressive" || personality === "loose-aggressive" ? 0.6 : 0.3)) {
      const reraiseSize = Math.max(minRaise, currentBet * (2.5 + Math.random() * 0.5));
      return { action: "raise", amount: Math.min(Math.round(reraiseSize), player.stack + player.currentBet) };
    }
    return { action: "call" };
  }
  if (tier <= maxTierToPlay) {
    // Playable hands: usually call standard raises
    if (toCall <= bigBlind * 4) {
      // Standard open or small raise — just call with playable hands
      if (suited && connected && personality !== "tight-passive" && Math.random() < 0.15) {
        const reraiseSize = Math.max(minRaise, currentBet * 2.5);
        return { action: "raise", amount: Math.min(Math.round(reraiseSize), player.stack + player.currentBet) };
      }
      return { action: "call" };
    }
    // Bigger raise: need better odds — set-mine pairs, suited connectors with position
    if (pair && toCall <= player.stack * 0.12) return { action: "call" };
    if (suited && connected && toCall <= player.stack * 0.08) return { action: "call" };
    if (toCall <= bbStack * 0.1 * bigBlind) return { action: "call" };
    // Occasional light 3-bet bluff
    if (suited && connected && personality !== "tight-passive" && Math.random() < 0.1) {
      const reraiseSize = Math.max(minRaise, currentBet * 2.5);
      return { action: "raise", amount: Math.min(Math.round(reraiseSize), player.stack + player.currentBet) };
    }
    return { action: "call" };
  }

  // Marginal hands just outside range: still defend blinds
  if (tier <= maxTierToPlay + 1 && position >= 3 && toCall <= bigBlind * 3) {
    // Blind defense with marginal hands vs standard open
    if (Math.random() < 0.45) return { action: "call" };
  }

  return { action: "fold" };
}

function getPostflopDecision(player, gs, toCall, potOdds, spr, bbStack, position, personality) {
  const { communityCards, pot, currentBet, minRaise, phase, bigBlind } = gs;
  const handResult = evaluateHand([...player.holeCards, ...communityCards]);
  const boardTexture = analyzeBoardTexture(communityCards);
  const outs = countOuts(player.holeCards, communityCards);
  const drawEquity = phase === PHASES.RIVER ? 0 : (outs / 47) * (phase === PHASES.FLOP ? 2 : 1);

  // Categorize made hand strength
  let handCategory;
  if (handResult.rank >= HAND_RANKS.STRAIGHT) handCategory = "monster"; // straight+
  else if (handResult.rank === HAND_RANKS.THREE_KIND) handCategory = "strong";
  else if (handResult.rank === HAND_RANKS.TWO_PAIR) handCategory = "strong";
  else if (handResult.rank === HAND_RANKS.ONE_PAIR) {
    // Distinguish top pair, middle pair, bottom pair
    const boardValues = communityCards.map(c => RANK_VALUES[c.rank]).sort((a, b) => b - a);
    const pairValue = handResult.kickers[0];
    if (pairValue >= boardValues[0]) handCategory = "top_pair";
    else if (boardValues.length >= 2 && pairValue >= boardValues[1]) handCategory = "middle_pair";
    else if (pairValue > Math.max(...communityCards.map(c => RANK_VALUES[c.rank]))) handCategory = "overpair";
    else handCategory = "weak_pair";
  }
  else handCategory = "nothing";

  // Check for draws
  const hasFlushDraw = outs >= 8;
  const hasStraightDraw = outs >= 4 && outs < 8;
  const hasCombosDraw = outs >= 12;
  const strongDraw = hasCombosDraw || (hasFlushDraw && hasStraightDraw);

  // ── Decision Logic ──
  const isAggressive = personality === "tight-aggressive" || personality === "loose-aggressive" || personality === "maniac";

  // --- Facing no bet (check or bet decision) ---
  if (toCall === 0) {
    // Monster hands: bet for value (sometimes slow-play)
    if (handCategory === "monster") {
      if (Math.random() < 0.2 && boardTexture.wet === false) {
        return { action: "check" }; // trap on dry boards
      }
      const betSize = calculateProBetSize(handCategory, pot, minRaise, player.stack, boardTexture, phase);
      return { action: "raise", amount: betSize };
    }

    // Strong hands: bet for value and protection
    if (handCategory === "strong" || handCategory === "overpair") {
      const betSize = calculateProBetSize(handCategory, pot, minRaise, player.stack, boardTexture, phase);
      return { action: "raise", amount: betSize };
    }

    // Top pair: bet for value, size based on board texture
    if (handCategory === "top_pair") {
      // Good kicker: bet
      if (handResult.kickers.length >= 2 && handResult.kickers[1] >= 10) {
        const betSize = calculateProBetSize(handCategory, pot, minRaise, player.stack, boardTexture, phase);
        return { action: "raise", amount: betSize };
      }
      // Weak kicker: bet smaller or check sometimes
      if (Math.random() < 0.4) return { action: "check" };
      const betSize = Math.max(minRaise, Math.round(pot * 0.33));
      return { action: "raise", amount: Math.min(betSize, player.stack + player.currentBet) };
    }

    // Strong draws: semi-bluff bet
    if (strongDraw && isAggressive) {
      const betSize = Math.max(minRaise, Math.round(pot * (0.5 + Math.random() * 0.25)));
      return { action: "raise", amount: Math.min(betSize, player.stack + player.currentBet) };
    }
    if (hasFlushDraw && Math.random() < (isAggressive ? 0.55 : 0.30)) {
      const betSize = Math.max(minRaise, Math.round(pot * (0.4 + Math.random() * 0.2)));
      return { action: "raise", amount: Math.min(betSize, player.stack + player.currentBet) };
    }

    // Middle pair: check mostly, occasional bet
    if (handCategory === "middle_pair" && Math.random() < 0.2) {
      const betSize = Math.max(minRaise, Math.round(pot * 0.33));
      return { action: "raise", amount: Math.min(betSize, player.stack + player.currentBet) };
    }

    // Bluffs: occasional c-bet/float with nothing
    if (handCategory === "nothing" && isAggressive && Math.random() < (phase === PHASES.FLOP ? 0.35 : 0.15)) {
      // More likely to bluff on dry boards
      if (!boardTexture.wet || Math.random() < 0.3) {
        const betSize = Math.max(minRaise, Math.round(pot * (0.33 + Math.random() * 0.17)));
        return { action: "raise", amount: Math.min(betSize, player.stack + player.currentBet) };
      }
    }

    return { action: "check" };
  }

  // --- Facing a bet ---
  const callAmount = Math.min(toCall, player.stack);
  const stackCommitment = callAmount / player.stack;

  // Monster: raise (slow-play less when facing action)
  if (handCategory === "monster") {
    if (Math.random() < 0.7 || boardTexture.wet) {
      const raiseSize = Math.max(minRaise, currentBet * (2 + Math.random() * 1.5));
      return { action: "raise", amount: Math.min(Math.round(raiseSize), player.stack + player.currentBet) };
    }
    return { action: "call" }; // slow-play trap
  }

  // Strong: raise or call depending on board
  if (handCategory === "strong" || handCategory === "overpair") {
    if (spr <= 3 || stackCommitment > 0.4) {
      // Committed: go all-in
      return { action: "allin" };
    }
    if (Math.random() < (isAggressive ? 0.5 : 0.3)) {
      const raiseSize = Math.max(minRaise, currentBet * (2 + Math.random()));
      return { action: "raise", amount: Math.min(Math.round(raiseSize), player.stack + player.currentBet) };
    }
    return { action: "call" };
  }

  // Top pair: call, sometimes raise
  if (handCategory === "top_pair") {
    if (stackCommitment > 0.5 && phase === PHASES.RIVER) {
      // Big river bet with just top pair — need a tough decision
      if (handResult.kickers.length >= 2 && handResult.kickers[1] >= 12) return { action: "call" };
      if (Math.random() < 0.4) return { action: "fold" };
      return { action: "call" };
    }
    if (potOdds <= 0.35) return { action: "call" };
    if (potOdds <= 0.45 && handResult.kickers[1] >= 10) return { action: "call" };
    return { action: "fold" };
  }

  // Draws: call if correct pot odds, semi-bluff raise sometimes
  if (hasFlushDraw || hasStraightDraw) {
    const effectiveOdds = drawEquity + (drawEquity * 0.3); // implied odds bonus
    if (effectiveOdds >= potOdds) {
      // Raise as semi-bluff sometimes
      if (strongDraw && isAggressive && Math.random() < 0.35) {
        const raiseSize = Math.max(minRaise, currentBet * 2.2);
        return { action: "raise", amount: Math.min(Math.round(raiseSize), player.stack + player.currentBet) };
      }
      return { action: "call" };
    }
    // Not getting correct odds but big draw — call anyway sometimes
    if (strongDraw && stackCommitment < 0.2) return { action: "call" };
    return { action: "fold" };
  }

  // Middle pair: call small bets, fold to big ones
  if (handCategory === "middle_pair" || handCategory === "weak_pair") {
    if (potOdds <= 0.25 && phase !== PHASES.RIVER) return { action: "call" };
    if (handCategory === "middle_pair" && potOdds <= 0.3) return { action: "call" };
    return { action: "fold" };
  }

  // Nothing: fold (occasional hero call on river)
  if (phase === PHASES.RIVER && potOdds <= 0.25 && Math.random() < 0.05) {
    return { action: "call" }; // rare hero call
  }
  return { action: "fold" };
}

function calculateProBetSize(handCategory, pot, minRaise, stack, boardTexture, phase) {
  let fraction;

  if (handCategory === "monster") {
    // Big value bets on wet boards, smaller on dry for balancing
    fraction = boardTexture.wet ? 0.7 + Math.random() * 0.3 : 0.5 + Math.random() * 0.2;
  } else if (handCategory === "strong" || handCategory === "overpair") {
    fraction = boardTexture.wet ? 0.6 + Math.random() * 0.2 : 0.45 + Math.random() * 0.15;
  } else if (handCategory === "top_pair") {
    // Smaller sizing with marginal hands
    fraction = 0.33 + Math.random() * 0.17;
  } else {
    // Bluffs: use same size as value bets for balance (GTO concept)
    fraction = 0.33 + Math.random() * 0.17;
  }

  // Later streets: larger bets
  if (phase === PHASES.TURN) fraction *= 1.1;
  if (phase === PHASES.RIVER) fraction *= 1.2;

  let amount = Math.max(minRaise, Math.round(pot * fraction));
  amount = Math.min(amount, stack + (minRaise - stack > 0 ? 0 : 0)); // don't bet more than stack
  amount = Math.min(amount, stack);
  return amount;
}

// ── CHIP STACK VISUAL ──────────────────────────────────────

function ChipStack({ amount, size = "normal" }) {
  if (amount <= 0) return null;
  const chipColors = [
    { min: 1000, bg: "linear-gradient(135deg, #ffd700, #daa520)", border: "#b8860b", inner: "#fff8dc" },
    { min: 500, bg: "linear-gradient(135deg, #9c27b0, #7b1fa2)", border: "#6a1b9a", inner: "#e1bee7" },
    { min: 100, bg: "linear-gradient(135deg, #1a1a2e, #2a2a4e)", border: "#444", inner: "#555" },
    { min: 25, bg: "linear-gradient(135deg, #2e7d32, #388e3c)", border: "#1b5e20", inner: "#a5d6a7" },
    { min: 5, bg: "linear-gradient(135deg, #c41e3a, #e53935)", border: "#8b0000", inner: "#ef9a9a" },
    { min: 1, bg: "linear-gradient(135deg, #eee, #ccc)", border: "#999", inner: "#fff" },
  ];
  const chipCount = Math.min(5, Math.max(1, Math.ceil(amount / 100)));
  const mainChip = chipColors.find(c => amount >= c.min) || chipColors[chipColors.length - 1];
  const sz = size === "small" ? 20 : 26;

  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 0 }}>
      <div style={{ position: "relative", width: sz + 4, height: chipCount * 4 + sz }}>
        {Array.from({ length: chipCount }).map((_, i) => (
          <div key={i} style={{
            position: "absolute", bottom: i * 4, left: 0,
            width: sz, height: sz, borderRadius: "50%",
            background: mainChip.bg, border: `2px solid ${mainChip.border}`,
            boxShadow: i === chipCount - 1 ? "0 2px 6px rgba(0,0,0,0.5)" : "0 1px 2px rgba(0,0,0,0.3)",
            display: "flex", alignItems: "center", justifyContent: "center",
          }}>
            {i === chipCount - 1 && (
              <div style={{
                width: sz * 0.55, height: sz * 0.55, borderRadius: "50%",
                border: `1px dashed ${mainChip.inner}`, opacity: 0.6,
              }} />
            )}
          </div>
        ))}
      </div>
      <span style={{
        color: "#ffd700", fontSize: size === "small" ? 12 : 14, fontWeight: "bold",
        textShadow: "0 1px 3px rgba(0,0,0,0.9)", marginTop: 2, whiteSpace: "nowrap",
      }}>${amount.toLocaleString()}</span>
    </div>
  );
}

  // ── Create Players ──
  const createPlayers = useCallback((numPlayers) => {
    const arr = [];

    arr.push({
      id: 0, name: playerName.trim() || "Player", isHuman: true, isAutoPlay: false,
      stack: settings.buyIn, startStack: settings.buyIn,
      holeCards: [], folded: false, allIn: false, sittingOut: false,

      personality: null,
      stats: { handsPlayed: 0, handsWon: 0, totalWinnings: 0, vpip: 0, pfr: 0 },
    });
    // AI players
    const shuffledNames = [...AI_NAMES].sort(() => Math.random() - 0.5);
    const shuffledPersonalities = [...AI_PERSONALITIES].sort(() => Math.random() - 0.5);
    for (let i = 1; i < numPlayers; i++) {
      arr.push({
        id: i, name: shuffledNames[i - 1] || `Player ${i + 1}`,
        isHuman: false, isAutoPlay: true,
        stack: settings.buyIn,
        startStack: settings.buyIn,
        holeCards: [], folded: false, allIn: false, sittingOut: false,
        currentBet: 0, totalBet: 0,
        personality: shuffledPersonalities[i % shuffledPersonalities.length],
        stats: { handsPlayed: 0, handsWon: 0, totalWinnings: 0, vpip: 0, pfr: 0 },
      });
    }
    return arr;
  }, [settings, playerName]);

  // ── Start Game ──
  const startGame = useCallback(() => {
    const p = createPlayers(settings.maxPlayers);
    setPlayers(p);
    setDealerIdx(Math.floor(Math.random() * p.length));
    setScreen("game");
    setPhase(PHASES.WAITING);
    setHandNumber(0);
    setMessage("Click 'Deal' to start the first hand!");
  }, [createPlayers, settings]);

  // ── Helper: next active player ──
  const getNextActivePlayer = useCallback((startIdx, ps) => {
    const n = ps.length;
    for (let i = 1; i <= n; i++) {
      const idx = (startIdx + i) % n;
      if (!ps[idx].folded && !ps[idx].allIn && !ps[idx].sittingOut && ps[idx].stack > 0) {

  }, []);

  // Find next player who is still in the game (has chips) — for blind assignment
  const getNextLivePlayer = useCallback((startIdx, ps) => {
    const n = ps.length;
    for (let i = 1; i <= n; i++) {
      const idx = (startIdx + i) % n;
      if (!ps[idx].sittingOut && ps[idx].stack > 0) return idx;

    return (startIdx + 1) % ps.length; // fallback

  const countActive = (ps) => ps.filter(p => !p.folded && !p.sittingOut).length;

  const countCanAct = (ps) => ps.filter(p => !p.folded && !p.allIn && !p.sittingOut).length;

  // ── DEALER BAY POSITION (top-center of table) ──
  const dealerBayPos = { left: 50, top: 14 };
  const deckPosition = { left: "52%", top: "16%" };

  // ── Trigger chip animation from a player's seat toward their bet position ──
  const triggerBetChipAnim = useCallback((seatIdx, amount) => {
    if (amount <= 0 || !seatPositions[seatIdx]) return;
    const id = chipAnimIdRef.current++;
    setChipAnimations(prev => [...prev, { id, seatIdx, amount }]);
    setTimeout(() => {
      setChipAnimations(prev => prev.filter(c => c.id !== id));
    }, 550);
  }, [seatPositions]);

  // ── Deal New Hand ──
  const dealNewHand = useCallback(() => {
    const newDeck = createDeck();
    const di = dealerIdxRef.current;
    const n = players.length;
    const sbIdx = getNextLivePlayer(di, players);
    const bbIdx = getNextLivePlayer(sbIdx, players);

    // Reset players (no hole cards yet — animation will "deliver" them)
    let np = players.map((p, i) => ({
      ...p, holeCards: [], folded: p.sittingOut || p.stack <= 0, allIn: false,
      currentBet: 0, totalBet: 0, positionIndex: ((i - di + n) % n), handResult: null,
    }));

    // Post blinds
    const sb = Math.min(settings.smallBlind, np[sbIdx].stack);
    np[sbIdx] = { ...np[sbIdx], currentBet: sb, totalBet: sb, stack: np[sbIdx].stack - sb, allIn: np[sbIdx].stack <= sb };
    const bb = Math.min(settings.bigBlind, np[bbIdx].stack);
    np[bbIdx] = { ...np[bbIdx], currentBet: bb, totalBet: bb, stack: np[bbIdx].stack - bb, allIn: np[bbIdx].stack <= bb };

    // Pre-deal hole cards (stored but NOT shown yet — animation reveals them)
    let d = [...newDeck];
    const preDealtCards = {};
    const activeSeats = [];
    for (let i = 0; i < np.length; i++) {
      if (!np[i].folded) {
        preDealtCards[i] = [d.pop(), d.pop()];
        activeSeats.push(i);
      }
    }

    const totalBlinds = sb + bb;
    const firstToAct = getNextActivePlayer(bbIdx, np);

    // Set up initial state
    setDeck(d);
    deckRef.current = d;
    setCommunityCards([]);
    communityCardsRef.current = [];
    setPot(totalBlinds);
    potRef.current = totalBlinds;
    setPots([]);
    setPlayers(np);
    playersRef.current = np;
    setPhase(PHASES.DEALING);
    phaseRef.current = PHASES.DEALING;
    setCurrentBet(settings.bigBlind);
    currentBetRef.current = settings.bigBlind;
    setMinRaise(settings.bigBlind * 2);
    minRaiseRef.current = settings.bigBlind * 2;
    setLastRaiserIdx(bbIdx);
    lastRaiserIdxRef.current = bbIdx;
    setHandNumber(prev => prev + 1);
    setShowdown(false);
    setWinners([]);
    setWinnerAnnouncement(null);
    setLastAction(null);
    setRaiseAmount(settings.bigBlind * 2);
    setBurnCards([]);
    setCommunityFlipping([]);
    setDealtSeatCards({});
    setFoldingPlayer(-1);
    setWinnerSweep(null);
    setShowdownRevealIdx(-1);

    setMessage(`Dealing hand #${handNumber + 1}...`);

    // ── Animated dealing sequence ──
    const dealOrder = [];
    for (const seatIdx of activeSeats) dealOrder.push({ seatIdx, cardIdx: 0 });
    for (const seatIdx of activeSeats) dealOrder.push({ seatIdx, cardIdx: 1 });

    const flyDuration = 450;

    const dealEntries = dealOrder.map((entry, i) => ({
      ...entry,
      startTime: Date.now() + i * 150,
      card: preDealtCards[entry.seatIdx][entry.cardIdx],
    }));

    let cardIndex = 0;
    const dealNextCard = () => {
      if (cardIndex >= dealEntries.length) {
        setDealingCards([]);
        setDealtSeatCards({});
        let finalPlayers = playersRef.current.map((p, i) => {
          if (preDealtCards[i]) return { ...p, holeCards: preDealtCards[i] };
          return p;
        });
        setPlayers(finalPlayers);
        playersRef.current = finalPlayers;
        setPhase(PHASES.PREFLOP);
        phaseRef.current = PHASES.PREFLOP;
        // Recompute firstToAct from finalPlayers to avoid stale closure index
        const actualFirstToAct = getNextActivePlayer(bbIdx, finalPlayers);
        setActivePlayerIdx(actualFirstToAct);
        activePlayerIdxRef.current = actualFirstToAct;
        setMessage(`Hand #${handNumber + 1} — ${np[sbIdx].name} posts SB $${sb}, ${np[bbIdx].name} posts BB $${bb}`);
        if (actualFirstToAct >= 0 && finalPlayers[actualFirstToAct] && !finalPlayers[actualFirstToAct].isHuman) {
          setTimeout(() => processAITurn(finalPlayers, actualFirstToAct, d, [], totalBlinds, settings.bigBlind, settings.bigBlind * 2, bbIdx), 800);
        }
        return;
      }
      const entry = dealEntries[cardIndex];
      setDealingCards([{ ...entry, flyId: cardIndex }]);
      setTimeout(() => {
        setDealtSeatCards(prev => {
          const updated = { ...prev };
          if (!updated[entry.seatIdx]) updated[entry.seatIdx] = [];
          updated[entry.seatIdx] = [...updated[entry.seatIdx], entry.card];
          return updated;
        });
        setDealingCards([]);
        cardIndex++;
        setTimeout(dealNextCard, 50);
      }, flyDuration);
    };
    dealNextCard();

  }, [players, dealerIdx, settings, handNumber, getNextActivePlayer, getNextLivePlayer]);

  // ── Process Action ──
  const processAction = useCallback((action, amount, ps, playerIdx, dk, cc, pt, cb, mr, lri) => {
    let np = ps.map(p => ({ ...p }));
    const p = np[playerIdx];
    let newPot = pt;
    let newCurrentBet = cb;
    let newMinRaise = mr;
    let newLastRaiser = lri;

    switch (action) {
      case "fold":
        p.folded = true;
        break;
      case "check":
        // Nothing to do
        break;
      case "call": {
        const toCall = Math.min(cb - p.currentBet, p.stack);
        p.stack -= toCall;
        p.currentBet += toCall;
        p.totalBet += toCall;
        newPot += toCall;
        if (p.stack === 0) p.allIn = true;
        break;
      }
      case "raise": {
        const raiseTotal = Math.min(amount, p.stack + p.currentBet);
        const toAdd = raiseTotal - p.currentBet;
        p.stack -= toAdd;
        p.currentBet = raiseTotal;
        p.totalBet += toAdd;
        newPot += toAdd;
        newCurrentBet = raiseTotal;
        newMinRaise = raiseTotal + (raiseTotal - cb); // minimum re-raise
        newLastRaiser = playerIdx;
        if (p.stack === 0) p.allIn = true;
        break;
      }
      case "allin": {
        const allInAmount = p.stack + p.currentBet;
        const toAdd = p.stack;
        p.stack = 0;
        p.currentBet = allInAmount;
        p.totalBet += toAdd;
        newPot += toAdd;
        p.allIn = true;
        if (allInAmount > cb) {
          newCurrentBet = allInAmount;
          newMinRaise = allInAmount + (allInAmount - cb);
          newLastRaiser = playerIdx;
        }
        break;
      }
    }

    np[playerIdx] = p;
    return { players: np, pot: newPot, currentBet: newCurrentBet, minRaise: newMinRaise, lastRaiserIdx: newLastRaiser };
  }, []);

  // ── Advance to Next Player or Next Phase ──
  const advanceAction = useCallback((ps, currentIdx, dk, cc, pt, cb, mr, lri) => {
    const n = ps.length;
    const active = countActive(ps);
    const canAct = countCanAct(ps);

    // Only one player left (everyone else folded)
    if (active <= 1) {
      // Award pot to last standing
      finishHand(ps, dk, cc, pt);
      return;
    }

    // If no one can act (all folded or all-in), advance phase
    if (canAct === 0) {
      advancePhase(ps, dk, cc, pt);
      return;
    }
    // If exactly 1 player can act, only advance if they've already matched the current bet
    // (otherwise they still need to call/fold in response to a raise or all-in)
    if (canAct === 1) {
      const remainingPlayer = ps.find(p => !p.folded && !p.allIn && !p.sittingOut);
      if (remainingPlayer && remainingPlayer.currentBet >= cb) {
        advancePhase(ps, dk, cc, pt);
        return;
      }
    }

    // Find next player who can act
    const nextIdx = getNextActivePlayer(currentIdx, ps);

    if (nextIdx < 0) {
      advancePhase(ps, dk, cc, pt);
      return;
    }

    // Check if betting round is complete:
    // Everyone who can act has matched the current bet (or checked when cb=0)
    const allMatched = ps.every(p => p.folded || p.allIn || p.sittingOut || p.currentBet === cb);

    // Round is done if: all bets matched AND we've returned to the last raiser
    // OR if the last raiser folded/is all-in and all remaining players have matched
    const lriCanAct = lri >= 0 && !ps[lri].folded && !ps[lri].allIn && !ps[lri].sittingOut;
    if (allMatched && (nextIdx === lri || !lriCanAct)) {
      advancePhase(ps, dk, cc, pt);
      return;
    }

    // Set next active player
    setActivePlayerIdx(nextIdx);
    activePlayerIdxRef.current = nextIdx;
    setPlayers(ps);
    playersRef.current = ps;
    setPot(pt);
    potRef.current = pt;
    setCurrentBet(cb);
    currentBetRef.current = cb;
    setMinRaise(mr);
    minRaiseRef.current = mr;
    setLastRaiserIdx(lri);
    lastRaiserIdxRef.current = lri;

    const np = ps[nextIdx];
    if (!np.isHuman) {
      setTimeout(() => processAITurn(ps, nextIdx, dk, cc, pt, cb, mr, lri), 600);
    } else {
      const toCall = cb - np.currentBet;
      setMessage(toCall > 0 ? `${np.name}: $${toCall} to call` : `${np.name}'s action`);
      setRaiseAmount(Math.max(mr, cb + settings.bigBlind));
    }
  }, [settings, getNextActivePlayer]);

  // ── Advance Phase (Flop/Turn/River/Showdown) ──
  const advancePhase = useCallback((ps, dk, cc, pt) => {
    // Trigger chip-to-pot animation for any players with current bets
    const bettingPlayers = ps.filter(p => p.currentBet > 0);
    if (bettingPlayers.length > 0) {
      const animations = bettingPlayers.map((p, idx) => {
        const pIdx = ps.indexOf(p);
        const chipPos = seatPositions[pIdx] ? getBetChipPos(pIdx) : null;
        return chipPos ? { id: Date.now() + idx, fromLeft: chipPos.left, fromTop: chipPos.top, amount: p.currentBet } : null;
      }).filter(Boolean);
      setChipsToPot(animations);
      setTimeout(() => setChipsToPot([]), 600);
    }

    let newDeck = [...dk];
    let newCC = [...cc];
    let newPhase;
    let np = ps.map(p => ({ ...p, currentBet: 0 }));
    const currentPhase = phaseRef.current;

    if (currentPhase === PHASES.PREFLOP) {
      const burnCard = newDeck.pop();
      setBurnCards(prev => [...prev, burnCard]);
      newCC = [newDeck.pop(), newDeck.pop(), newDeck.pop()];
      newPhase = PHASES.FLOP;
      setMessage("--- FLOP ---");
      setCommunityFlipping([0, 1, 2]);
      setTimeout(() => setCommunityFlipping([]), 1200);
    } else if (currentPhase === PHASES.FLOP) {
      const burnCard = newDeck.pop();
      setBurnCards(prev => [...prev, burnCard]);
      newCC = [...cc, newDeck.pop()];
      newPhase = PHASES.TURN;
      setMessage("--- TURN ---");
      setCommunityFlipping([cc.length]);
      setTimeout(() => setCommunityFlipping([]), 1000);
    } else if (currentPhase === PHASES.TURN) {
      const burnCard = newDeck.pop();
      setBurnCards(prev => [...prev, burnCard]);
      newCC = [...cc, newDeck.pop()];
      newPhase = PHASES.RIVER;
      setMessage("--- RIVER ---");
      setCommunityFlipping([cc.length]);
      setTimeout(() => setCommunityFlipping([]), 1000);
    } else {
      finishHand(np, newDeck, newCC, pt);
      return;
    }

    setDeck(newDeck);
    deckRef.current = newDeck;
    setCommunityCards(newCC);
    communityCardsRef.current = newCC;
    setPhase(newPhase);
    phaseRef.current = newPhase;
    setCurrentBet(0);
    currentBetRef.current = 0;
    setMinRaise(settings.bigBlind);
    minRaiseRef.current = settings.bigBlind;
    setPlayers(np);
    playersRef.current = np;
    setPot(pt);
    potRef.current = pt;

    // If only all-in players remain (no one can act), advance again
    const canAct = countCanAct(np);
    if (canAct <= 1) {
      setTimeout(() => advancePhase(np, newDeck, newCC, pt), 1200);
      return;
    }

    // Find first to act (left of dealer)
    const firstAct = getNextActivePlayer(dealerIdxRef.current, np);
    if (firstAct < 0) {
      setTimeout(() => advancePhase(np, newDeck, newCC, pt), 1200);
      return;
    }

    setActivePlayerIdx(firstAct);
    activePlayerIdxRef.current = firstAct;
    setLastRaiserIdx(firstAct); // will be overwritten by first raiser
    lastRaiserIdxRef.current = firstAct;

    if (!np[firstAct].isHuman) {
      setTimeout(() => processAITurn(np, firstAct, newDeck, newCC, pt, 0, settings.bigBlind, firstAct), 1000);
    } else {
      setRaiseAmount(settings.bigBlind);
    }
  }, [settings, getNextActivePlayer]);

  // ── Process AI Turn ──
  const processAITurn = useCallback((ps, idx, dk, cc, pt, cb, mr, lri) => {
    const player = ps[idx];
    if (player.folded || player.allIn || player.sittingOut) {
      advanceAction(ps, idx, dk, cc, pt, cb, mr, lri);
      return;
    }

    const decision = getAIDecision(player, {
      communityCards: cc,
      pot: pt,
      currentBet: cb,
      minRaise: mr,
      phase: phaseRef.current,
      bigBlind: settings.bigBlind,
      numActivePlayers: ps.filter(p => !p.folded && !p.sittingOut).length,
    });

    let action = decision.action;
    let amount = decision.amount || 0;

    // Validate action
    const toCall = cb - player.currentBet;
    if (action === "raise" && amount <= cb) {
      action = toCall > 0 ? "call" : "check";
    }
    if (action === "call" && toCall <= 0) {
      action = "check";
    }

    // Apply action
    const result = processAction(action, amount, ps, idx, dk, cc, pt, cb, mr, lri);

    // Display message and action indicator
    const callAmt = Math.min(toCall, player.stack);
    if (action === "fold") { setMessage(`${player.name} folds`); setLastAction({ playerIdx: idx, action: "FOLD", amount: 0 }); setFoldingPlayer(idx); setTimeout(() => setFoldingPlayer(-1), 500); }
    else if (action === "check") { setMessage(`${player.name} checks`); setLastAction({ playerIdx: idx, action: "CHECK", amount: 0 }); }
    else if (action === "call") { setMessage(`${player.name} calls $${callAmt}`); setLastAction({ playerIdx: idx, action: "CALL", amount: callAmt }); triggerBetChipAnim(idx, callAmt); }
    else if (action === "raise") { setMessage(`${player.name} raises to $${result.currentBet}`); setLastAction({ playerIdx: idx, action: "RAISE", amount: result.currentBet }); triggerBetChipAnim(idx, result.currentBet); }
    else if (action === "allin") { setMessage(`${player.name} goes ALL IN ($${player.stack + player.currentBet})`); setLastAction({ playerIdx: idx, action: "ALL IN", amount: player.stack + player.currentBet }); triggerBetChipAnim(idx, player.stack + player.currentBet); }

    setTimeout(() => advanceAction(result.players, idx, dk, cc, result.pot, result.currentBet, result.minRaise, result.lastRaiserIdx), 600);
  }, [settings, processAction, advanceAction]);

  // ── Finish Hand (Showdown or Solo Win) ──
  const finishHand = useCallback((ps, dk, cc, pt) => {
    const activePlayers = ps.filter(p => !p.folded && !p.sittingOut);

    // Deal remaining community cards if needed for showdown
    let finalCC = [...cc];
    let finalDeck = [...dk];
    if (activePlayers.length > 1) {
      while (finalCC.length < 5) {
        finalDeck.pop(); // burn
        finalCC.push(finalDeck.pop());
      }
      setCommunityCards(finalCC);
      communityCardsRef.current = finalCC;
    }

    let np = ps.map(p => ({ ...p }));
    const potList = calculatePots(np);
    const winnerList = [];

    if (activePlayers.length === 1) {
      // Solo winner (everyone else folded)
      const winner = activePlayers[0];
      const wIdx = np.findIndex(p => p.id === winner.id);
      np[wIdx].stack += pt;
      np[wIdx].stats.handsWon++;
      np[wIdx].stats.totalWinnings += pt - np[wIdx].totalBet;
      winnerList.push({ idx: wIdx, amount: pt, hand: null });
      setMessage(`${winner.name} wins $${pt}!`);
      setWinnerAnnouncement({ name: winner.name, handName: "All Folded", amount: pt, winnerIdx: wIdx });
      setWinnerSweep({ winnerIdx: wIdx });
      // Winner announcement plays for 4s, THEN pot sweeps to winner
      setTimeout(() => { setWinnerAnnouncement(null); setWinnerSweep(null); }, 4000);
      setTimeout(() => { setPotToWinner({ winnerIdx: wIdx, amount: pt }); }, 4200);
      setTimeout(() => { setPotToWinner(null); }, 6000);
    } else {
      // Showdown — evaluate hands
      const evaluations = activePlayers.map(p => {
        const allCards = [...p.holeCards, ...finalCC];
        const handResult = evaluateHand(allCards);
        const pIdx = np.findIndex(pp => pp.id === p.id);
        return { ...handResult, playerIdx: pIdx, player: p };
      });

      // Sequential showdown reveal
      let revealDelay = 0;
      evaluations.forEach((ev, i) => {
        setTimeout(() => setShowdownRevealIdx(i), revealDelay);
        revealDelay += 600;
      });

      // Award each pot
      let totalAwarded = 0;
      for (const potInfo of potList) {
        const eligible = evaluations.filter(e => potInfo.eligible.includes(e.playerIdx));
        if (eligible.length === 0) continue;

        eligible.sort((a, b) => compareHandResult(b, a));
        const bestRank = eligible[0].rank;
        const bestKickers = eligible[0].kickers;
        const tiedWinners = eligible.filter(e => e.rank === bestRank && JSON.stringify(e.kickers) === JSON.stringify(bestKickers));

        const share = Math.floor(potInfo.amount / tiedWinners.length);
        let remainder = potInfo.amount - share * tiedWinners.length;
        const contested = eligible.length > 1;

        for (const tw of tiedWinners) {
          const extra = remainder > 0 ? 1 : 0;
          remainder--;
          np[tw.playerIdx].stack += share + extra;
          if (contested) np[tw.playerIdx].stats.handsWon++;
          np[tw.playerIdx].stats.totalWinnings += share + extra - np[tw.playerIdx].totalBet;
          winnerList.push({ idx: tw.playerIdx, amount: share + extra, hand: tw, contested });
        }
        totalAwarded += potInfo.amount;
      }

      const contestedWinners = [...new Set(winnerList.filter(w => w.contested).map(w => w.idx))];
      const allWinnerIdxs = [...new Set(winnerList.map(w => w.idx))];
      const displayWinnerIdxs = contestedWinners.length > 0 ? contestedWinners : allWinnerIdxs;

      setTimeout(() => {
        if (displayWinnerIdxs.length === 1) {
          const wIdx = displayWinnerIdxs[0];
          const totalAmount = winnerList.filter(w => w.idx === wIdx).reduce((s, w) => s + w.amount, 0);
          const bestHand = winnerList.find(w => w.idx === wIdx && w.hand)?.hand?.name || "Best Hand";
          setMessage(`${np[wIdx].name} wins $${totalAmount} with ${bestHand}!`);
          setWinnerAnnouncement({ name: np[wIdx].name, handName: bestHand, amount: totalAmount, winnerIdx: wIdx });
          setWinnerSweep({ winnerIdx: wIdx });
          // Winner announcement plays for 5s, THEN pot sweeps to winner
          setTimeout(() => { setPotToWinner({ winnerIdx: wIdx, amount: totalAmount }); }, 5200);
          setTimeout(() => { setPotToWinner(null); }, 7000);
        } else {
          const winnerNames = displayWinnerIdxs.map(idx => np[idx].name);
          const bestHand = winnerList.find(w => w.hand)?.hand?.name || "Split";
          const totalWon = winnerList.reduce((s, w) => s + w.amount, 0);
          setMessage(`Split pot! ${winnerNames.join(" & ")} win!`);
          setWinnerAnnouncement({ name: winnerNames.join(" & "), handName: bestHand, amount: totalWon, winnerIdx: winnerList[0].idx });
          // Winner announcement plays for 5s, THEN pot sweeps to winner
          setTimeout(() => { setPotToWinner({ winnerIdx: displayWinnerIdxs[0], amount: totalWon }); }, 5200);
          setTimeout(() => { setPotToWinner(null); }, 7000);
        }
        setTimeout(() => { setWinnerAnnouncement(null); setWinnerSweep(null); setShowdownRevealIdx(-1); }, 5000);
      }, revealDelay);

      winnerList.forEach(w => { w.isContestedWinner = w.contested; });
      setShowdown(true);

      for (const ev of evaluations) {
        np[ev.playerIdx].handResult = ev;
      }
    }

    // Update stats
    np = np.map(p => ({
      ...p,
      stats: { ...p.stats, handsPlayed: p.stats.handsPlayed + (p.sittingOut ? 0 : 1) },
    }));

    setPlayers(np);
    playersRef.current = np;
    setWinners(winnerList);
    setPots(potList);
    setActivePlayerIdx(-1);

    // Delay HAND_OVER until pot sweep animation is fully complete
    // Solo winner (fold): announcement 4s + pot sweep starts 4.2s, ends 6s → show button at 6.5s
    // Showdown: revealDelay + pot sweep ends at 7s inside the setTimeout → total = revealDelay + 7500ms
    const revealTime = activePlayers.length === 1 ? 0 : (activePlayers.length * 600);
    const handOverDelay = activePlayers.length === 1 ? 6500 : (revealTime + 7500);
    setPhase(PHASES.SHOWDOWN);
    phaseRef.current = PHASES.SHOWDOWN;
    setTimeout(() => {
      setPhase(PHASES.HAND_OVER);
      phaseRef.current = PHASES.HAND_OVER;
    }, handOverDelay);

    // Check for game over — only one player with chips remaining
    const playersWithChips = np.filter(p => p.stack > 0);
    if (playersWithChips.length === 1) {
      const champion = playersWithChips[0];
      const champIdx = np.findIndex(p => p.id === champion.id);
      setTimeout(() => {
        setGameOver({
          winnerName: champion.name,
          winnerStack: champion.stack,
          isHuman: champion.isHuman,
          handsPlayed: champion.stats.handsPlayed,
          handsWon: champion.stats.handsWon,
          totalPlayers: np.length,
          allStats: np.map(p => ({ name: p.name, isHuman: p.isHuman, handsPlayed: p.stats.handsPlayed, handsWon: p.stats.handsWon, biggestPot: p.stats.biggestPot || 0, totalWinnings: p.stats.totalWinnings })),
        });
      }, 3000); // Delay so the last hand result is visible first
    }
  }, []);

  // ── Human Action Handlers ──
  const handleFold = useCallback(() => {
    const ps = playersRef.current;
    const idx = activePlayerIdxRef.current;
    const result = processAction("fold", 0, ps, idx, deckRef.current, communityCardsRef.current, potRef.current, currentBetRef.current, minRaiseRef.current, lastRaiserIdxRef.current);
    setMessage("You fold.");
    advanceAction(result.players, idx, deckRef.current, communityCardsRef.current, result.pot, result.currentBet, result.minRaise, result.lastRaiserIdx);
  }, [processAction, advanceAction]);

  const handleCheck = useCallback(() => {
    const ps = playersRef.current;
    const idx = activePlayerIdxRef.current;
    const result = processAction("check", 0, ps, idx, deckRef.current, communityCardsRef.current, potRef.current, currentBetRef.current, minRaiseRef.current, lastRaiserIdxRef.current);
    setMessage("You check.");
    advanceAction(result.players, idx, deckRef.current, communityCardsRef.current, result.pot, result.currentBet, result.minRaise, result.lastRaiserIdx);
  }, [processAction, advanceAction]);

  const handleCall = useCallback(() => {
    const ps = playersRef.current;
    const idx = activePlayerIdxRef.current;
    const toCall = currentBetRef.current - ps[idx].currentBet;
    const callAmt = Math.min(toCall, ps[idx].stack);
    triggerBetChipAnim(idx, callAmt);
    const result = processAction("call", 0, ps, idx, deckRef.current, communityCardsRef.current, potRef.current, currentBetRef.current, minRaiseRef.current, lastRaiserIdxRef.current);
    setMessage(`You call $${callAmt}.`);
    advanceAction(result.players, idx, deckRef.current, communityCardsRef.current, result.pot, result.currentBet, result.minRaise, result.lastRaiserIdx);
  }, [processAction, advanceAction, triggerBetChipAnim]);

  const handleRaise = useCallback((amount) => {
    const ps = playersRef.current;
    const idx = activePlayerIdxRef.current;

    const n = players.length;

    while (players[newDI].stack <= 0 && attempts < n) {

    const angleSpan = endAngle - startAngle;
    for (let i = 0; i < n; i++) {
      const t = n === 1 ? 0.5 : i / (n - 1);
      const angle = startAngle + t * angleSpan;
      const rx = 36, ry = 33;
      positions.push({
        left: 50 + rx * Math.sin(angle),

                <div style={{ position: "absolute", bottom: 6, left: 6, color: "#1a1a2e", fontSize: 16, opacity: 0.5 }}>♣</div>
                <div style={{ position: "absolute", bottom: 6, right: 6, color: "#c41e3a", fontSize: 16, opacity: 0.5 }}>♥</div>
                <div style={{
                  color: "#ffd700", fontSize: 12, fontWeight: "bold",
                  textTransform: "uppercase", letterSpacing: 6, marginBottom: 8,
                  textShadow: "0 0 12px rgba(255,215,0,0.6)",
                }}>★ Winner ★</div>
                <div style={{
                  color: "#fff", fontSize: 30, fontWeight: "900", marginBottom: 8,
                  textShadow: "0 3px 10px rgba(0,0,0,0.9), 0 0 20px rgba(255,255,255,0.1)",
                  fontFamily: "'Georgia', serif",
                }}>{winnerAnnouncement.name}</div>
                <div style={{
                  background: "linear-gradient(90deg, #64b5f6, #90caf9, #64b5f6)",
                  WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent",
                  fontSize: 22, fontWeight: "bold", marginBottom: 10,
                  filter: "drop-shadow(0 2px 4px rgba(100,181,246,0.3))",
                }}>{winnerAnnouncement.handName}</div>
                <div style={{
                  color: "#4caf50", fontSize: 26, fontWeight: "900",
                  textShadow: "0 0 14px rgba(76,175,80,0.5)",
                  fontFamily: "'Georgia', serif",
                }}>+${winnerAnnouncement.amount.toLocaleString()}</div>
              </div>
              {/* Arrow pointing to winner */}
              {seatPositions[winnerAnnouncement.winnerIdx] && (() => {
                const seat = seatPositions[winnerAnnouncement.winnerIdx];
                const dx = seat.left - 50, dy = seat.top - 50;
                const angle = Math.atan2(dy, dx) * (180 / Math.PI);
                return (
                  <div style={{
                    position: "absolute", left: "50%", top: "50%",
                    transform: `translate(-50%, -50%) rotate(${angle}deg)`,
                    width: 60, height: 4, marginTop: 0,
                    pointerEvents: "none",
                  }}>
                    <div style={{
                      position: "absolute", right: -8, top: -6,
                      width: 0, height: 0,
                      borderLeft: "14px solid #ffd700",
                      borderTop: "8px solid transparent",
                      borderBottom: "8px solid transparent",
                      filter: "drop-shadow(0 0 4px rgba(255,215,0,0.6))",
                    }} />
                  </div>
                );
              })()}
            </div>
          )}
        </div>

        {/* ═══ BET CHIPS ON TABLE (between seats and center) ═══ */}
        {players.map((p, i) => {
          if (p.currentBet <= 0) return null;
          const chipPos = getBetChipPos(i);
          return (
            <div key={`bet-${i}`} style={{
              position: "absolute", left: chipPos.left, top: chipPos.top,
              transform: "translate(-50%, -50%)", zIndex: 12,
              animation: "chipSlide 0.4s ease-out",
            }}>
              <ChipStack amount={p.currentBet} size="small" />
            </div>
          );
        })}

        {/* ═══ DEALING ANIMATION — single flying card from dealer bay to seat ═══ */}
        {dealingCards.map((entry) => {
          const seatPos = seatPositions[entry.seatIdx];
          if (!seatPos) return null;
          return (
            <div key={`deal-${entry.flyId}`} style={{
              position: "absolute",
              zIndex: 200,
              animation: `flyToSeat${entry.seatIdx}_${entry.cardIdx} 0.4s cubic-bezier(0.25, 0.1, 0.25, 1) forwards`,
              pointerEvents: "none",
            }}>
              <PokerCard card={null} faceDown={true} small={true}
                style={{ boxShadow: "0 8px 24px rgba(0,0,0,0.6)" }}
              />
            </div>
          );
        })}

        {/* ═══ BET ACTION CHIPS — flying from player seat to bet position ═══ */}
        {chipAnimations.map((anim) => {
          const seat = seatPositions[anim.seatIdx];
          if (!seat) return null;
          return (
            <div key={`betanim-${anim.id}`} style={{
              position: "absolute",
              left: `${seat.left}%`, top: `${seat.top}%`,
              transform: "translate(-50%, -50%)",
              zIndex: 100,
              animation: `betChipFly${anim.seatIdx} 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards`,
              pointerEvents: "none",
            }}>
              <ChipStack amount={anim.amount} size="small" />
            </div>
          );
        })}

        {/* ═══ CHIP-TO-POT ANIMATION ═══ */}
        {chipsToPot.map((chip) => (
          <div key={chip.id} style={{
            position: "absolute", left: chip.fromLeft, top: chip.fromTop,
            transform: "translate(-50%, -50%)",
            zIndex: 100,
            animation: "chipToPot 0.5s ease-in forwards",
            pointerEvents: "none",
          }}>
            <ChipStack amount={chip.amount} size="small" />
          </div>
        ))}

        {/* ═══ POT-TO-WINNER ANIMATION — chips sweep from center to winner ═══ */}
        {potToWinner && seatPositions[potToWinner.winnerIdx] && (
          <div style={{
            position: "absolute",
            left: "50%", top: "55%",
            zIndex: 150,
            animation: `potSweepToSeat${potToWinner.winnerIdx} 1.2s cubic-bezier(0.25, 0.1, 0.25, 1) forwards`,
            pointerEvents: "none",
          }}>
            <div style={{
              transform: "translate(-50%, -50%)",
              filter: "drop-shadow(0 0 12px rgba(255,215,0,0.6))",
            }}>
              <ChipStack amount={potToWinner.amount} size="small" />
            </div>
          </div>
        )}

        {/* ═══ PLAYER SEATS ═══ */}
        {players.map((p, i) => {
          const pos = seatPositions[i];
          if (!pos) return null;
          const isActive = i === activePlayerIdx;
          const isDealer = i === dealerIdx;
          const n = players.length;
          const sbIdx = getNextLivePlayer(dealerIdx, players);
          const bbIdx = getNextLivePlayer(sbIdx, players);
          const isSB = i === sbIdx && phase !== PHASES.WAITING;
          const isBB = i === bbIdx && phase !== PHASES.WAITING;
          const showCards = p.isHuman || (showdown && !p.folded) || phase === PHASES.HAND_OVER;
          const isWinner = winners.some(w => w.idx === i && (w.isContestedWinner || w.isContestedWinner === undefined));
          const hasAction = lastAction && lastAction.playerIdx === i;

          return (
            <div key={i} style={{
              position: "absolute",
              left: `${pos.left}%`, top: `${pos.top}%`,
              transform: "translate(-50%, -50%)",
              textAlign: "center", zIndex: isActive ? 10 : 5,
              transition: "all 0.3s ease",
            }}>
              {/* Dealer button */}
              {isDealer && (
                <div style={{ position: "absolute", top: -16, right: -12, zIndex: 20 }}>
                  <DealerButton />
                </div>
              )}

              {/* Action indicator floating badge */}
              {hasAction && lastAction.action !== "FOLD" && (
                <div style={{
                  position: "absolute", top: -28, left: "50%", transform: "translateX(-50%)",
                  background: lastAction.action === "RAISE" || lastAction.action === "ALL IN"
                    ? "linear-gradient(135deg, #ff9800, #e65100)"
                    : lastAction.action === "CALL"
                      ? "linear-gradient(135deg, #2196f3, #1565c0)"
                      : "linear-gradient(135deg, #4caf50, #2e7d32)",
                  color: "#fff", fontSize: 11, fontWeight: "bold",
                  padding: "2px 10px", borderRadius: 10, whiteSpace: "nowrap",
                  boxShadow: "0 2px 8px rgba(0,0,0,0.4)",
                  animation: "actionPop 0.3s ease-out", zIndex: 25,
                }}>
                  {lastAction.action}{lastAction.amount > 0 ? ` $${lastAction.amount}` : ""}
                </div>
              )}

              {/* Player card container */}
              <div style={{
                background: isWinner
                  ? "linear-gradient(135deg, rgba(76,175,80,0.3), rgba(0,40,0,0.5))"
                  : isActive
                    ? "linear-gradient(135deg, rgba(255,215,0,0.2), rgba(40,30,0,0.5))"
                    : p.folded
                      ? "rgba(0,0,0,0.65)"
                      : "linear-gradient(135deg, rgba(10,10,30,0.7), rgba(0,0,0,0.5))",
                borderRadius: 16, padding: "12px 16px",
                border: isActive ? "2px solid #ffd700" : isWinner ? "2px solid #4caf50" : "1px solid rgba(255,255,255,0.15)",
                boxShadow: isActive ? "0 0 25px rgba(255,215,0,0.4), 0 4px 16px rgba(0,0,0,0.5)"
                  : isWinner ? "0 0 25px rgba(76,175,80,0.4), 0 4px 16px rgba(0,0,0,0.5)"
                  : "0 6px 20px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05)",
                minWidth: 140,
                transition: "all 0.3s ease",
                position: "relative",
                animation: isActive ? "activeGlow 2s ease-in-out infinite" : "none",
                backdropFilter: "blur(4px)",
              }}>
                {/* FOLD overlay */}
                {p.folded && p.holeCards.length > 0 && (
                  <div style={{
                    position: "absolute", inset: 0, borderRadius: 16,
                    background: "rgba(0,0,0,0.6)",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    zIndex: 5, pointerEvents: "none",
                  }}>
                    <div style={{
                      padding: "4px 16px", borderRadius: 4,
                      border: "2px solid rgba(239,83,80,0.5)",
                      background: "rgba(239,83,80,0.15)",
                      transform: "rotate(-15deg)",
                    }}>
                      <span style={{
                        color: "#ef5350", fontSize: 20, fontWeight: "900",
                        textShadow: "0 2px 6px rgba(239,83,80,0.4)",
                        letterSpacing: 4, textTransform: "uppercase",
                      }}>FOLD</span>
                    </div>
                  </div>
                )}

                {/* Blind badges */}
                {(isSB || isBB) && phase !== PHASES.HAND_OVER && (
                  <div style={{ position: "absolute", top: -10, left: "50%", transform: "translateX(-50%)", zIndex: 15 }}>
                    <BlindBadge type={isSB ? "SB" : "BB"} />
                  </div>
                )}

                {/* Hole cards — with dealing animation support */}
                <div style={{ display: "flex", justifyContent: "center", marginBottom: 6, position: "relative", height: 86 }}>
                  {(() => {
                    const arrivedCards = dealtSeatCards[i] || [];
                    if (phase === PHASES.DEALING) {
                      return arrivedCards.length > 0 ? arrivedCards.map((card, ci) => (
                        <PokerCard key={ci} card={card} faceDown={true} small={true}
                          style={{
                            position: "absolute",
                            left: `calc(50% + ${(ci - 0.5) * 36}px - 29px)`,
                            top: 0, zIndex: ci,
                            transform: `rotate(${ci === 1 ? "4deg" : "-3deg"}) perspective(400px) rotateX(3deg)`,
                            animation: "cardLand 0.2s ease-out",
                          }}
                        />
                      )) : (
                        <div style={{ height: 82, display: "flex", alignItems: "center", color: "rgba(255,255,255,0.2)", fontSize: 12 }}></div>
                      );
                    }
                    return p.holeCards.length > 0 ? (
                      p.holeCards.map((card, ci) => (
                        <PokerCard key={ci} card={card} faceDown={!showCards} small={true}
                          highlight={showdown && p.handResult?.cards?.some(c => c.rank === card.rank && c.suit === card.suit)}
                          style={{
                            position: "absolute",
                            left: `calc(50% + ${(ci - 0.5) * 36}px - 29px)`,
                            top: 0, zIndex: ci,
                            transform: `rotate(${ci === 1 ? "4deg" : "-3deg"}) perspective(400px) rotateX(3deg)`,
                            transition: "transform 0.2s ease",
                          }}
                        />
                      ))
                    ) : (
                      <div style={{ height: 82, display: "flex", alignItems: "center", color: "rgba(255,255,255,0.2)", fontSize: 12 }}>
                        {phase === PHASES.WAITING ? "—" : ""}
                      </div>
                    );
                  })()}
                </div>

                {/* Player name */}
                <div style={{
                  color: isActive ? "#ffd700" : p.folded ? "#555" : "#fff",
                  fontSize: 16, fontWeight: "900", marginBottom: 4,
                  textShadow: isActive ? "0 0 10px rgba(255,215,0,0.4)" : "0 1px 3px rgba(0,0,0,0.6)",
                  letterSpacing: 0.5,
                }}>{p.name}</div>

                {/* Stack */}
                <div style={{
                  color: p.stack > 0 ? "#66ff66" : "#ef5350",
                  fontSize: 20, fontWeight: "900",
                  fontFamily: "'Georgia', serif",
                  textShadow: "0 1px 4px rgba(0,0,0,0.8), 0 0 8px rgba(102,255,102,0.15)",
                  letterSpacing: 0.5,
                }}>
                  ${p.stack.toLocaleString()}
                  {p.allIn && (
                    <span style={{
                      display: "inline-block", marginLeft: 6, fontSize: 11,
                      color: "#fff", background: "linear-gradient(135deg, #ff9800, #e65100)",
                      padding: "1px 8px", borderRadius: 8, fontWeight: "bold",
                      animation: "allInPulse 1.5s ease-in-out infinite",
                    }}>ALL IN</span>
                  )}
                </div>

                {/* Hand result at showdown */}
                {showdown && !p.folded && p.handResult && (
                  <div style={{
                    color: "#fff", fontSize: 12, fontWeight: "bold", marginTop: 4,
                    background: isWinner ? "linear-gradient(135deg, rgba(76,175,80,0.3), rgba(76,175,80,0.15))" : "rgba(100,181,246,0.15)",
                    borderRadius: 6, padding: "3px 8px",
                    border: isWinner ? "1px solid rgba(76,175,80,0.4)" : "1px solid rgba(100,181,246,0.2)",
                  }}>{p.handResult.name}</div>
                )}

                {/* Winner badge */}
                {isWinner && (
                  <div style={{
                    color: "#ffd700", fontSize: 14, fontWeight: "900", marginTop: 4,
                    textShadow: "0 0 10px rgba(255,215,0,0.6)",
                    animation: "winnerGlow 1.5s ease-in-out infinite",
                    letterSpacing: 2,
                  }}>★ WINNER ★</div>
                )}

                {/* Position label */}
                {phase !== PHASES.WAITING && phase !== PHASES.HAND_OVER && !isSB && !isBB && (
                  <div style={{
                    color: "#999", fontSize: 10, marginTop: 3,
                    background: "rgba(255,255,255,0.06)", borderRadius: 4, padding: "1px 6px",
                    display: "inline-block",
                  }}>{POSITIONS_6MAX[p.positionIndex] || ""}</div>
                )}

              </div>
            </div>
          );
        })}
      </div>

      {/* ── BOTTOM ACTION BAR ── */}
      <div style={{
        flexShrink: 0, padding: "12px 24px",
        background: "linear-gradient(180deg, rgba(0,0,0,0.4), rgba(0,0,0,0.6))",
        borderTop: "1px solid rgba(255,215,0,0.12)",
        textAlign: "center",
      }}>
        {phase === PHASES.WAITING && (
          <button onClick={dealNewHand} style={{
            padding: "14px 60px", fontSize: 20, fontWeight: "bold",
            background: "linear-gradient(135deg, #4caf50, #2e7d32)",
            color: "#fff", border: "2px solid rgba(255,255,255,0.15)", borderRadius: 12, cursor: "pointer",
            boxShadow: "0 6px 20px rgba(76,175,80,0.4), inset 0 1px 0 rgba(255,255,255,0.2)",
            letterSpacing: 2, textTransform: "uppercase",
          }}>Deal</button>
        )}

        {phase === PHASES.HAND_OVER && !gameOver && (
          <div style={{ display: "flex", gap: 12, justifyContent: "center" }}>
            <button onClick={startNextHand} style={{
              padding: "12px 40px", fontSize: 16, fontWeight: "bold",
              background: "linear-gradient(135deg, #4caf50, #2e7d32)",
              color: "#fff", border: "none", borderRadius: 10, cursor: "pointer",
              boxShadow: "0 4px 15px rgba(76,175,80,0.4)",
            }}>Next Hand</button>
          </div>
        )}

        {/* Human action buttons */}
        {isHumanTurn && humanActions.length > 0 && (
          <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 10, flexWrap: "wrap" }}>
            {humanActions.includes("fold") && (
              <button onClick={handleFold} style={{
                padding: "12px 30px", fontSize: 16, fontWeight: "bold",
                background: "linear-gradient(135deg, #ef5350, #c62828)",
                color: "#fff", border: "1px solid rgba(255,255,255,0.15)", borderRadius: 10, cursor: "pointer",
                boxShadow: "0 4px 12px rgba(239,83,80,0.3), inset 0 1px 0 rgba(255,255,255,0.15)",
                letterSpacing: 1, textTransform: "uppercase",
              }}>Fold</button>
            )}
            {humanActions.includes("check") && (
              <button onClick={handleCheck} style={{
                padding: "12px 30px", fontSize: 16, fontWeight: "bold",
                background: "linear-gradient(135deg, #4caf50, #2e7d32)",
                color: "#fff", border: "1px solid rgba(255,255,255,0.15)", borderRadius: 10, cursor: "pointer",
                boxShadow: "0 4px 12px rgba(76,175,80,0.3), inset 0 1px 0 rgba(255,255,255,0.15)",
                letterSpacing: 1, textTransform: "uppercase",
              }}>Check</button>
            )}
            {humanActions.includes("call") && (
              <button onClick={handleCall} style={{
                padding: "12px 30px", fontSize: 16, fontWeight: "bold",
                background: "linear-gradient(135deg, #2196f3, #1565c0)",
                color: "#fff", border: "1px solid rgba(255,255,255,0.15)", borderRadius: 10, cursor: "pointer",
                boxShadow: "0 4px 12px rgba(33,150,243,0.3), inset 0 1px 0 rgba(255,255,255,0.15)",
                letterSpacing: 1,
              }}>Call ${Math.min(toCall, players[activePlayerIdx]?.stack || 0)}</button>
            )}
            {humanActions.includes("raise") && (
              <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                <button onClick={() => setRaiseAmount(a => Math.max(minRaise, a - settings.bigBlind))}
                  style={{ width: 32, height: 32, borderRadius: "50%", border: "1px solid #888", background: "rgba(0,0,0,0.4)", color: "#fff", cursor: "pointer", fontSize: 18 }}>-</button>
                <button onClick={() => handleRaise(raiseAmount)} style={{
                  padding: "12px 24px", fontSize: 16, fontWeight: "bold",
                  background: "linear-gradient(135deg, #ff9800, #e65100)",
                  color: "#fff", border: "1px solid rgba(255,255,255,0.15)", borderRadius: 10, cursor: "pointer",
                  boxShadow: "0 4px 12px rgba(255,152,0,0.3), inset 0 1px 0 rgba(255,255,255,0.15)",
                  letterSpacing: 1,
                }}>Raise ${raiseAmount}</button>
                <button onClick={() => setRaiseAmount(a => Math.min(players[activePlayerIdx]?.stack + players[activePlayerIdx]?.currentBet, a + settings.bigBlind))}
                  style={{ width: 32, height: 32, borderRadius: "50%", border: "1px solid #888", background: "rgba(0,0,0,0.4)", color: "#fff", cursor: "pointer", fontSize: 18 }}>+</button>
                {/* Quick size buttons */}
                <div style={{ display: "flex", gap: 4 }}>
                  {[0.33, 0.5, 0.75, 1].map(frac => (
                    <button key={frac} onClick={() => setRaiseAmount(Math.max(minRaise, Math.round(pot * frac)))}
                      style={{
                        padding: "4px 8px", fontSize: 11, borderRadius: 4,
                        background: "rgba(255,255,255,0.1)", color: "#ccc",
                        border: "1px solid #555", cursor: "pointer",
                      }}>{frac === 1 ? "Pot" : `${Math.round(frac * 100)}%`}</button>
                  ))}
                </div>
              </div>
            )}
            {humanActions.includes("allin") && (
              <button onClick={handleAllIn} style={{
                padding: "12px 28px", fontSize: 16, fontWeight: "900",
                background: "linear-gradient(135deg, #9c27b0, #6a1b9a, #4a148c)",
                color: "#fff", border: "2px solid rgba(255,215,0,0.3)", borderRadius: 10, cursor: "pointer",
                boxShadow: "0 4px 16px rgba(156,39,176,0.4), 0 0 20px rgba(156,39,176,0.2), inset 0 1px 0 rgba(255,255,255,0.15)",
                letterSpacing: 2, textTransform: "uppercase",
                animation: "allInPulse 2s ease-in-out infinite",
              }}>ALL IN ${(players[activePlayerIdx]?.stack || 0) + (players[activePlayerIdx]?.currentBet || 0)}</button>
            )}
          </div>
        )}
      </div>

      {/* ── GAME OVER VICTORY SCREEN ── */}
      {gameOver && (
        <div style={{
          position: "fixed", top: 0, left: 0, right: 0, bottom: 0,
          background: "rgba(0,0,0,0.92)",
          display: "flex", alignItems: "center", justifyContent: "center",
          zIndex: 2000, animation: "victoryFadeIn 0.8s ease-out",
        }}>
          <div style={{
            textAlign: "center", maxWidth: 560, padding: 50,
            background: "radial-gradient(ellipse at center, rgba(255,215,0,0.08) 0%, transparent 70%)",
          }}>
            {/* Trophy / Crown */}
            <div style={{ fontSize: 80, marginBottom: 10, animation: "trophyBounce 1.5s ease-in-out infinite" }}>
              {"🏆"}
            </div>

            {/* Title */}
            <div style={{
              fontFamily: "'Rye', 'Georgia', serif",
              fontSize: 18, color: "#aaa", letterSpacing: 6, textTransform: "uppercase",
              marginBottom: 8,
            }}>Casino 6020</div>

            <div style={{
              fontFamily: "'Rye', 'Georgia', serif",
              fontSize: 42, color: "#ffd700", letterSpacing: 3,
              textShadow: "0 0 30px rgba(255,215,0,0.6), 0 0 60px rgba(255,215,0,0.3)",
              marginBottom: 6, animation: "winnerGlow 2s ease-in-out infinite",
            }}>CHAMPION</div>

            {/* Winner name */}
            <div style={{
              fontSize: 32, fontWeight: "bold",
              color: gameOver.isHuman ? "#4caf50" : "#ff9800",
              marginBottom: 20, letterSpacing: 2,
            }}>{gameOver.winnerName}</div>

            {/* Final stack */}
            <div style={{
              display: "inline-block", padding: "12px 36px", borderRadius: 12,
              background: "linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,215,0,0.05))",
              border: "2px solid rgba(255,215,0,0.4)", marginBottom: 30,
            }}>
              <div style={{ color: "#888", fontSize: 12, textTransform: "uppercase", letterSpacing: 2, marginBottom: 4 }}>Final Stack</div>
              <div style={{ color: "#ffd700", fontSize: 36, fontWeight: "bold" }}>${gameOver.winnerStack.toLocaleString()}</div>
            </div>

            {/* Stats summary */}
            <div style={{ display: "flex", justifyContent: "center", gap: 30, marginBottom: 36 }}>
              <div>
                <div style={{ color: "#888", fontSize: 11, textTransform: "uppercase", letterSpacing: 1 }}>Hands Played</div>
                <div style={{ color: "#fff", fontSize: 22, fontWeight: "bold" }}>{gameOver.handsPlayed}</div>
              </div>
              <div>
                <div style={{ color: "#888", fontSize: 11, textTransform: "uppercase", letterSpacing: 1 }}>Hands Won</div>
                <div style={{ color: "#4caf50", fontSize: 22, fontWeight: "bold" }}>{gameOver.handsWon}</div>
              </div>
              <div>
                <div style={{ color: "#888", fontSize: 11, textTransform: "uppercase", letterSpacing: 1 }}>Players Defeated</div>
                <div style={{ color: "#ff9800", fontSize: 22, fontWeight: "bold" }}>{gameOver.totalPlayers - 1}</div>
              </div>
            </div>

            {/* Elimination order */}
            <div style={{ marginBottom: 36, textAlign: "left", display: "inline-block" }}>
              <div style={{ color: "#888", fontSize: 12, textTransform: "uppercase", letterSpacing: 2, marginBottom: 10, textAlign: "center" }}>Final Standings</div>
              {[...gameOver.allStats]
                .sort((a, b) => {
                  if (a.name === gameOver.winnerName) return -1;
                  if (b.name === gameOver.winnerName) return 1;
                  return b.handsWon - a.handsWon;
                })
                .map((s, i) => (
                  <div key={i} style={{
                    display: "flex", alignItems: "center", gap: 12, padding: "6px 16px",
