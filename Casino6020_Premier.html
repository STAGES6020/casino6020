// 9x Side Bet: pays 9:1 if player's 2 cards + dealer upcard form same rank, same suit, or 3-card run
function checkNineXSideBet(playerCards, dealerUpcard) {
  if (!playerCards || playerCards.length < 2 || !dealerUpcard) return false;
  const three = [playerCards[0], playerCards[1], dealerUpcard];
  // Same rank (three of a kind)
  if (three[0].rank === three[1].rank && three[1].rank === three[2].rank) return true;
  // Same suit (flush)
  if (three[0].suit === three[1].suit && three[1].suit === three[2].suit) return true;
  // Three-card run (straight) regardless of suit — Ace is HIGH only (Q-K-A, not A-2-3)

  const vals = three.map(c => rankOrder[c.rank]).sort((a, b) => a - b);
  if (vals[1] - vals[0] === 1 && vals[2] - vals[1] === 1) return true;
  return false;
}

function createShoe(n) {
  const shoe = [];
  for (let d = 0; d < n; d++)

      for (const rank of RANKS)
        shoe.push({ suit, rank, value: RANK_VALUES[rank] });

}
function shuffleArray(a) {
  const b = [...a];
  const rnd = new Uint32Array(b.length);
  crypto.getRandomValues(rnd);
  for (let i = b.length - 1; i > 0; i--) {
    const j = rnd[i] % (i + 1);
    [b[i], b[j]] = [b[j], b[i]];
  }
  return b;
}
function handValue(cards) {
  let t = 0, a = 0;

  const edge = -0.005 + 0.005 * tc;

// ── FREE BET BLACKJACK STRATEGY ──
// Key differences: dealer 22 pushes (except vs blackjack), free doubles on hard 9-11,
// free splits on all pairs except 10s. Strategy is more aggressive on splits/doubles,
// but standing thresholds shift because dealer-22-push changes the math.
function getFreeBetAction(cards, dealerUp, settings, handIsSplit = false, numSplits = 0) {
  const total = handValue(cards);
  const soft = isSoft(cards);
  const pair = isPair(cards);
  const canSplit = pair && (
    (cards[0].rank === "A" && numSplits < settings.aceSplitLimit) ||
    (cards[0].rank !== "A" && numSplits < settings.maxSplits2to10)
  );
  const du = dealerUp === "A" ? 11 : RANK_VALUES[dealerUp] || parseInt(dealerUp);
  const canDouble = cards.length === 2 && (!handIsSplit || settings.doubleAfterSplit);
  const isFreeDouble = !soft && cards.length === 2 && total >= 9 && total <= 11;
  const isFreeSplit = pair && cards.length === 2 && RANK_VALUES[cards[0].rank] !== 10;

  // ── PAIRS ──
  // Free splits: always split everything except 10s and 5s
  // 5-5 = hard 10, better to free double than split
  if (canSplit && pair) {
    const pv = RANK_VALUES[cards[0].rank];
    if (cards[0].rank === "A") return "split";   // Always split Aces
    if (pv === 10) return "stand";                // Never split 10s
    if (pv === 5) return isFreeDouble ? "double" : "hit"; // Hard 10: free double > split
    // All other pairs: take the free split
    if (isFreeSplit) return "split";
    // Fallback if somehow not free (shouldn't happen): use standard logic
    if (pv === 9) return [2,3,4,5,6,8,9].includes(du) ? "split" : "stand";
    if (pv === 8) return "split";
    if (pv === 7) return du <= 7 ? "split" : "hit";
    if (pv === 6) return du >= 2 && du <= 6 ? "split" : "hit";
    if (pv === 4) return "hit";
    if (pv <= 3) return du <= 7 ? "split" : "hit";
  }

  // ── SOFT HANDS ──
  // Soft doubles are NOT free in Free Bet (only hard 9-11 are free doubles).
  // So soft strategy is actually more conservative on doubling.
  if (soft) {
    if (total >= 20) return "stand";
    if (total === 19) return "stand"; // No free double on soft, don't risk it
    if (total === 18) {
      // Double vs 5-6 only (narrower than standard's 3-6 since it costs real money)
      if (canDouble && du >= 5 && du <= 6) return "double";
      return du <= 8 ? "stand" : "hit";
    }
    if (total === 17) {
      if (canDouble && du >= 5 && du <= 6) return "double";
      return "hit";
    }
    if (total === 16) return canDouble && du === 6 ? "double" : "hit";
    // Soft 13-15: just hit (no profitable double since it's not free)
    return "hit";
  }

  // ── HARD HANDS ──
  // Free doubles on hard 9-11: always take them (it's free money)
  if (isFreeDouble) {
    if (total === 11) return "double"; // Always free double on 11
    if (total === 10) return "double"; // Always free double on 10
    if (total === 9) return "double";  // Always free double on 9
  }

  // Standing thresholds shift because dealer-22-pushes reduces value of standing
  if (total >= 17) return "stand";
  if (total === 16) return du <= 6 ? "stand" : "hit"; // No surrender in free bet
  if (total === 15) return du <= 6 ? "stand" : "hit";
  if (total === 14) return du <= 6 ? "stand" : "hit";
  if (total === 13) return du >= 3 && du <= 6 ? "stand" : "hit"; // Stand vs 3-6 only (hit vs 2)
  if (total === 12) return du >= 5 && du <= 6 ? "stand" : "hit"; // Stand vs 5-6 only (narrower than standard 4-5-6)
  return "hit";
}

    if (cards[0].rank === "A") return "split";
    if (pv === 10) return "stand";
    if (pv === 9) return [2,3,4,5,6,8,9].includes(du) ? "split" : "stand";
    if (pv === 8) return "split"; // Always split 8s
    if (pv === 7) return du <= 7 ? "split" : "hit"; // DD: same as standard
    if (pv === 6) {
      // DD change: split 6s vs 2-7 (standard only goes to 6)
      if (du >= 2 && du <= 7) return "split";
      return "hit";
    }
    if (pv === 5) return canDouble && du <= 9 ? "double" : "hit";
    if (pv === 4) return settings.doubleAfterSplit && (du === 5 || du === 6) ? "split" : "hit";
    if (pv <= 3) return du <= 7 ? "split" : "hit";
  }

  // ── SOFT HANDS ──
  if (soft) {
    if (total >= 20) return "stand";
    if (total === 19) {
      // DD change with H17: double vs 6
      if (canDouble && du === 6) return "double";
      return "stand";
    }
    if (total === 18) {
      // DD change: double vs 2-6 (standard only 3-6)
      if (canDouble && du >= 2 && du <= 6) return "double";
      return du <= 8 ? "stand" : "hit";
    }
    if (total === 17) {
      // DD change with H17: double vs 2-6 (standard only 3-6)
      if (canDouble && du >= 2 && du <= 6) return "double";
      return "hit";
    }
    if (total === 16 || total === 15) {
      // DD change: double vs 4-6 (standard same, but some compositions shift)
      if (canDouble && du >= 4 && du <= 6) return "double";
      return "hit";
    }
    if (total === 14) {
      // DD change: double vs 5-6 (same as standard)
      if (canDouble && du >= 5 && du <= 6) return "double";
      return "hit";
    }
    if (total === 13) {
      // DD change: double vs 5-6 (standard same)
      if (canDouble && du >= 5 && du <= 6) return "double";
      return "hit";
    }
    return "hit";
  }

  // ── HARD HANDS ──
  if (total >= 17) {
    if (total === 17 && canSurrender && h17 && du === 11) return "surrender";
    return "stand";
  }
  if (total === 16) {
    if (canSurrender && (du === 9 || du === 10 || du === 11)) return "surrender";
    return du <= 6 ? "stand" : "hit";
  }
  if (total === 15) {
    if (canSurrender && du === 10) return "surrender";
    if (canSurrender && h17 && du === 11) return "surrender";
    return du <= 6 ? "stand" : "hit";
  }
  if (total === 14 || total === 13) return du <= 6 ? "stand" : "hit";
  if (total === 12) return du >= 4 && du <= 6 ? "stand" : "hit";
  // DD change: double 11 vs Ace when dealer hits soft 17
  if (total === 11) {
    if (canDouble && (du <= 10 || (h17 && du === 11))) return "double";
    return "hit";
  }
  if (total === 10) return canDouble && du <= 9 ? "double" : "hit";
  if (total === 9) return canDouble && du >= 3 && du <= 6 ? "double" : "hit";
  // DD change: double hard 8 vs 5-6 (marginal, only with 2-deck)
  if (total === 8) return canDouble && (du === 5 || du === 6) ? "double" : "hit";
  return "hit";
}

// ── STRATEGY ROUTER — picks the right strategy based on game type ──
function getBasicAction(cards, dealerUp, settings, handIsSplit = false, numSplits = 0) {
  if (settings.gameType === "freeBet") return getFreeBetAction(cards, dealerUp, settings, handIsSplit, numSplits);
  if (settings.gameType === "doubleDeck") return getDoubleDeckAction(cards, dealerUp, settings, handIsSplit, numSplits);
  return getStandardAction(cards, dealerUp, settings, handIsSplit, numSplits);
}

function getCountAdjustedAction(cards, dealerUp, settings, tc, isSpl, nSpl) {
  let action = getBasicAction(cards, dealerUp, settings, isSpl, nSpl);
  const total = handValue(cards), soft = isSoft(cards);
  const du = dealerUp === "A" ? 11 : RANK_VALUES[dealerUp] || parseInt(dealerUp);
  if (!soft && !isPair(cards)) {
    if (total === 16 && du === 10 && tc >= 0) action = "stand";
    if (total === 15 && du === 10 && tc >= 4) action = "stand";
    if (total === 13 && du === 2 && tc < -1) action = "hit";
    if (total === 12 && du === 2 && tc >= 3) action = "stand";
    if (total === 12 && du === 3 && tc >= 2) action = "stand";
    if (total === 12 && du === 4 && tc < 0) action = "hit";
    if (total === 12 && du === 5 && tc < -2) action = "hit";
    if (total === 12 && du === 6 && tc < -1) action = "hit";
    if (total === 16 && du === 9 && tc >= 5) action = "stand";
    if (total === 10 && du === 10 && tc >= 4) action = "double";
    if (total === 10 && du === 11 && tc >= 4) action = "double";
    if (total === 9 && du === 2 && tc >= 1) action = "double";
    if (total === 9 && du === 7 && tc >= 3) action = "double";
    if (total === 11 && du === 11 && tc >= 1) action = "double";
  }
  if (isPair(cards) && RANK_VALUES[cards[0].rank] === 10) {
    if (du === 5 && tc >= 5) action = "split";
    if (du === 6 && tc >= 4) action = "split";
  }
  return action;
}

// ===================== AI PERSONALITY SYSTEM =====================
// Personality types: "textbook" (perfect basic strategy, no counting),
// "casual" (mostly basic strategy with common human deviations),
// "timid" (overly cautious, stands too early, avoids doubles/splits)
const AI_PERSONALITIES = ["textbook", "casual", "casual", "casual", "casual", "timid", "timid"];
function randomPersonality() {
  return AI_PERSONALITIES[Math.floor(Math.random() * AI_PERSONALITIES.length)];
}

function getCasualAction(cards, dealerUp, settings, isSpl, nSpl) {
  // Start with basic strategy, then apply common human deviations
  const action = getBasicAction(cards, dealerUp, settings, isSpl, nSpl);
  const total = handValue(cards);
  const soft = isSoft(cards);
  const pair = isPair(cards);
  const du = dealerUp === "A" ? 11 : RANK_VALUES[dealerUp] || parseInt(dealerUp);

  // Common deviation: stand on 16 vs 10/A (~60% of casual players do this)
  if (!soft && total === 16 && (du === 10 || du === 11) && Math.random() < 0.6) return "stand";
  // Stand on 15 vs 10 (~40%)
  if (!soft && total === 15 && du === 10 && Math.random() < 0.4) return "stand";
  // Hit 12 vs 4/5/6 (~25% don't trust standing on 12)
  if (!soft && total === 12 && du >= 4 && du <= 6 && Math.random() < 0.25) return "hit";
  // Never surrender (~70% of casual players don't use surrender)
  if (action === "surrender" && Math.random() < 0.7) return "hit";
  // Reluctant to double soft hands (~50% just hit instead) — but always take FREE doubles
  if (soft && action === "double" && !isFreeBetDouble(cards, settings) && Math.random() < 0.5) return "hit";
  // Reluctant to double 9 (~35% just hit) — but always take FREE doubles
  if (!soft && total === 9 && action === "double" && !isFreeBetDouble(cards, settings) && Math.random() < 0.35) return "hit";
  // Won't split 8s vs 10/A (~30% just hit instead) — but always take FREE splits
  if (pair && RANK_VALUES[cards[0].rank] === 8 && (du === 10 || du === 11) && !isFreeBetSplit(cards, settings) && Math.random() < 0.3) return "hit";
  // Won't split 6s even when they should (~40%) — but always take FREE splits
  if (pair && RANK_VALUES[cards[0].rank] === 6 && action === "split" && !isFreeBetSplit(cards, settings) && Math.random() < 0.4) return "hit";
  // Won't split 2s/3s (~25%) — but always take FREE splits
  if (pair && RANK_VALUES[cards[0].rank] <= 3 && action === "split" && !isFreeBetSplit(cards, settings) && Math.random() < 0.25) return "hit";
  return action;
}

function getTimidAction(cards, dealerUp, settings, isSpl, nSpl) {
  const action = getBasicAction(cards, dealerUp, settings, isSpl, nSpl);
  const total = handValue(cards);
  const soft = isSoft(cards);
  const pair = isPair(cards);
  const du = dealerUp === "A" ? 11 : RANK_VALUES[dealerUp] || parseInt(dealerUp);

  // Timid players stand on anything 15+ regardless of dealer
  if (!soft && total >= 15) return "stand";
  // Stand on 14 vs most upcards (~70%)
  if (!soft && total === 14 && Math.random() < 0.7) return "stand";
  // Stand on 13 vs low cards, hit vs high (~50% stand even vs high)
  if (!soft && total === 13 && du >= 7 && Math.random() < 0.5) return "stand";
  // Never surrender (don't even know it exists)
  if (action === "surrender") return "hit";
  // Rarely double (only on 11 vs weak dealer, ~40% of the time) — but ALWAYS take FREE doubles
  if (action === "double") {
    if (isFreeBetDouble(cards, settings)) return "double"; // Free doubles cost nothing — always take them
    if (total === 11 && du >= 2 && du <= 6 && Math.random() < 0.4) return "double";
    return "hit";
  }
  // Only split Aces and 8s, skip everything else — but ALWAYS take FREE splits
  if (action === "split") {
    if (isFreeBetSplit(cards, settings)) return "split"; // Free splits cost nothing — always take them
    if (cards[0].rank === "A" || RANK_VALUES[cards[0].rank] === 8) return "split";
    return total <= 11 ? "hit" : "stand";
  }
  // Soft hands: stand on soft 18+, hit everything else (no doubling)
  if (soft && total >= 18) return "stand";
  if (soft) return "hit";
  return action;
}

function getAIAction(personality, cards, dealerUp, settings, tc, isSpl, nSpl) {
  if (personality === "textbook") return getBasicAction(cards, dealerUp, settings, isSpl, nSpl);
  if (personality === "timid") return getTimidAction(cards, dealerUp, settings, isSpl, nSpl);
  return getCasualAction(cards, dealerUp, settings, isSpl, nSpl); // "casual" default
}

// ===================== AI BET SIZING BY PERSONALITY =====================
function getAIBetAmount(personality, settings, bankroll, consecWins = 0, consecLosses = 0, tc = 0) {
  const min = settings.tableMin;
  const max = Math.min(settings.tableMax, bankroll);
  if (max < min) return 0; // busted out

  if (personality === "textbook") {
    // Card counter: spreads bets with the true count
    if (tc >= 4) return Math.min(min * 6, max);
    if (tc >= 3) return Math.min(min * 4, max);
    if (tc >= 2) return Math.min(min * 3, max);
    if (tc >= 1) return Math.min(min * 2, max);
    return min; // Flat bet at low/negative counts
  }

  if (personality === "timid") {
    // Always table minimum. Occasionally min*2 on a hot streak
    if (consecWins >= 3 && Math.random() < 0.2) return Math.min(min * 2, max);
    return min;
  }

  // Casual: rides streaks, gets impulsive
  if (consecWins >= 3 && Math.random() < 0.5) return Math.min(min * 3, max); // "I'm hot!"
  if (consecWins >= 2 && Math.random() < 0.35) return Math.min(min * 2, max);
  if (consecLosses >= 3 && Math.random() < 0.3) return Math.min(min * 2, max); // chasing losses
  if (Math.random() < 0.08) return Math.min(min * 3, max); // random big bet for fun
  if (Math.random() < 0.15) return Math.min(min * 2, max); // slightly above min sometimes
  return min;
}

// Override toLocaleString so fractional amounts show .50 not .5
// Whole numbers behave normally; cents get exactly 2 decimal places
const _origToLocaleString = Number.prototype.toLocaleString;
Number.prototype.toLocaleString = function(...args) {
  if (args.length === 0 && this % 1 !== 0) {
    return _origToLocaleString.call(this, undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  return _origToLocaleString.call(this, ...args);
};

// ===================== CHIP BREAKDOWN =====================
const CHIP_DEFS = [
  { value: 500, bg: "#7B2D8B", border: "#5a1a6a", text: "#fff" },  // purple
  { value: 100, bg: "#1a1a1a", border: "#555", text: "#fff" },      // black
  { value: 25, bg: "#0a6e1e", border: "#064a12", text: "#fff" },    // green
  { value: 5, bg: "#cc1111", border: "#8b0000", text: "#fff" },     // red
  { value: 2.5, bg: "#e75480", border: "#b03060", text: "#fff" },   // pink ($2.50)
  { value: 1, bg: "#eaeaea", border: "#999", text: "#333" },        // white
];

function chipBreakdown(amount) {
  // Use cents internally to avoid floating-point issues
  let rem = Math.max(0, Math.round(amount * 100));
  const result = [];
  for (const d of CHIP_DEFS) {
    const valCents = Math.round(d.value * 100);
    const count = Math.floor(rem / valCents);
    if (count > 0) result.push({ ...d, count });
    rem %= valCents;
  }
  return result;
}

function SingleChip({ color, border, text, label, size, isTop, edgeStripe }) {
  const w = size;
  const faceH = Math.round(size * 0.85);
  const sc = edgeStripe || "#fff"; // stripe color
  const sw = Math.max(2, Math.round(w * 0.10)); // stripe width
  const sh = Math.max(3, Math.round(faceH * 0.22)); // stripe height
  return (
    <div style={{ position: "relative", width: w, height: faceH + 2 }}>
      <div style={{
        width: w, height: faceH,
        borderRadius: "50%",
        background: `radial-gradient(ellipse at 45% 40%, ${lighten(color, 25)}, ${color} 55%, ${darken(color, 20)})`,
        border: `1.5px solid ${darken(color, 30)}`,
        borderBottom: `3px solid ${darken(color, 40)}`,
        boxShadow: isTop
          ? `0 2px 4px rgba(0,0,0,0.6), inset 0 1px 3px rgba(255,255,255,0.15)`
          : `0 1px 2px rgba(0,0,0,0.4), inset 0 1px 2px rgba(255,255,255,0.1)`,
        display: "flex", alignItems: "center", justifyContent: "center",
        overflow: "hidden", position: "relative",
      }}>
        {/* Edge stripes — 4 rectangular blocks at N/S/E/W */}
        <div style={{ position:"absolute", top:0, left:"50%", transform:"translateX(-50%)", width:sw, height:sh, background:sc, opacity:0.7 }} />
        <div style={{ position:"absolute", bottom:0, left:"50%", transform:"translateX(-50%)", width:sw, height:sh, background:sc, opacity:0.7 }} />
        <div style={{ position:"absolute", left:0, top:"50%", transform:"translateY(-50%)", width:sh, height:sw, background:sc, opacity:0.7 }} />
        <div style={{ position:"absolute", right:0, top:"50%", transform:"translateY(-50%)", width:sh, height:sw, background:sc, opacity:0.7 }} />
        {/* Inner rings */}
        <div style={{
          width: w * 0.76, height: faceH * 0.76, borderRadius: "50%",
          border: `1.5px solid rgba(255,255,255,0.25)`,
          display: "flex", alignItems: "center", justifyContent: "center",
          position: "relative", zIndex: 1,
        }}>
          <div style={{
            width: w * 0.56, height: faceH * 0.56, borderRadius: "50%",
            background: `radial-gradient(ellipse at 45% 40%, rgba(255,255,255,0.08), transparent 70%)`,
            border: `1px solid rgba(255,255,255,0.15)`,
            display: "flex", alignItems: "center", justifyContent: "center",
          }}>
            {label && (
              <span style={{

                color: text, fontWeight: "bold",
                textShadow: "0 1px 2px rgba(0,0,0,0.6)",

        </div>
      </div>
    </div>
  );
}

function ChipStack({ amount, compact = false }) {
  const bd = chipBreakdown(amount);
  if (bd.length === 0) return null;
  const sz = compact ? 26 : 34;
  const stripes = { 500: "#e91e8e", 100: "#e0e0e0", 25: "#c62828", 5: "#ffffff", 2.5: "#ffffff", 1: "#1565c0" };
  const faceH = Math.round(sz * 0.85);
  const edgeH = 2;
  const chipH = faceH + edgeH;
  // bd is highest-first from chipBreakdown — highest value at bottom of stack
  // index 0 = highest denom (bottom), last = lowest (top)
  const EDGE_SHOW = edgeH;
  const totalH = chipH + (bd.length - 1) * EDGE_SHOW;
  return (
    <div style={{ position: "relative", width: sz, height: totalH, margin: "0 auto" }}>
      {bd.map((stack, i) => {
        const isTop = i === bd.length - 1;
        // Bottom chip at bottom:0, each subsequent chip edgeH higher
        const bottomOffset = i * EDGE_SHOW;
        return (
          <div key={i} style={{
            position: "absolute", bottom: bottomOffset, left: 0, zIndex: i,
          }}>
            <SingleChip
              color={stack.bg} border={stack.border} text={stack.text}
              label={null}
              size={sz} isTop={isTop}
              edgeStripe={stripes[stack.value] || "#e91e8e"}
            />
          </div>
        );
      })}
    </div>
  );
}

function lighten(hex, pct) {
  if (!hex || hex[0] !== '#') return hex;
  let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  r = Math.min(255, r + Math.round((255-r)*pct/100));
  g = Math.min(255, g + Math.round((255-g)*pct/100));
  b = Math.min(255, b + Math.round((255-b)*pct/100));
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}
function darken(hex, pct) {
  if (!hex || hex[0] !== '#') return hex;
  let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  r = Math.max(0, r - Math.round(r*pct/100));
  g = Math.max(0, g - Math.round(g*pct/100));
  b = Math.max(0, b - Math.round(b*pct/100));
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

        <span style={{ color: "#aaa" }}>Penetration:</span><span>{pct}%</span>
      </div>
      <h3 style={{ color: "#ffd700", margin: "8px 0 6px", fontSize: 14, borderBottom: "1px solid #555", paddingBottom: 5 }}>
        Player Stats
      </h3>
      {players.map((p, i) => (
        <div key={i} style={{ marginBottom: 6, padding: "5px 0", borderBottom: i < players.length - 1 ? "1px solid #333" : "none" }}>
          <div style={{ fontWeight: "bold", color: p.isHuman ? "#ffd700" : "#ce93d8", marginBottom: 2, fontSize: 12 }}>
            {p.name} {p.isHost ? "(You)" : p.isHuman ? "" : p.isRealPlayer ? "" : "(AI)"}
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "1px 8px", fontSize: 11 }}>
            <span style={{ color: "#aaa" }}>Bankroll:</span>
            <span style={{ color: p.bankroll + (p.totalWithdrawn || 0) >= (p.totalInvested || p.startBankroll) ? "#4caf50" : "#f44336" }}>
              ${p.bankroll.toLocaleString()}
            </span>
            <span style={{ color: "#aaa" }}>Hands:</span><span>{p.stats.hands}</span>
            <span style={{ color: "#aaa" }}>W/L/P:</span>
            <span>{p.stats.wins}/{p.stats.losses}/{p.stats.pushes}</span>
            <span style={{ color: "#aaa" }}>Win%:</span>
            <span>{p.stats.hands > 0 ? ((p.stats.wins / p.stats.hands) * 100).toFixed(1) : "0"}%</span>
            <span style={{ color: "#aaa" }}>Net:</span>
            <span style={{ color: p.bankroll + (p.totalWithdrawn || 0) - (p.totalInvested || p.startBankroll) >= 0 ? "#4caf50" : "#f44336" }}>
              {p.bankroll + (p.totalWithdrawn || 0) - (p.totalInvested || p.startBankroll) >= 0 ? "+" : ""}${(p.bankroll + (p.totalWithdrawn || 0) - (p.totalInvested || p.startBankroll)).toLocaleString()}
            </span>
          </div>
        </div>
      ))}
    </div>
  );
}

// ===================== SEMICIRCLE TABLE POSITIONS (FIXED) =====================
function getSeatPositions(numPlayers) {
  // Player 1 is on the RIGHT (dealer's left)
  // Cards grow downward from the seat position, never overlapping the dealer
  const positions = [];
  const startAngle = Math.PI * 0.15; // right side (dealer's left)
  const endAngle = Math.PI * 0.85;   // left side
  for (let i = 0; i < numPlayers; i++) {
    const t = numPlayers === 1 ? 0.5 : i / (numPlayers - 1);
    const angle = startAngle + (endAngle - startAngle) * t;
    const rx = 42;
    const ry = 22;
    const cx = 50;
    const cy = 34; // pushed down so player boxes start well below dealer area
    const x = cx + rx * Math.cos(angle);
    const y = cy + ry * Math.sin(angle);
    positions.push({ x, y });
  }
  return positions;
}

      if (fallbacks) { for (const fn of fallbacks) { if (!usedNames.has(fn.toLowerCase())) { usedNames.add(fn.toLowerCase()); return fn; } } }
      let n = 2; while (usedNames.has((baseName + " " + n).toLowerCase())) n++;

    };
    for (let i = 0; i < 6; i++) {

      }

    // Fallback if no config

      ps.push(createPlayer("Host", settings.buyIn, true, 0, true));

  const [suggestions, setSuggestions] = useState(true);

  // ── UNIFIED BETTING ROUND STATE ──
  const [bettingSeatIdx, setBettingSeatIdx] = useState(-1);      // which seat is currently betting (-1 = inactive)
  const [bettingBets, setBettingBets] = useState({});             // { seatIdx: betAmount } confirmed bets
  const [showNoMoreBets, setShowNoMoreBets] = useState(false);    // "No More Bets" flash
