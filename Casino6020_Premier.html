  const [rpBettingIdx, setRpBettingIdx] = useState(-1);
  const [rpBettingTimer, setRpBettingTimer] = useState(0);
  const rpTimerRef = useRef(null);
  const [lessDialog, setLessDialog] = useState(null); // { type: "double"|"split", needed, available, playerIdx }
  const [pendingActionAfterRebuy, setPendingActionAfterRebuy] = useState(null); // "double" or "split" or { action, playerIdx }
  const [executeAfterRebuy, setExecuteAfterRebuy] = useState(null); // triggers action after state commits
  const [insurancePending, setInsurancePending] = useState(null); // { players, dc, s, rc }
  const [insPlayerIdx, setInsPlayerIdx] = useState(-1); // -1 = human's turn, >= 0 = index of real player being asked
  const [insDecisions, setInsDecisions] = useState({}); // { playerIdx: true/false }
  const [showStats, setShowStats] = useState(false);
  const [openSeatOverlay, setOpenSeatOverlay] = useState(false);
  const openSeatOverlayRef = useRef(false);
  const pendingDealRef = useRef(false);
  const [newSeatConfig, setNewSeatConfig] = useState(null); // { seatIdx, name, buyIn, type }
  const [removeSeatIdx, setRemoveSeatIdx] = useState(null); // seat index pending removal confirmation
  const [hostRemovalWarning, setHostRemovalWarning] = useState(null); // message string when host tries to remove at wrong time
  const [hostReturnPopup, setHostReturnPopup] = useState(null); // { seatIdx } when empty seat clicked and host is absent
  const hostAbsentRef = useRef(false); // tracks whether host has been removed from the game

  // =============== DATA TRACKING ===============
  const [gameLog, setGameLog] = useState(() => {
    try { const d = localStorage.getItem("bj6020_gameLog"); return d ? JSON.parse(d) : []; } catch { return []; }
  });
  // Overall balance: prior sessions total (saved at end of each session)
  const [priorSessionsBalance] = useState(() => {
    try { return parseFloat(localStorage.getItem("bj6020_overallBal")) || 0; } catch { return 0; }
  });
  const [sessionId] = useState(() => Date.now().toString(36) + Math.random().toString(36).slice(2, 6));
  const [sessionStartTime] = useState(() => new Date().toISOString());
  // Run tracking: a "run" is a continuous stretch of play between sit-outs
  const runIdRef = useRef(Date.now().toString(36) + "r1");
  const runNumberRef = useRef(1);
  const runStartBankrollRef = useRef(null); // set when first hand of run is dealt
  const [showDataCenter, setShowDataCenter] = useState(false);
  const handActionsRef = useRef([]); // actions taken in current hand: [{action, handIdx, timestamp}]
  const handStartBankrollRef = useRef(0); // bankroll at start of hand
  // Dealer bust history: array of booleans (true = bust), most recent last. Max 50.
  const [dealerBustHistory, setDealerBustHistory] = useState([]);
  const [showBustHistory, setShowBustHistory] = useState(false);
  const rpHandStartBankrollRef = useRef({}); // real player bankrolls at start of hand { playerIdx: bankroll }
  const midHandRebuyRef = useRef(0); // tracks money added mid-hand (for P&L accuracy)
  const rpMidHandRebuyRef = useRef({}); // per-player mid-hand rebuys { playerIdx: amount }
  const sessionRebuysRef = useRef(0); // total rebuys this session (both mid-hand and between-hand)
  const handSettledRef = useRef(false); // prevent double-settlement per hand
  const dealInProgressRef = useRef(false); // prevent double-deal (e.g., safety effect race)
  const bettingInProgressRef = useRef(false); // prevent double-click on Place Bets / Next Hand
  const winStreakRef = useRef(0);
  const lossStreakRef = useRef(0);
  const maxWinStreakRef = useRef(0);
  const maxLossStreakRef = useRef(0);

  // Persist game log
  useEffect(() => {
    try { localStorage.setItem("bj6020_gameLog", JSON.stringify(gameLog)); } catch {}
  }, [gameLog]);

  // Compute live overall balance: prior sessions + current session P&L
  // Session P&L = currentBankroll - buyIn - rebuys (simple, can't drift)
  const humanPlayer = players.find(p => p.isHuman);
  const currentSessionPnL = humanPlayer ? humanPlayer.bankroll - settings.buyIn - sessionRebuysRef.current : 0;
  const overallBalance = priorSessionsBalance + currentSessionPnL;

  // Save overall balance to localStorage after each hand settles
  useEffect(() => {
    try { localStorage.setItem("bj6020_overallBal", String(overallBalance)); } catch {}
  }, [overallBalance]);

  const shoeRef = useRef(shoe);
  const rcRef = useRef(runningCount);
  shoeRef.current = shoe;
  rcRef.current = runningCount;

  const totalCards = settings.deckCount * 52;
  const cutCard = Math.floor(totalCards * (1 - settings.penetration / 100));
  const cardsRemaining = shoe.length;
  const tc = getTrueCount(runningCount, cardsRemaining, settings.deckCount);
  const spd = SPEEDS[speed];

  const countSystem = useMemo(() => {
    return COUNTING_SYSTEMS[settings.countingSystem] || settings.customCounts;
  }, [settings.countingSystem, settings.customCounts]);

  const seatPositions = useMemo(() => getSeatPositions(players.length), [players.length]);

  // Watch for auto toggle during PLAYER_TURN and immediately play
  useEffect(() => {
    if (phase === PHASES.PLAYER_TURN && activePlayer !== undefined) {
      const p = players[activePlayer];
      // ONLY trigger for human/real players toggling autoPlay ON — AI players are already
      // handled by the chain (walkPlayerTurns → autoPlay → advanceToNext → walkRemaining).
      // Without this guard, AI players get autoPlay called TWICE (once from chain, once from
      // this useEffect), causing stale-shoe card flashes (K appears then changes).
      if (p && p.isAutoPlay && (p.isHuman || p.isRealPlayer) && p.hands[activeHand]?.status === "active") {
        setTimeout(() => autoPlay(playersRef.current, activePlayer, activeHand, dealer.cards, shoeRef.current, rcRef.current), 300);
      }
    }
  }, [players[activePlayer]?.isAutoPlay]);

  const handleReset = () => {
    // Close the current run before exiting — must write directly to localStorage
    // because React 18 batches setGameLog and the updater won't run before unmount
    try {
      const raw = localStorage.getItem("bj6020_gameLog");
      if (raw) {
        const log = JSON.parse(raw);
        if (log.length > 0) {
          log[log.length - 1] = { ...log[log.length - 1], runEndReason: "session ended" };
          localStorage.setItem("bj6020_gameLog", JSON.stringify(log));
        }
      }
    } catch {}
    // Save final overall balance (prior sessions + this session's P&L) before exiting
    try { localStorage.setItem("bj6020_overallBal", String(overallBalance)); } catch {}
    onBack();
  };

  const placeBetsWithAmount = useCallback((betAmount, forceSitOut = false) => {
    // GUARD: Prevent double-deal
    if (dealInProgressRef.current) return;
    dealInProgressRef.current = true;
    if (!forceSitOut && betAmount < settings.tableMin) {
      setBetWarning(`Minimum bet is $${settings.tableMin}. Place a bet!`);
      dealInProgressRef.current = false; // Reset on validation failure
      return;
    }
    // Use fresh player state from ref (critical for sequential betting flow)
    const players = playersRef.current;
    setBetWarning("");
    // Capture bankroll BEFORE bets are placed for accurate P&L tracking
    const hp = players.find(p => p.isHost) || players.find(p => p.isHuman);
    handStartBankrollRef.current = hp ? hp.bankroll : 0;
    // Capture run start bankroll on first hand of a new run
    if (runStartBankrollRef.current === null) {
      runStartBankrollRef.current = hp ? hp.bankroll : 0;
    }
    const rpStarts = {};
    players.forEach((p, i) => { if (p.isRealPlayer) rpStarts[i] = p.bankroll; });
    rpHandStartBankrollRef.current = rpStarts;
    midHandRebuyRef.current = 0; // reset mid-hand rebuy tracker
    rpMidHandRebuyRef.current = {}; // reset per-player mid-hand rebuys
    handSettledRef.current = false; // allow settlement for this new hand
    const sitOut = humanSitOut || forceSitOut;
    if (sitOut) setHumanSitOut(false); // reset after use
    const newPlayers = players.map((p) => {
      if (sitOut && p.isHost) {
        // In Double Deck, sitting out mid-shoe locks you out until next shoe
        const lockOut = settings.gameType === "doubleDeck" ? { lockedOutUntilShuffle: true } : {};
        return { ...p, ...lockOut, hands: [{ cards: [], bet: 0, status: "sitting_out", result: null, isDoubled: false, isSplit: false, freeBet: 0 }], splitCount: 0, insurance: 0, freeBetTokens: 0, potOfGoldBet: 0 };
      }
      let bet;
      if (p.isHuman) {
        bet = Math.min(Math.max(betAmount, settings.tableMin), Math.min(settings.tableMax, p.bankroll));
      } else if (p.isRealPlayer) {
        if (p.pendingBet <= 0) {
          // Real player sitting out this hand (timed out or chose to sit out)
          return { ...p, hands: [{ cards: [], bet: 0, status: "sitting_out", result: null, isDoubled: false, isSplit: false, freeBet: 0 }], splitCount: 0, insurance: 0, freeBetTokens: 0, rpBetConfirmed: false };
        }
        bet = Math.min(Math.max(p.pendingBet, settings.tableMin), Math.min(settings.tableMax, p.bankroll));
      } else if (p.personality === "textbook") {
        // Textbook player: flat-bets table min (no counting, just knows basic strategy)
        bet = settings.tableMin;
      } else if (p.personality === "timid") {
        // Timid: always table min
        bet = settings.tableMin;
      } else {
        // Casual: mostly table min, occasionally bets 2x when "feeling lucky" (~15%)
        bet = Math.random() < 0.15 ? Math.min(settings.tableMin * 2, settings.tableMax) : settings.tableMin;
      }
      bet = Math.min(bet, p.bankroll);
      if (bet <= 0 || p.bankroll <= 0) return { ...p, hands: [{ cards: [], bet: 0, status: "sitting_out", result: null, isDoubled: false, isSplit: false, freeBet: 0 }], splitCount: 0, insurance: 0, freeBetTokens: 0, potOfGoldBet: p.potOfGoldBet || 0 };
      // Deduct pot of gold side bet if in free bet mode
      let pogBet = 0;
      if (settings.gameType === "freeBet" && p.potOfGoldBet > 0) {
        pogBet = Math.min(p.potOfGoldBet, p.bankroll - bet);
      }
      // Deduct 9x side bet (Double Deck only)
      let sb9x = settings.gameType === "doubleDeck" ? (p.sideBet9x || 0) : 0;
      if (sb9x > 0) {
        sb9x = Math.min(sb9x, p.bankroll - bet - pogBet);
        if (sb9x < 1) sb9x = 0;
      }
      return { ...p, bankroll: p.bankroll - bet - pogBet - sb9x, potOfGoldBet: pogBet, sideBet9x: sb9x, hands: [{ cards: [], bet, status: "active", result: null, isDoubled: false, isSplit: false, freeBet: 0 }], splitCount: 0, insurance: 0, freeBetTokens: 0, lastBet: p.isRealPlayer ? bet : (p.lastBet || 0) };
    });
    setPlayers(newPlayers); playersRef.current = newPlayers;
    setLastBet(betAmount);
    setHumanBet(betAmount);
    setHideReBet(false); // Reset so re-bet shows again in next settlement
    // Clean up real player betting state
    setRpBettingActive(false);
    setRpBettingIdx(-1);
    setRpBettingTimer(0);
    setSideBetFocus(null);
    if (rpTimerRef.current) { clearInterval(rpTimerRef.current); rpTimerRef.current = null; }
    setPhase(PHASES.DEALING);
    setDealCounter(c => c + 1);
    setDealingComplete(false);
    setDealer({ cards: [], hidden: true });
    setTimeout(() => dealCards(newPlayers), 200);
  }, [players, tc, settings, humanSitOut]);

  // Use refs to avoid stale closures in timer/confirm callbacks
  const rpBettingIdxRef = useRef(-1);
  rpBettingIdxRef.current = rpBettingIdx;
  const playersRef = useRef(players);
  playersRef.current = players;
  const humanBetRef = useRef(humanBet);
  humanBetRef.current = humanBet;
  const lastBetRef = useRef(lastBet);
  lastBetRef.current = lastBet;

  // ──────────────────────────────────────────────────────
  // UNIFIED BETTING ROUND FUNCTIONS
  // ──────────────────────────────────────────────────────

  // Helper: find next seat that needs to bet (not sitting out, has bankroll)
  const findNextBettingSeat = useCallback((fromIdx) => {
    const ps = playersRef.current;
    for (let i = fromIdx; i < ps.length; i++) {
      if (ps[i].bankroll > 0) return i;
    }
    return -1;
  }, []);

  // Execute the deal with pre-computed bets from bettingBets
  const executeDeal = useCallback(() => {
    // GUARD: Prevent double-deal if executeDeal is called twice (e.g., safety effect race)
    if (dealInProgressRef.current) return;
    dealInProgressRef.current = true;

    const ps = playersRef.current;
    const bets = bettingBetsRef.current;

    setBetWarning("");
    // Capture bankroll BEFORE bets are placed for accurate P&L tracking
    const hp = ps.find(p => p.isHost) || ps.find(p => p.isHuman);
    handStartBankrollRef.current = hp ? hp.bankroll : 0;
    // Capture run start bankroll on first hand of a new run
    if (runStartBankrollRef.current === null) {
      runStartBankrollRef.current = hp ? hp.bankroll : 0;
    }
    const rpStarts2 = {};
    ps.forEach((p, i) => { if (p.isRealPlayer) rpStarts2[i] = p.bankroll; });
    rpHandStartBankrollRef.current = rpStarts2;
    midHandRebuyRef.current = 0;
    rpMidHandRebuyRef.current = {};
    handSettledRef.current = false;

    const newPlayers = ps.map((p, idx) => {
      const bet = bets[idx] || 0;
      const sitOut = bet <= 0 || p.bankroll <= 0;

      if (sitOut) {
        return {
          ...p,
          hands: [{ cards: [], bet: 0, status: "sitting_out", result: null, isDoubled: false, isSplit: false, freeBet: 0 }],
          splitCount: 0,
          insurance: 0,
          freeBetTokens: 0,
          potOfGoldBet: 0,
          sideBet9x: 0,
        };
      }

      const finalBet = Math.min(Math.max(bet, settings.tableMin), Math.min(settings.tableMax, p.bankroll));
      let pogBet = 0;
      if (settings.gameType === "freeBet" && p.potOfGoldBet > 0) {
        pogBet = Math.min(p.potOfGoldBet, p.bankroll - finalBet);
      }
      let sb9x = settings.gameType === "doubleDeck" ? (p.sideBet9x || 0) : 0;
      if (sb9x > 0) {
        sb9x = Math.min(sb9x, p.bankroll - finalBet - pogBet);
        if (sb9x < 1) sb9x = 0;
      }

      return {
        ...p,
        bankroll: p.bankroll - finalBet - pogBet - sb9x,
        potOfGoldBet: pogBet,
        sideBet9x: sb9x,
        hands: [{ cards: [], bet: finalBet, status: "active", result: null, isDoubled: false, isSplit: false, freeBet: 0 }],
        splitCount: 0,
        insurance: 0,
        freeBetTokens: 0,
        lastBet: finalBet,
      };
    });

    setPlayers(newPlayers);
    playersRef.current = newPlayers;
    setHideReBet(false);
    // Track human's bet for Re-bet button
    const humanIdx = newPlayers.findIndex(p => p.isHuman);
    if (humanIdx >= 0 && newPlayers[humanIdx].hands[0]?.bet > 0) {
      setLastBet(newPlayers[humanIdx].hands[0].bet);
      setHumanBet(newPlayers[humanIdx].hands[0].bet);
    }
    // Clear betting state
    setBettingSeatIdx(-1);
    setBettingBets({});
    bettingBetsRef.current = {};
    setPhase(PHASES.DEALING);
    setDealCounter(c => c + 1);
    setDealingComplete(false);
    setDealer({ cards: [], hidden: true });
    setTimeout(() => dealCards(newPlayers), 200);
  }, [settings, dealCards]);

  // Finish betting round: show "No More Bets" then deal
  const finishBettingRound = useCallback(() => {
    // CRITICAL: Reset bettingSeatIdx to -1 IMMEDIATELY to prevent the AI safety effect
    // from firing after betting is complete. Without this, the safety effect's 800ms timer
    // for the last AI seat outlives the betting round, finds bettingSeatIdxRef still matches,
    // and calls advanceBettingSeat again → second finishBettingRound → double executeDeal → double deal.
    setBettingSeatIdx(-1);
    bettingSeatIdxRef.current = -1;
    // If the Open Seat overlay is open, defer the deal until it closes
    if (openSeatOverlayRef.current) {
      pendingDealRef.current = true;
      return;
    }
    setShowNoMoreBets(true);
    setTimeout(() => {
      setShowNoMoreBets(false);
      setTimeout(() => {
        executeDeal();
      }, 200);
    }, 800);
  }, [executeDeal]);

  // Helper ref to store advanceBettingSeat (used to break circular dependency)
  const advanceBettingSeatRef = useRef(null);

  // Run management: end current run (marks reason on last hand) and start new run
  const endCurrentRun = (reason) => {
    // Tag the last hand in the game log with the sit-out reason for this run
    // Also persist synchronously to localStorage so it survives component unmount on exit
    setGameLog(prev => {
      if (prev.length === 0) return prev;
      const last = { ...prev[prev.length - 1], runEndReason: reason };
      const updated = [...prev.slice(0, -1), last];
      try { localStorage.setItem("bj6020_gameLog", JSON.stringify(updated)); } catch {}
      return updated;
    });
  };

  const startNewRun = () => {
    runNumberRef.current += 1;
    runIdRef.current = Date.now().toString(36) + "r" + runNumberRef.current;
    runStartBankrollRef.current = null; // will be captured on next deal
  };

  // Skip to shuffle: instantly create fresh shoe when host is sitting out and only AI remains
  const skipToShuffle = () => {
    setMessage("Shuffling...");
    setPhase(PHASES.SHUFFLING);
    setShuffleAnimation(true);
    bettingInProgressRef.current = false;
    dealInProgressRef.current = false;
    setTimeout(() => {
      const ns = createShoe(settings.deckCount);
      setShoe(ns); shoeRef.current = ns;
      setHandsSinceShuffle(0);
      setRunningCount(settings.initialRunningCount); rcRef.current = settings.initialRunningCount;
      setShuffleAnimation(false);
      // Clear all sit-out locks
      setPlayers(prev => prev.map(p => ({ ...p, lockedOutUntilShuffle: false })));
      playersRef.current = playersRef.current.map(p => ({ ...p, lockedOutUntilShuffle: false }));
      // Start new run for the host
      startNewRun();
      // Clear cards and results
      setPlayers(prev => prev.map(p => ({
        ...p,
        hands: [{ cards: [], bet: 0, status: "active", result: null, isDoubled: false, isSplit: false, freeBet: 0 }],
        splitCount: 0, insurance: 0, sideBet9xResult: null,
      })));
      playersRef.current = playersRef.current.map(p => ({
        ...p,
        hands: [{ cards: [], bet: 0, status: "active", result: null, isDoubled: false, isSplit: false, freeBet: 0 }],
        splitCount: 0, insurance: 0, sideBet9xResult: null,
      }));
      setDealer({ cards: [], hidden: true });
      startBettingRound(false);
    }, 1500);
  };

  // Confirm a seat's bet and advance to next
  const confirmSeatBet = useCallback((seatIdx, betAmount, sitOut = false, lockForShoe = false) => {
    // Guard against rapid clicks: ignore if betting is already complete or seat doesn't match
    if (bettingSeatIdxRef.current === -1 || seatIdx !== bettingSeatIdxRef.current) return;
    // Mark this seat as consumed immediately so rapid double-clicks can't sneak through
    bettingSeatIdxRef.current = -2; // Temporary value — will be updated by advanceBettingSeat
    // Enforce minimum bet — reject if below table min (unless sitting out or bankroll < min)
    if (!sitOut && betAmount > 0 && betAmount < settings.tableMin) {
      const p = playersRef.current[seatIdx];
      // If player can't even afford the min, they must sit out or add funds — don't block
      if (p && p.bankroll >= settings.tableMin) {
        bettingSeatIdxRef.current = seatIdx; // Restore ref — bet rejected
        setBetWarning(`Minimum bet is $${settings.tableMin.toLocaleString()}!`);
        return; // Don't advance — player must fix their bet
      }
    }
    // Enforce minimum bet for zero/empty bets too (player clicked Place Bet with $0)
    if (!sitOut && betAmount <= 0) {
      bettingSeatIdxRef.current = seatIdx; // Restore ref — bet rejected
      setBetWarning(`Place a bet! Minimum is $${settings.tableMin.toLocaleString()}.`);
      return;
    }
    setBetWarning("");
    // Lock out until next shuffle: always for Double Deck (house rule), or when player explicitly chose "Rest of Shoe"
    if (sitOut && (settings.gameType === "doubleDeck" || lockForShoe)) {
      setPlayers(prev => prev.map((p, i) => i === seatIdx ? { ...p, lockedOutUntilShuffle: true } : p));
      playersRef.current = playersRef.current.map((p, i) => i === seatIdx ? { ...p, lockedOutUntilShuffle: true } : p);
    }
    // Run tracking: end current run when host sits out
    if (sitOut) {
      const p = playersRef.current[seatIdx];
      if (p && (p.isHost || p.isHuman)) {
        const reason = (settings.gameType === "doubleDeck" || lockForShoe) ? "sat out (shoe)" : "sat out (1 hand)";
        endCurrentRun(reason);
        // For 1-hand sit-outs, start new run immediately (player returns next hand)
        // For shoe/shuffle sit-outs, new run starts when they re-enter or shuffle happens
        if (!lockForShoe && settings.gameType !== "doubleDeck") {
          startNewRun();
        }
      }
    }
    // Store the bet
    setBettingBets(prev => ({
      ...prev,
      [seatIdx]: sitOut ? 0 : betAmount,
    }));

    // Advance to next seat using ref to avoid stale closure
    if (advanceBettingSeatRef.current) {
      advanceBettingSeatRef.current(seatIdx + 1);
    }
  }, [settings.tableMin]);

  // Advance betting to the next seat (handle AI animations and timers)
  const advanceBettingSeat = useCallback((fromIdx) => {
    const ps = playersRef.current;

    // Find next seat that needs to bet (also stop on busted real players so they can buy in)
    // Skip players locked out until next shuffle (Double Deck sit-out rule)
    let nextIdx = -1;
    for (let i = fromIdx; i < ps.length; i++) {
      if (ps[i].lockedOutUntilShuffle) continue; // Locked out — skip entirely
      if (ps[i].bankroll > 0 || ps[i].isRealPlayer) {
        nextIdx = i;
        break;
      }
    }

    // No more seats — finish betting round
    if (nextIdx < 0) {
      finishBettingRound();
      return;
    }

    const nextPlayer = ps[nextIdx];

    // AI player — auto-compute bet with animation delay
    if (nextPlayer.isAutoPlay && !nextPlayer.isHuman && !nextPlayer.isRealPlayer) {
      const betAmount = getAIBetAmount(nextPlayer.personality, settings, nextPlayer.bankroll, nextPlayer.consecWins, nextPlayer.consecLosses, tc);
      setBettingBets(prev => ({
        ...prev,
        [nextIdx]: betAmount,
      }));
      setMessage(`${nextPlayer.name} is betting...`);
      setBettingSeatIdx(nextIdx); // Show visual indicator
      // Wait for animation, then advance (use ref to avoid stale closure)
      setTimeout(() => {
        if (advanceBettingSeatRef.current) advanceBettingSeatRef.current(nextIdx + 1);
      }, 300);
      return;
    }

    // Human player — show chip selector
    if (nextPlayer.isHuman) {
      setBettingSeatIdx(nextIdx);
      setHumanBet(nextPlayer.lastBet || 0);
      setMessage("Place your bet!");
      return;
    }

    // Real player — show betting interface
    if (nextPlayer.isRealPlayer) {
      setBettingSeatIdx(nextIdx);
      // Clear pendingBet if busted so old bet doesn't show
      if (nextPlayer.bankroll <= 0) {
        setPlayers(prev => prev.map((pp, i) => i === nextIdx ? { ...pp, pendingBet: 0 } : pp));
        setMessage(`${nextPlayer.name} — out of funds!`);
        return;
      }
      setMessage(`${nextPlayer.name} — place your bet!`);
      return;
    }
  }, [settings, finishBettingRound, tc]);

  // Store advanceBettingSeat in ref to break circular dependency
  advanceBettingSeatRef.current = advanceBettingSeat;

  // Start a new betting round (optionally pre-populate with last bets)
  const startBettingRound = useCallback((useLastBets = false) => {
    setBettingBets({});
    bettingBetsRef.current = {};
    setShowNoMoreBets(false);

    if (useLastBets) {
      // Pre-populate human's bet with lastBet
      setHumanBet(lastBetRef.current);
    } else {
      setHumanBet(0);
    }

    // Start at seat 0
    setBettingSeatIdx(0);
    setMessage("Betting round...");
    setPhase(PHASES.BETTING);

    // Trigger advancement to handle seat 0
    setTimeout(() => {
      advanceBettingSeat(0);
    }, 100);
  }, [settings, advanceBettingSeat]);

  // Quick re-bet: pre-populate all AI bets, skip AI animations, go straight to real players or deal
  const handleQuickRebet = useCallback(() => {
    if (lastBetRef.current <= 0) return;

    const ps = playersRef.current;
    const humanIdx = ps.findIndex(p => p.isHuman);
    const newBets = {};

    // Pre-populate human's bet
    if (humanIdx >= 0) {
      newBets[humanIdx] = lastBetRef.current;
    }

    // Pre-compute all AI bets instantly (no animation)
    for (let i = 0; i < ps.length; i++) {
      if (i === humanIdx) continue; // Skip human
      if (ps[i].bankroll <= 0) continue; // Skip busted out
      const p = ps[i];
      if (p.isAutoPlay && !p.isRealPlayer) {
        const bet = getAIBetAmount(p.personality, settings, p.bankroll, p.consecWins, p.consecLosses, tc);
        newBets[i] = bet;
      }
    }

    setBettingBets(newBets);
    bettingBetsRef.current = newBets;

    // Pre-fill real players' pendingBet with their lastBet for quick re-bet
    const updatedPs = ps.map(p => {
      if (p.isRealPlayer && p.bankroll > 0 && p.lastBet > 0) {
        return { ...p, pendingBet: p.lastBet };
      }
      return p;
    });
    setPlayers(updatedPs);
    playersRef.current = updatedPs;

    // Check if there are any real players (include busted ones so they can buy in)
    const firstRealPlayer = updatedPs.findIndex((p, i) => p.isRealPlayer);
    if (firstRealPlayer >= 0) {
      // Go straight to first real player
      setBettingSeatIdx(firstRealPlayer);
      setPhase(PHASES.BETTING);
      // If busted, show buy-in screen; otherwise show betting interface
      if (updatedPs[firstRealPlayer].bankroll <= 0) {
        setMessage(`${ps[firstRealPlayer].name} — out of funds!`);
      } else {
        setMessage(`${ps[firstRealPlayer].name} — place your bet!`);
      }
    } else {
      // No real players — deal immediately
      setPhase(PHASES.BETTING);
      setTimeout(() => finishBettingRound(), 100);
    }
  }, [settings, tc, finishBettingRound]);

  // Add a mid-game player (when Open Seat button is used)
  const addMidGamePlayer = useCallback((seatIdx, name, buyIn, isHuman, claimHost = false) => {
    const rawName = name.trim() || (isHuman ? "Player" : AI_NAMES[seatIdx % AI_NAMES.length]);
    // Ensure unique name among current players
    const existingNames = new Set(playersRef.current.map(p => p.name.toLowerCase()));
    let playerName = rawName;
    if (existingNames.has(playerName.toLowerCase())) {
      if (!isHuman) {
        // Try other AI names first
        const alt = AI_NAMES.find(n => !existingNames.has(n.toLowerCase()));
        if (alt) { playerName = alt; }
        else { let n = 2; while (existingNames.has((rawName + " " + n).toLowerCase())) n++; playerName = rawName + " " + n; }
      } else {
        let n = 2; while (existingNames.has((rawName + " " + n).toLowerCase())) n++; playerName = rawName + " " + n;
      }
    }
    const newPlayer = createPlayer(playerName, buyIn || settings.buyIn, isHuman, seatIdx, claimHost);
    if (isHuman && !claimHost) {
      newPlayer.isRealPlayer = true;
      newPlayer.isAutoPlay = false;
    }
    // If claiming host, remove host flag from all other players
    if (claimHost) {
      setPlayers(prev => {
        const cleared = prev.map(p => ({ ...p, isHost: false }));
        const updated = [...cleared, newPlayer].sort((a, b) => a.seat - b.seat);
        return updated;
      });
      return;
    }
    setPlayers(prev => {
      // Insert at correct position based on seat index
      const updated = [...prev, newPlayer].sort((a, b) => a.seat - b.seat);
      return updated;
    });
  }, [settings.buyIn]);

  // Remove a player mid-game
  const removeMidGamePlayer = useCallback((seatIdx, forceHost = false) => {
    // Phase check for host removal
    const p = playersRef.current.find(pl => pl.seat === seatIdx);
    if (!p) return;
    if (p.isHost && !forceHost) {
      // Only allow host removal during BETTING phase when it's not the host's turn
      const hostIdx = playersRef.current.findIndex(pl => pl.seat === seatIdx);
      if (phase !== PHASES.BETTING) {
        setHostRemovalWarning("The Host can only leave between hands, during the betting phase. Wait for the current hand to finish, then remove the Host before the next hand is dealt.");
        return;
      }
      if (bettingSeatIdxRef.current === hostIdx) {
        setHostRemovalWarning("The Host is currently being asked to bet. Wait until it's another player's turn to bet, then remove the Host.");
        return;
      }
      // Phase is OK — proceed with host removal
    }
    setPlayers(prev => {
      const player = prev.find(pl => pl.seat === seatIdx);
      if (!player) return prev;
      if (player.isHost) hostAbsentRef.current = true;
      const removedIdx = prev.findIndex(pl => pl.seat === seatIdx);
      const newPlayers = prev.filter(pl => pl.seat !== seatIdx);
      // Re-key bettingBets: indices shift down after removal, so rebuild the map
      setBettingBets(oldBets => {
        const newBets = {};
        Object.keys(oldBets).forEach(k => {
          const ki = parseInt(k);
          if (ki < removedIdx) newBets[ki] = oldBets[ki];
          else if (ki > removedIdx) newBets[ki - 1] = oldBets[ki];
          // ki === removedIdx: drop the removed player's bet
        });
        return newBets;
      });
      // Reset humanBet so the next player doesn't inherit the removed player's pending amount
      setHumanBet(0);
      return newPlayers;
    });
    setRemoveSeatIdx(null);
  }, [phase]);


  // Safety: if an AI seat is active during betting but not advancing, kick-start it
  // This catches edge cases where setTimeout callbacks get lost (overlay interactions, re-renders)
  // Also handles the case where players were added/removed via Open Seat overlay during betting,
  // which can shift indices and leave bettingSeatIdx pointing at the wrong player or out of bounds.
  useEffect(() => {
    if (phase !== PHASES.BETTING || bettingSeatIdx < 0) return;
    const ps = playersRef.current;
    const p = ps[bettingSeatIdx];
    // If seat index is out of bounds (player removed), finish the round
    if (!p) {
      const safety = setTimeout(() => {
        if (bettingSeatIdxRef.current === bettingSeatIdx && advanceBettingSeatRef.current) {
          advanceBettingSeatRef.current(bettingSeatIdx + 1);
        }
      }, 300);
      return () => clearTimeout(safety);
    }
    if (p.isAutoPlay && !p.isHuman && !p.isRealPlayer && p.bankroll > 0) {
      // AI is active but might be stuck — give it 800ms then force-advance
      const safety = setTimeout(() => {
        // Check if still stuck on the same AI seat
        if (bettingSeatIdxRef.current === bettingSeatIdx && advanceBettingSeatRef.current) {
          advanceBettingSeatRef.current(bettingSeatIdx + 1);
        }
      }, 800);
      return () => clearTimeout(safety);
    }
  }, [bettingSeatIdx, phase, players]);


  // Find next real player index (searching from startIdx forward)
  const findNextRealPlayerRef = useCallback((startIdx) => {
    const ps = playersRef.current;
    for (let i = startIdx; i < ps.length; i++) {
      if (ps[i].isRealPlayer && ps[i].bankroll > 0) return i;
    }
    return -1;
  }, []);

  // Start the 6-second timer for current real player
  const startRpTimer = useCallback((idx) => {
    if (rpTimerRef.current) clearInterval(rpTimerRef.current);
    setRpBettingTimer(6);
    setRpTimerPaused(false);
    rpTimerPausedRef.current = false;
    let countdown = 6;
    rpTimerRef.current = setInterval(() => {
      if (rpTimerPausedRef.current) return; // skip tick when paused
      countdown--;
      setRpBettingTimer(countdown);
      if (countdown <= 0) {
        clearInterval(rpTimerRef.current);
        rpTimerRef.current = null;
      }
    }, 1000);
  }, []);

  // Confirm current real player's bet and advance to next (or deal)
  const confirmRpBet = useCallback((sitOut = false) => {
    if (rpTimerRef.current) { clearInterval(rpTimerRef.current); rpTimerRef.current = null; }
    const curIdx = rpBettingIdxRef.current;
    if (curIdx < 0) return;
    // Mark this player's bet as confirmed (or sit them out)
    setPlayers(prev => prev.map((p, i) => {
      if (i !== curIdx) return p;
      if (sitOut) return { ...p, rpBetConfirmed: true, pendingBet: 0 };
      return { ...p, rpBetConfirmed: true };
    }));
    // Find next real player
    const nextIdx = findNextRealPlayerRef(curIdx + 1);
    if (nextIdx >= 0) {
      setRpBettingIdx(nextIdx);
      rpBettingIdxRef.current = nextIdx;
      const ps = playersRef.current;
      setMessage(`${ps[nextIdx]?.name || "Player"} — place your bet!`);
      startRpTimer(nextIdx);
    } else {
      // All real players done — now deal
      setRpBettingActive(false);
      setRpBettingIdx(-1);
      rpBettingIdxRef.current = -1;
      setRpBettingTimer(0);
      // Use setTimeout to let state settle before placeBetsWithAmount reads players
      const hBet = humanBetRef.current;
      setTimeout(() => placeBetsWithAmount(hBet), 50);
    }
  }, [findNextRealPlayerRef, startRpTimer, placeBetsWithAmount]);

  // Timer expiry effect — auto sit-out when timer hits 0
  useEffect(() => {
    if (rpBettingActive && rpBettingTimer === 0 && rpBettingIdxRef.current >= 0 && !rpTimerRef.current) {
      confirmRpBet(true); // sit out this hand
    }
  }, [rpBettingTimer, rpBettingActive, confirmRpBet]);

  const handlePlaceBets = useCallback(() => {
    // GUARD: Prevent double-click from starting two betting rounds
    if (bettingInProgressRef.current) return;
    bettingInProgressRef.current = true;
    startBettingRound(false);
  }, [startBettingRound]);

  const handleReBetAndDeal = useCallback(() => {
    if (lastBet <= 0) return;
    // GUARD: Prevent double-click
    if (bettingInProgressRef.current) return;
    bettingInProgressRef.current = true;
    dealInProgressRef.current = false; // Reset deal guard for re-bet path
    // Clear previous hand results
    setPlayers(prev => prev.map(p => ({
      ...p,
      hands: [{ cards: [], bet: 0, status: "active", result: null, isDoubled: false, isSplit: false, freeBet: 0 }],
      splitCount: 0, insurance: 0, sideBet9xResult: null,
    })));
    setDealer({ cards: [], hidden: true });

    // Check if shoe needs shuffle — CSM reshuffles every 4 hands, ASM uses cut card
    const needsShuffle = (settings.shuffleType === "csm" && settings.gameType !== "doubleDeck")
      ? handsSinceShuffle >= 4
      : shoe.length <= cutCard;

    if (needsShuffle) {
      setMessage(settings.shuffleType === "csm" && settings.gameType !== "doubleDeck" ? "CSM Recycling..." : "Shuffling...");
      setPhase(PHASES.SHUFFLING);
      setShuffleAnimation(true);
      setTimeout(() => {
        const ns = createShoe(settings.deckCount);
        setShoe(ns); shoeRef.current = ns;
        setHandsSinceShuffle(0);
        setRunningCount(settings.initialRunningCount); rcRef.current = settings.initialRunningCount;
        setShuffleAnimation(false);
        // Clear sit-out locks on new shoe — start new run if host was locked out
        const hostWasLocked = playersRef.current.some(p => (p.isHost || p.isHuman) && p.lockedOutUntilShuffle);
        setPlayers(prev => prev.map(p => ({ ...p, lockedOutUntilShuffle: false })));
        playersRef.current = playersRef.current.map(p => ({ ...p, lockedOutUntilShuffle: false }));
        if (hostWasLocked) startNewRun();
        setTimeout(() => {
          handleQuickRebet();
        }, 300);
      }, 2000);
      return;
    }
    // Go straight to quick rebet (pre-populate all bets, skip animations)
    handleQuickRebet();
  }, [lastBet, shoe, cutCard, settings, handleQuickRebet, handsSinceShuffle]);

  const dealCards = useCallback((ps) => {
    handActionsRef.current = [];
    // Note: handStartBankrollRef is set in placeBetsWithAmount BEFORE bets are deducted
    let s = [...shoeRef.current];
    let rc = rcRef.current;
    const np = ps.map(p => ({ ...p, hands: p.hands.map(h => ({ ...h, cards: [...h.cards] })) }));
    const dc = [];
    let order = 0;
    for (let round = 0; round < 2; round++) {
      for (let i = 0; i < np.length; i++) {
        if (np[i].hands[0].status === "sitting_out") continue;
        const card = s.pop();
        card.dealOrder = order++;
        np[i].hands[0].cards.push(card);
        rc += cardCountValue(card, countSystem);
      }
      const dCard = s.pop();
      dCard.dealOrder = order++;
      dc.push(dCard);
      if (round === 0) rc += cardCountValue(dCard, countSystem);
    }
    setShoe(s); shoeRef.current = s;
    setRunningCount(rc); rcRef.current = rc;
    setPlayers(np); playersRef.current = np;
    setDealer({ cards: dc, hidden: true });
    setHandsSinceShuffle(prev => prev + 1);

    const totalDealTime = order * spd + 400;

    setTimeout(() => {
      setDealingComplete(true);

      // If dealer shows Ace, offer insurance before anything else
      if (dc[0].rank === "A") {
        // Find first active human/real player in seat order (left-to-right from dealer)
        const firstHuman = np.findIndex(p => (p.isHuman || p.isRealPlayer) && p.hands[0]?.status !== "sitting_out" && p.bankroll > 0);
        const anyActiveAI = np.some(p => !p.isHuman && !p.isRealPlayer && p.hands[0]?.status !== "sitting_out");
        if (firstHuman >= 0 || anyActiveAI) {
          setInsurancePending({ players: np, dc, s, rc });
          setPhase(PHASES.INSURANCE);
          setInsuranceDialog(true);
          if (firstHuman >= 0) {
            setInsPlayerIdx(firstHuman);
            setInsDecisions({});
            setMessage(`${np[firstHuman].name} — Insurance?`);
          } else {
            // Only AI players active — auto-decline for all and proceed
            setInsuranceDialog(false);
            setInsurancePending(null);
            proceedAfterInsurance(np, dc, s, rc);
          }
          return;
        }
        // Everyone is sitting out — skip insurance entirely
      }

      // No insurance needed — proceed normally
      proceedAfterInsurance(np, dc, s, rc);
    }, totalDealTime);
  }, [countSystem, settings, spd]);

  const proceedAfterInsurance = useCallback((np, dc, s, rc) => {
    // Settle 9x side bets (Double Deck only) — check ALL players (human + real)
    const dealerUpcard = dc.length > 0 ? dc[0] : null;
    if (settings.gameType === "doubleDeck" && dealerUpcard) {
      np = np.map((p) => {
        if ((p.sideBet9x || 0) > 0 && p.hands[0]?.cards?.length >= 2) {
          const c1 = p.hands[0].cards[0];
          const c2 = p.hands[0].cards[1];
          const won = checkNineXSideBet([c1, c2], dealerUpcard);
          console.log(`[9x SideBet] ${p.name}: ${c1.rank}${c1.suit} ${c2.rank}${c2.suit} | Dealer: ${dealerUpcard.rank}${dealerUpcard.suit} | Won: ${won}`);
          return { ...p, bankroll: won ? p.bankroll + p.sideBet9x + p.sideBet9x * 9 : p.bankroll, sideBet9xResult: won ? "win" : "loss" };
        }
        return { ...p, sideBet9xResult: null };
      });
    } else {
      np = np.map(p => ({ ...p, sideBet9xResult: null }));
    }
    // CRITICAL: Commit 9x settlement results to state immediately so they survive
    // through player turns and dealer play into final settlement display
    setPlayers(np); playersRef.current = np;

    // Check for dealer blackjack
    if (settings.dealerPeeks && isBlackjack(dc)) {
      const rc2 = rc + cardCountValue(dc[1], countSystem);
      setRunningCount(rc2); rcRef.current = rc2;
      setDealer({ cards: dc, hidden: false });
      setMessage("Dealer has Blackjack!");
      // Pay insurance bets (2:1)
      const insuredPlayers = np.map(p => {
        if (p.insurance > 0) {
          return { ...p, bankroll: p.bankroll + p.insurance * 3 }; // original bet back + 2:1 payout
        }
        return p;
      });
      setPlayers(insuredPlayers); playersRef.current = insuredPlayers;
      setTimeout(() => settleHands(insuredPlayers, dc, false, s, rc2), 1200);
      return;
    }

    // Dealer does NOT have blackjack — insurance bets are lost (already deducted)
    // Mark player blackjacks (do NOT pay yet — settleHands handles all payouts)
    let currentPlayers = np;
    const hasBJ = np.some(p => p.hands.some(h => h.status === "active" && isBlackjack(h.cards)));
    if (hasBJ) {
      currentPlayers = np.map(p => {
        const hand = p.hands[0];
        if (hand.status === "active" && isBlackjack(hand.cards)) {
          return {
            ...p,
            // DO NOT credit bankroll here — settleHands will handle all payouts
            hands: [{ ...hand, status: "blackjack", result: null }],
          };
        }
        return p;
      });
      setPlayers(currentPlayers); playersRef.current = currentPlayers;
      setBlackjackFlash(true);
      setTimeout(() => setBlackjackFlash(false), 1500);
    }

    // Walk through players in order — pause on BJ hands to show popout before moving on
    const walkPlayerTurns = (idx) => {
      for (let i = idx; i < currentPlayers.length; i++) {
        if (currentPlayers[i].hands[0]?.status === "blackjack") {
          setActivePlayer(i);
          setActiveHand(0);
          setPhase(PHASES.PLAYER_TURN);
          setMessage(`${currentPlayers[i].name} — BLACKJACK!`);
          setPopoutMessage({
            text: "BLACKJACK!",
            subtext: currentPlayers[i].name,
            color: "#ffd700",
            glow: "rgba(255,215,0,0.2)",
            stroke: "rgba(139,69,19,0.6)",
            subColor: "#ffe082",
          });
          setTimeout(() => {
            setPopoutMessage(null);
            walkPlayerTurns(i + 1);
          }, 1050);
          return;
        }
        if (currentPlayers[i].hands.some(h => h.status === "active")) {
          setActivePlayer(i);
          setActiveHand(0);
          setPhase(PHASES.PLAYER_TURN);
          const fp = currentPlayers[i];
          if ((fp.isHuman || fp.isRealPlayer) && !fp.isAutoPlay) {
            setMessage(`${fp.name}'s turn`);
          } else {
            setMessage(`${fp.name} playing...`);
            setTimeout(() => autoPlay(currentPlayers, i, 0, dc, s, rc), 300);
          }
          return;
        }
      }
      setPhase(PHASES.DEALER_TURN);
      setTimeout(() => playDealerTurn(currentPlayers, dc, s, rc), 400);
    };
    walkPlayerTurns(0);
  }, [countSystem, settings]);

  // Find next human/real player who needs an insurance decision (sitting in, not AI)
  // Iterates in seat order (left-to-right from dealer's perspective)
  const findNextInsPlayer = useCallback((startIdx, np) => {
    for (let i = startIdx; i < np.length; i++) {
      if ((np[i].isRealPlayer || np[i].isHuman) && np[i].hands[0]?.status !== "sitting_out" && np[i].bankroll > 0) return i;
    }
    return -1;
  }, []);

  const handleInsuranceDecision = useCallback((takeInsurance) => {
    if (!insurancePending) return;
    const { players: np, dc, s, rc } = insurancePending;

    {
      // Record this player's decision
      const newDecisions = { ...insDecisions, [insPlayerIdx]: takeInsurance };
      setInsDecisions(newDecisions);

      // Find next human/real player in seat order
      const nextRP = findNextInsPlayer(insPlayerIdx + 1, np);
      if (nextRP >= 0) {
        setInsPlayerIdx(nextRP);
        setMessage(`${np[nextRP].name} — Insurance?`);
        return;
      }
      // All done — apply all decisions and proceed
      const updatedPlayers = np.map((p, i) => {
        if (p.hands[0]?.status === "sitting_out") return p;
        if (newDecisions[i]) {
          const hand = p.hands[0];
          // Even Money: if player has BJ, settle immediately at 1:1 — no insurance bet needed
          if (isBlackjack(hand.cards)) {
            return { ...p, insurance: 0, bankroll: p.bankroll + hand.bet * 2, hands: [{ ...hand, status: "even_money", result: "even_money" }] };
          }
          const insBet = Math.min(hand.bet / 2, p.bankroll);
          return { ...p, insurance: insBet, bankroll: p.bankroll - insBet };
        }
        return { ...p, insurance: 0 };
      });
      setPlayers(updatedPlayers); playersRef.current = updatedPlayers;
      setInsuranceDialog(false);
      setInsurancePending(null);
      setInsPlayerIdx(-1);
      setInsDecisions({});
      setTimeout(() => proceedAfterInsurance(updatedPlayers, dc, s, rc), 300);
    }
  }, [insurancePending, insPlayerIdx, insDecisions, findNextInsPlayer, proceedAfterInsurance]);

  const performAction = useCallback((action, pState, pIdx, hIdx, dealerCards, s, rc) => {
    // Track actions for human player
    if (pState[pIdx]?.isHuman) {
      handActionsRef.current.push({ action, handIdx: hIdx, timestamp: Date.now() });
    }
    let np = pState.map((p, i) => i === pIdx ? { ...p, hands: p.hands.map(h => ({ ...h })) } : { ...p });
    let shoe = [...s];
    let count = rc;
    const hand = np[pIdx].hands[hIdx];

    if (action === "hit") {
      const card = shoe.pop();
      hand.cards = [...hand.cards, card];
      count += cardCountValue(card, countSystem);
      if (handValue(hand.cards) > 21) hand.status = "busted";
      else if (handValue(hand.cards) === 21) hand.status = "stood";
    } else if (action === "stand") {
      hand.status = "stood";
    } else if (action === "double") {
      const isFree = isFreeBetDouble(hand.cards, settings);
      if (isFree) {
        // Free double: house covers the extra bet
        // Use effective bet (real + free) so free-doubling a free-split hand doubles correctly
        const effectiveBet = hand.bet + (hand.freeBet || 0);
        hand.freeBet = (hand.freeBet || 0) + effectiveBet;
        hand.isDoubled = true;
        np[pIdx].freeBetTokens = (np[pIdx].freeBetTokens || 0) + 1;
      } else {
        const dblBet = Math.min(hand.bet, np[pIdx].bankroll);
        np[pIdx].bankroll -= dblBet;
        hand.bet += dblBet;
        hand.isDoubled = true;
      }
      const card = shoe.pop();
      hand.cards = [...hand.cards, card];
      count += cardCountValue(card, countSystem);
      hand.status = handValue(hand.cards) > 21 ? "busted" : "stood";
    } else if (action === "split") {
      const splitCard = hand.cards[1];
      hand.cards = [hand.cards[0]];
      hand.isSplit = true;
      const isFree = isFreeBetSplit(hand.cards.concat([splitCard]), settings);
      let newBet, newFreeBet = 0;
      if (isFree) {
        // Free split: house covers the second hand's bet
        // Use effective bet so re-splitting a free-split hand gets correct freeBet
        newBet = 0;
        newFreeBet = hand.bet + (hand.freeBet || 0);
        np[pIdx].freeBetTokens = (np[pIdx].freeBetTokens || 0) + 1;
      } else {
        newBet = Math.min(hand.bet, np[pIdx].bankroll);
        np[pIdx].bankroll -= newBet;
      }
      const newHand = { cards: [splitCard], bet: newBet, status: "active", result: null, isDoubled: false, isSplit: true, freeBet: newFreeBet };
      np[pIdx].hands = [...np[pIdx].hands.slice(0, hIdx + 1), newHand, ...np[pIdx].hands.slice(hIdx + 1)];
      np[pIdx].splitCount++;
      const c1 = shoe.pop();
      hand.cards = [...hand.cards, c1];
      count += cardCountValue(c1, countSystem);
      if (splitCard.rank === "A" && settings.aceReceiveOneCard) {
        hand.status = "stood";
        const c2 = shoe.pop();
        np[pIdx].hands[hIdx + 1].cards = [...np[pIdx].hands[hIdx + 1].cards, c2];
        count += cardCountValue(c2, countSystem);
        np[pIdx].hands[hIdx + 1].status = "stood";
      }
    } else if (action === "surrender") {
      hand.status = "surrendered";
      np[pIdx].bankroll += Math.floor(hand.bet / 2);
      hand.result = "surrender";
      np[pIdx].stats = { ...np[pIdx].stats, surrenders: np[pIdx].stats.surrenders + 1 };
    }
    np[pIdx].hands = [...np[pIdx].hands];
    setShoe(shoe); shoeRef.current = shoe;
    setRunningCount(count); rcRef.current = count;
    setPlayers(np); playersRef.current = np;
    return { players: np, shoe, count };
  }, [countSystem, settings]);

  const advanceToNext = useCallback((pState, pIdx, hIdx, dealerCards, s, rc) => {
    const p = pState[pIdx];
    for (let h = hIdx + 1; h < p.hands.length; h++) {
      if (p.hands[h].status === "active") {
        let np = [...pState], shoe = [...s], count = rc;
        if (np[pIdx].hands[h].cards.length === 1) {
          const card = shoe.pop();
          np[pIdx] = { ...np[pIdx], hands: np[pIdx].hands.map((hand, idx) => idx === h ? { ...hand, cards: [...hand.cards, card] } : hand) };
          count += cardCountValue(card, countSystem);
          setShoe(shoe); shoeRef.current = shoe;
          setRunningCount(count); rcRef.current = count;
          setPlayers(np); playersRef.current = np;
        }
        setActivePlayer(pIdx); setActiveHand(h);
        if ((np[pIdx].isHuman || np[pIdx].isRealPlayer) && !np[pIdx].isAutoPlay) {
          setMessage(`${np[pIdx].name}'s turn — Hand ${h + 1}`);
        } else {
          setTimeout(() => autoPlay(np, pIdx, h, dealerCards, shoe, count), 400);
        }
        return;
      }
    }
    // Walk remaining players, pausing on BJ hands to show popout
    // CRITICAL: Always read fresh state from refs to avoid stale closure bugs
    const walkRemaining = (startIdx) => {
      const fp = playersRef.current;
      const freshShoe = shoeRef.current;
      const freshCount = rcRef.current;
      for (let i = startIdx; i < fp.length; i++) {
        if (fp[i].hands[0]?.status === "blackjack" && i > pIdx) {
          setActivePlayer(i); setActiveHand(0);
          setMessage(`${fp[i].name} — BLACKJACK!`);
          setPopoutMessage({
            text: "BLACKJACK!", subtext: fp[i].name,
            color: "#ffd700", glow: "rgba(255,215,0,0.2)",
            stroke: "rgba(139,69,19,0.6)", subColor: "#ffe082",
          });
          setTimeout(() => {
            setPopoutMessage(null);
            walkRemaining(i + 1);
          }, 1000);
          return;
        }
        if (fp[i].hands.some(h => h.status === "active")) {
          const hi = fp[i].hands.findIndex(h => h.status === "active");
          setActivePlayer(i); setActiveHand(hi);
          if ((fp[i].isHuman || fp[i].isRealPlayer) && !fp[i].isAutoPlay) {
            setMessage(`${fp[i].name}'s turn`);
          } else {
            setMessage(`${fp[i].name} playing...`);
            setTimeout(() => autoPlay(fp, i, hi, dealerCards, freshShoe, freshCount), 300);
          }
          return;
        }
      }
      setPhase(PHASES.DEALER_TURN);
      setTimeout(() => playDealerTurn(fp, dealerCards, freshShoe, freshCount), 400);
    };
    walkRemaining(pIdx + 1);
  }, [countSystem]);

  const autoPlay = useCallback((pState, pIdx, hIdx, dealerCards, s, rc) => {
    const hand = pState[pIdx].hands[hIdx];
    if (hand.status !== "active") { advanceToNext(pState, pIdx, hIdx, dealerCards, s, rc); return; }
    const player = pState[pIdx];
    // Human/real players on autoPlay still use count-adjusted strategy; AI uses personality
    let action;
    if (player.isHuman || player.isRealPlayer) {
      const tcNow = getTrueCount(rc, s.length, settings.deckCount);
      action = getCountAdjustedAction(hand.cards, dealerCards[0].rank, settings, tcNow, hand.isSplit, player.splitCount);
    } else {
      const tcNow = getTrueCount(rc, s.length, settings.deckCount);
      action = getAIAction(player.personality || "casual", hand.cards, dealerCards[0].rank, settings, tcNow, hand.isSplit, player.splitCount);
    }
    const result = performAction(action, pState, pIdx, hIdx, dealerCards, s, rc);
    const newHand = result.players[pIdx].hands[hIdx];
    if (newHand.status === "active") {
      setTimeout(() => autoPlay(result.players, pIdx, hIdx, dealerCards, result.shoe, result.count), 300);
    } else {
      setTimeout(() => advanceToNext(result.players, pIdx, hIdx, dealerCards, result.shoe, result.count), 300);
    }
  }, [settings, performAction, advanceToNext]);

  const handleHumanAction = useCallback((action) => {
    // CRITICAL: Read fresh shoe/count from refs to avoid stale closure after AI chain
    const freshPlayers = playersRef.current;
    const freshShoe = shoeRef.current;
    const freshCount = rcRef.current;
    // Check suggestion BEFORE applying the action to avoid double-action bug
    if (suggestions && (freshPlayers[activePlayer]?.isHuman || freshPlayers[activePlayer]?.isRealPlayer)) {
      const basicAction = getBasicAction(freshPlayers[activePlayer].hands[activeHand].cards, dealer.cards[0].rank, settings, freshPlayers[activePlayer].hands[activeHand].isSplit, freshPlayers[activePlayer].splitCount);
      if (basicAction !== action) {
        setSuggestionDialog({ suggested: basicAction, chosen: action });
        return;
      }
    }
    const result = performAction(action, freshPlayers, activePlayer, activeHand, dealer.cards, freshShoe, freshCount);
    finishHumanAction(result, activePlayer, activeHand);
  }, [activePlayer, activeHand, dealer, performAction, settings, suggestions]);

  const finishHumanAction = (result, playerIdx, handIdx) => {
    const newHand = result.players[playerIdx].hands[handIdx];
    if (newHand.status === "active") {
      if (result.players[playerIdx].isAutoPlay) {
        setTimeout(() => autoPlay(result.players, playerIdx, handIdx, dealer.cards, result.shoe, result.count), 400);
      }
    } else {
      setTimeout(() => advanceToNext(result.players, playerIdx, handIdx, dealer.cards, result.shoe, result.count), 350);
    }
  };

  // Execute pending double/split AFTER rebuy chips have been added to players state
  useEffect(() => {
    if (executeAfterRebuy) {
      const action = executeAfterRebuy;
      setExecuteAfterRebuy(null);
      // Now `players` reflects the updated bankroll from the rebuy
      // Skip suggestion check — user already committed to this action
      // CRITICAL: Read fresh state from refs — players state IS fresh here (from rebuy useEffect), but shoe/count may be stale
      const result = performAction(action, playersRef.current, activePlayer, activeHand, dealer.cards, shoeRef.current, rcRef.current);
      finishHumanAction(result, activePlayer, activeHand);
    }
  }, [executeAfterRebuy, players, activePlayer, activeHand, dealer, shoe, runningCount, performAction]);

  const handlePlayAIHand = useCallback(() => {
    // CRITICAL: Read fresh state from refs to avoid stale closure
    autoPlay(playersRef.current, activePlayer, activeHand, dealer.cards, shoeRef.current, rcRef.current);
  }, [activePlayer, activeHand, dealer, autoPlay]);

  const playDealerTurn = useCallback((_pState, dealerCards, s, rc) => {
    // CRITICAL: Always read fresh player state from ref to avoid stale closure bugs
    // The pState passed through autoPlay/advanceToNext chains can become stale when
    // multiple AI players take turns and React batches setPlayers calls
    const freshPlayers = playersRef.current;
    let dc = [...dealerCards], shoe = [...s], count = rc;
    count += cardCountValue(dc[1], countSystem);
    const allDone = freshPlayers.every(p => p.hands.every(h => h.status === "busted" || h.status === "surrendered" || h.status === "sitting_out" || h.status === "blackjack"));
    if (!allDone) {
      while (true) {
        const val = handValue(dc), soft17 = val === 17 && isSoft(dc);
        if (val > 21 || val > 17 || (val === 17 && !(settings.dealerHitsSoft17 && soft17))) break;
        const card = shoe.pop();
        dc = [...dc, card];
        count += cardCountValue(card, countSystem);
      }
    }
    setShoe(shoe); shoeRef.current = shoe;
    setRunningCount(count); rcRef.current = count;
    setDealer({ cards: dc, hidden: false });
    setMessage(handValue(dc) > 21 ? "Dealer busts!" : `Dealer stands on ${handValue(dc)}`);
    setTimeout(() => settleHands(freshPlayers, dc, true, shoe, count), 800);
  }, [countSystem, settings]);

  const settleHands = useCallback((pState, dealerCards, _dp, s, rc) => {
    // Prevent double-settlement: if this hand was already settled, skip entirely
    if (handSettledRef.current) return;
    handSettledRef.current = true;

    // ═══════════════════════════════════════════════════════════
    // DEALER EVALUATION — compute once, used for all comparisons
    // ═══════════════════════════════════════════════════════════
    const dVal = handValue(dealerCards);
    const dBJ = isBlackjack(dealerCards);   // exactly 2 cards totaling 21
    const dBust = dVal > 21;
    const isFreeBetMode = settings.gameType === "freeBet";
    const dealer22Push = isFreeBetMode && dBust && dVal === 22;

    console.log(`[SETTLE] Dealer: ${dealerCards.map(c=>c.rank+c.suit).join(",")} val=${dVal} BJ=${dBJ} bust=${dBust} d22push=${dealer22Push}`);

    // Record dealer bust/stand for bust history panel (skip BJ hands — dealer didn't "play")
    if (!dBJ) {
      setDealerBustHistory(prev => {
        const updated = [...prev, dBust];
        return updated.length > 50 ? updated.slice(-50) : updated;
      });
    }

    // ═══════════════════════════════════════════════════════════
    // SETTLE EACH PLAYER'S HANDS
    // ═══════════════════════════════════════════════════════════
    const np = pState.map(p => {
      const pp = { ...p, stats: { ...p.stats }, hands: p.hands.map(h => ({ ...h })) };

      for (const hand of pp.hands) {
        // ── Skip hands that don't need settlement ──
        if (hand.status === "sitting_out") continue;

        // Even money: already settled at 1:1 during insurance phase
        if (hand.result === "even_money") {
          continue;
        }

        // Surrendered hands: already half-refunded, just count stats
        if (hand.result === "surrender") {
          continue;
        }

        // Blackjack hands: status="blackjack" was set during deal phase.
        // Settlement handles ALL payouts — check vs dealer BJ for push.
        if (hand.status === "blackjack") {
          if (dBJ) {
            // Both have blackjack → push
            hand.result = "push";
            pp.bankroll += hand.bet; // return bet only
            console.log(`[SETTLE] ${pp.name}: PUSH (both have BJ)`);
          } else {
            // Player BJ wins
            hand.result = "blackjack";
            pp.bankroll += hand.bet + hand.bet * settings.blackjackPays;
            pp.stats.blackjacks++;
            console.log(`[SETTLE] ${pp.name}: BLACKJACK pays ${settings.blackjackPays}x`);
          }
          continue;
        }

        // ── Normal hand settlement ──
        const pVal = handValue(hand.cards);
        const pBJ = isBlackjack(hand.cards) && !hand.isSplit; // natural BJ (not from split)
        const fb = hand.freeBet || 0;

        console.log(`[SETTLE] ${pp.name}: ${hand.cards.map(c=>c.rank+c.suit).join(",")} val=${pVal} status=${hand.status} pBJ=${pBJ} bet=${hand.bet}`);

        // ── SCENARIO 1: Player busted (> 21) ──
        // Player loses regardless of dealer outcome. Bet already deducted.
        if (hand.status === "busted" || pVal > 21) {
          hand.result = "loss";
          console.log(`[SETTLE]   → LOSS (busted)`);
        }
        // ── SCENARIO 2: Both have natural blackjack ──

            if (a === "double" && cards.length === 2) { bets[i] += Math.min(bets[i], sp[i].bankroll); const c = simShoe.pop(); cards.push(c); simRC += cardCountValue(c, countSystem); break; }
            const c = simShoe.pop(); cards.push(c); simRC += cardCountValue(c, countSystem);
          }
          if (pVals.length <= i) { pVals.push(handValue(cards)); pBust.push(handValue(cards) > 21); }
        }

          sp[i].hands++;

          else if (pBJs[i] && dbj) sp[i].pushes++;

          else { sp[i].losses++; sp[i].bankroll -= bets[i]; }
        }
