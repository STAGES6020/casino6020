                    borderLeft: i === 0 ? "3px solid #ffd700" : "3px solid transparent",
                    marginBottom: 2,
                  }}>
                    <span style={{ width: 24, fontWeight: "bold" }}>#{i + 1}</span>
                    <span style={{ flex: 1, fontWeight: i === 0 ? "bold" : "normal" }}>{s.name} {s.isHuman ? "(You)" : ""}</span>
                    <span style={{ fontSize: 12 }}>{s.handsWon}W / {s.handsPlayed}H</span>
                  </div>
                ))
              }
            </div>

            {/* Buttons */}
            <div style={{ display: "flex", justifyContent: "center", gap: 16 }}>
              <button onClick={() => { setGameOver(null); setScreen("setup"); }} style={{
                padding: "14px 36px", fontSize: 16, fontWeight: "bold",
                background: "linear-gradient(135deg, #ffd700, #ff8f00)",
                color: "#1a1a2e", border: "none", borderRadius: 10, cursor: "pointer",

                letterSpacing: 1,
              }}>New Game</button>
              {onExitToLobby && (
                <button onClick={() => { setGameOver(null); onExitToLobby(); }} style={{

                }}>Lobby</button>
              )}
            </div>
          </div>
        </div>
      )}

      {/* ── DYNAMIC PER-SEAT KEYFRAMES ── */}
      <style>{`
        ${seatPositions.map((pos, i) => `
          @keyframes flyToSeat${i}_0 {
            0% { left: 50%; top: 16%; opacity: 0.8; transform: scale(0.7) rotate(0deg); }
            80% { opacity: 1; }
            100% { left: calc(${pos.left}% - 10px); top: calc(${pos.top}% - 20px); opacity: 1; transform: scale(1) rotate(-3deg); }
          }
          @keyframes flyToSeat${i}_1 {
            0% { left: 50%; top: 16%; opacity: 0.8; transform: scale(0.7) rotate(0deg); }
            80% { opacity: 1; }
            100% { left: calc(${pos.left}% + 10px); top: calc(${pos.top}% - 20px); opacity: 1; transform: scale(1) rotate(4deg); }
          }
          @keyframes potSweepToSeat${i} {
            0% { left: 50%; top: 55%; opacity: 1; transform: translate(-50%, -50%) scale(1); }
            40% { transform: translate(-50%, -50%) scale(1.3); }
            100% { left: ${pos.left}%; top: ${pos.top}%; opacity: 0.3; transform: translate(-50%, -50%) scale(0.5); }
          }
          @keyframes betChipFly${i} {
            0% { left: ${pos.left}%; top: ${pos.top}%; opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { left: ${pos.left + (50 - pos.left) * 0.42}%; top: ${pos.top + (42 - pos.top) * 0.42}%; opacity: 1; transform: translate(-50%, -50%) scale(0.9); }
          }
        `).join("")}
      `}</style>

      {/* ── ANIMATIONS ── */}
      <style>{`
        @keyframes communityDeal {
          0% { opacity: 0; transform: translateY(-60px) scale(0.5); }
          100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes dealSlide {
          0% { opacity: 0; transform: translateY(-40px) scale(0.5); }
          70% { opacity: 1; transform: translateY(2px) scale(1.02); }
          100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes chipSlide {
          0% { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
          60% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
          100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
        @keyframes chipToPot {
          from { opacity: 1; }
          to { opacity: 0; left: 50%; top: 55%; }
        }
        @keyframes cardLand {
          from { opacity: 0; transform: translateY(-20px) rotate(45deg); }
          to { opacity: 1; transform: translateY(0) rotate(0deg); }
        }
        @keyframes winnerPop {
          0% { opacity: 0; transform: translate(-50%, -50%) scale(0.4); }
          50% { opacity: 1; transform: translate(-50%, -50%) scale(1.08); }
          100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
        @keyframes winnerGlow {
          0%, 100% { text-shadow: 0 0 10px rgba(255,215,0,0.6); }
          50% { text-shadow: 0 0 20px rgba(255,215,0,0.9), 0 0 30px rgba(255,215,0,0.4); }
        }
        @keyframes allInPulse {
          0%, 100% { opacity: 1; }
          50% { opacity: 0.7; }
        }
        @keyframes actionPop {
          0% { opacity: 0; transform: translateX(-50%) translateY(8px) scale(0.7); }
          100% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
        }
        @keyframes burnSlide {
          from { opacity: 0; transform: translateX(-10px); }
          to { opacity: 0.6; transform: translateX(0); }
        }
        @keyframes foldSweep {
          from { opacity: 1; }
          to { opacity: 0.6; transform: scale(0.9); }
        }
        @keyframes casinoShine {
          0%, 100% { filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)) brightness(1); }
          50% { filter: drop-shadow(0 2px 8px rgba(255,215,0,0.3)) brightness(1.15); }
        }
        @keyframes activeGlow {
          0%, 100% { box-shadow: 0 0 20px rgba(255,215,0,0.35), 0 4px 12px rgba(0,0,0,0.4); }
          50% { box-shadow: 0 0 30px rgba(255,215,0,0.55), 0 4px 16px rgba(0,0,0,0.4); }
        }
        @keyframes victoryFadeIn {
          0% { opacity: 0; }
          100% { opacity: 1; }
        }
        @keyframes trophyBounce {
          0%, 100% { transform: translateY(0) scale(1); }
          50% { transform: translateY(-10px) scale(1.1); }
        }
      `}</style>
    </div>
  );
}

return App; })();
