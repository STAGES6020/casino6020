}

// ===================== DATA CENTER =====================
function DataCenter({ onBack, backLabel = "Back to Settings" }) {
  const [gameLog, setGameLog] = useState(() => {
    try { const d = localStorage.getItem("bj6020_gameLog"); return d ? JSON.parse(d) : []; } catch { return []; }
  });
  const [tab, setTab] = useState("summary");
  const [confirmClear, setConfirmClear] = useState(false);
  const [selectedPlayer, setSelectedPlayer] = useState("all");

  // Derive unique player names from log
  const playerNames = useMemo(() => {
    const names = new Set();
    for (const h of gameLog) {
      if (h.playerName) names.add(h.playerName);
    }
    return Array.from(names);
  }, [gameLog]);

  // Filter log by selected player (or show all)
  const log = selectedPlayer === "all" ? gameLog : gameLog.filter(h => h.playerName === selectedPlayer);
  const total = log.length;

  // Compute summary stats
  const wins = log.filter(h => h.overallResult === "win").length;
  const losses = log.filter(h => h.overallResult === "loss").length;
  const pushes = log.filter(h => h.overallResult === "push").length;
  const blackjacks = log.filter(h => h.wasBlackjack).length;
  const doubles = log.filter(h => h.didDouble).length;
  const splits = log.filter(h => h.didSplit).length;
  const surrenders = log.filter(h => h.didSurrender).length;
  const totalBet = log.reduce((s, h) => s + (h.totalBet || 0), 0);
  const avgBet = total > 0 ? (totalBet / total).toFixed(0) : 0;

  // Compute overall P&L using session-level calculation:
  // For each session: P&L = lastBankrollAfter - firstBankrollBefore - betweenHandRebuys - midHandRebuys
  // This is simple and can't drift.
  const computeSessionNet = (hands) => {
    if (hands.length === 0) return 0;
    const startBank = hands[0].bankrollBefore;
    const endBank = hands[hands.length - 1].bankrollAfter;
    // Detect between-hand rebuys and withdrawals from bankroll gaps
    let betweenRebuys = 0;
    let betweenWithdrawals = 0;
    for (let i = 1; i < hands.length; i++) {
      const gap = (hands[i].bankrollBefore || 0) - (hands[i - 1].bankrollAfter || 0);
      if (gap > 0) betweenRebuys += gap;
      if (gap < 0) betweenWithdrawals += Math.abs(gap); // player cashed out between hands
    }
    // Mid-hand rebuys already tracked in records
    const midRebuys = hands.reduce((s, h) => s + (h.midHandRebuy || 0), 0);
    // Net = end - start - money_added + money_removed
    return endBank - startBank - betweenRebuys - midRebuys + betweenWithdrawals;
  };
  // Group hands by session AND player so each bankroll stream is computed separately
  const sessionPlayerGroups = {};
  for (const h of log) {
    const key = (h.sessionId || "unknown") + "|" + (h.playerName || "Host");
    if (!sessionPlayerGroups[key]) sessionPlayerGroups[key] = [];
    sessionPlayerGroups[key].push(h);
  }
  const totalNet = Object.values(sessionPlayerGroups).reduce((s, hands) => s + computeSessionNet(hands), 0);

  // By game type
  const byGameType = {};
  for (const h of log) {
    const gt = h.gameType || "standard";
    if (!byGameType[gt]) byGameType[gt] = { hands: 0, wins: 0, losses: 0, pushes: 0, net: 0, bjs: 0 };
    byGameType[gt].hands++;
    if (h.overallResult === "win") byGameType[gt].wins++;
    else if (h.overallResult === "loss") byGameType[gt].losses++;
    else byGameType[gt].pushes++;
    if (h.wasBlackjack) byGameType[gt].bjs++;
    byGameType[gt].net += h.netResult || 0;
  }

  // Streak analysis
  const streakAnalysis = (type) => {
    const freq = {};
    let streak = 0;
    for (const h of log) {
      if (h.overallResult === type || (type === "win" && h.wasBlackjack)) {
        streak++;
      } else if (h.overallResult === "push") {
        // pushes don't break streaks — just skip them
        continue;
      } else {
        // "at least N" counting: a streak of 7 also counts for 1-6
        for (let i = 1; i <= streak; i++) freq[i] = (freq[i] || 0) + 1;
        streak = 0;
      }
    }
    for (let i = 1; i <= streak; i++) freq[i] = (freq[i] || 0) + 1;
    return freq;
  };
  const winStreaks = streakAnalysis("win");
  const lossStreaks = streakAnalysis("loss");

  // Side bet stats
  const pogBets = log.filter(h => (h.potOfGoldBet || 0) > 0);
  const pogWins = pogBets.filter(h => (h.potOfGoldPayout || 0) > 0);
  const ninexBets = log.filter(h => (h.sideBet9x || 0) > 0);
  const ninexWins = ninexBets.filter(h => h.sideBet9xResult === "win");

  // Session breakdown — using session-level P&L (endBank - startBank - rebuys)
  const sessions = {};
  for (const [key, hands] of Object.entries(sessionPlayerGroups)) {
    const sid = key.split("|")[0];
    const pName = key.split("|")[1] || "Host";
    const net = computeSessionNet(hands);
    const sKey = selectedPlayer === "all" ? key : sid; // unique key per player-session when viewing all
    sessions[sKey] = {
      start: hands[0].timestamp,
      end: hands[hands.length - 1].timestamp,
      hands: hands.length,
      net,
      gameType: hands[0].gameType,
      startBank: hands[0].bankrollBefore,
      endBank: hands[hands.length - 1].bankrollAfter,
      playerName: pName,
    };
  }

  // Position stats
  const bySeat = {};
  for (const h of log) {
    const seat = h.humanSeat ?? 0;
    if (!bySeat[seat]) bySeat[seat] = { hands: 0, wins: 0, net: 0 };
    bySeat[seat].hands++;
    if (h.overallResult === "win") bySeat[seat].wins++;
    bySeat[seat].net += h.netResult || 0;
  }

  // Player count stats
  const byPlayers = {};
  for (const h of log) {
    const n = h.numPlayers || 1;
    if (!byPlayers[n]) byPlayers[n] = { hands: 0, wins: 0, net: 0 };
    byPlayers[n].hands++;
    if (h.overallResult === "win") byPlayers[n].wins++;
    byPlayers[n].net += h.netResult || 0;
  }

  // Export to JSON
  const exportJSON = () => {
    const blob = new Blob([JSON.stringify({ gameLog: log, overallBalance: totalNet, exportDate: new Date().toISOString() }, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `6020Casino_Data_${new Date().toISOString().slice(0,10)}.json`;
    a.click(); URL.revokeObjectURL(url);
  };

  // Export to CSV
  const exportCSV = () => {
    if (log.length === 0) return;
    const cols = ["timestamp","sessionId","playerName","gameType","handNumber","numPlayers","humanSeat","deckCount",
      "overallResult","wasBlackjack","didDouble","didSplit","didSurrender","totalBet","netResult",
      "bankrollBefore","bankrollAfter","dealerFinalTotal","dealerBusted","dealerBlackjack","dealer22Push",
      "potOfGoldBet","potOfGoldPayout","sideBet9x","sideBet9xResult","insuranceTaken","insuranceAmount",
      "runningCount","trueCount","shoeCardsRemaining",
      "currentWinStreak","currentLossStreak","splitCount","numHands",
      "playerBusted","playerBustCount","lostToDealerBeat","lostToBust","lostToDealerBJ",
      "dealerUpCardRank","dealerCardCount","dealerHitCount","dealerSoft"];
    const rows = [cols.join(",")];
    for (const h of log) {
      rows.push(cols.map(c => {
        let v = h[c];
        if (v === null || v === undefined) return "";
        if (typeof v === "boolean") return v ? "TRUE" : "FALSE";
        if (typeof v === "string" && v.includes(",")) return `"${v}"`;
        return String(v);
      }).join(","));
    }
    const blob = new Blob([rows.join("\n")], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `6020Casino_Data_${new Date().toISOString().slice(0,10)}.csv`;
    a.click(); URL.revokeObjectURL(url);
  };

  // Import JSON
  const importJSON = () => {
    const input = document.createElement("input");
    input.type = "file"; input.accept = ".json";
    input.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          if (data.gameLog && Array.isArray(data.gameLog)) {
            setGameLog(data.gameLog);
            localStorage.setItem("bj6020_gameLog", JSON.stringify(data.gameLog));
            // Overall balance is auto-computed from log data — just clear stored value
            localStorage.removeItem("bj6020_overallBal");
          }

            <div style={statRow}><span>Total Wagered</span><span>${ninexBets.reduce((s,h) => s + h.sideBet9x, 0).toLocaleString()}</span></div>

            <div style={sec}>INSURANCE</div>
            {(() => {

                <div style={statRow}><span>Times Taken</span><span>{insBets.length}</span></div>
                <div style={statRow}><span>Total Wagered</span><span>${insBets.reduce((s,h) => s + (h.insuranceAmount || 0), 0).toLocaleString()}</span></div>
              </>);
            })()}
          </div>)}

          {tab === "sessions" && (<div>
            <div style={sec}>SESSION HISTORY</div>
            {Object.entries(sessions).length === 0 ? <div style={{ color: "#666", padding: 10 }}>No sessions recorded</div> :
              Object.entries(sessions).reverse().map(([sid, s]) => (
                <div key={sid} style={{ padding: "10px 0", borderBottom: "1px solid rgba(255,255,255,0.08)" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                    <span style={{ color: "#64b5f6", fontWeight: "bold", fontSize: 13 }}>
                      {new Date(s.start).toLocaleDateString()} {new Date(s.start).toLocaleTimeString([], {hour: "2-digit", minute: "2-digit"})}
                    </span>
                    <span style={{ color: s.net >= 0 ? "#4caf50" : "#ef5350", fontWeight: "bold" }}>
                      {s.net >= 0 ? "+" : ""}${s.net.toLocaleString()}

                  </div>
                  <div style={{ display: "flex", gap: 16, fontSize: 12, color: "#888" }}>

                    <span>{s.hands} hands</span>
                    <span>${(s.startBank || 0).toLocaleString()} → ${(s.endBank || 0).toLocaleString()}</span>

          {tab === "position" && (<div>
            <div style={sec}>BY TABLE SEAT</div>

              <div key={seat} style={statRow}>
                <span>Seat {Number(seat) + 1}</span>
                <span>{d.hands} hands, {d.hands > 0 ? (d.wins/d.hands*100).toFixed(1) : 0}% WR, <span style={{ color: d.net >= 0 ? "#4caf50" : "#ef5350" }}>{d.net >= 0 ? "+" : ""}${d.net.toLocaleString()}</span></span>
              </div>
            ))}
            <div style={sec}>BY NUMBER OF PLAYERS</div>
            {Object.entries(byPlayers).sort(([a],[b]) => Number(a) - Number(b)).map(([n, d]) => (
              <div key={n} style={statRow}>
                <span>{n} player{Number(n) !== 1 ? "s" : ""}</span>
                <span>{d.hands} hands, {d.hands > 0 ? (d.wins/d.hands*100).toFixed(1) : 0}% WR, <span style={{ color: d.net >= 0 ? "#4caf50" : "#ef5350" }}>{d.net >= 0 ? "+" : ""}${d.net.toLocaleString()}</span></span>
              </div>
            ))}

            <div style={sec}>BY DECK COUNT</div>
            {(() => {
              const byDeck = {};
              for (const h of log) {
                const dc = h.deckCount || 8;
                if (!byDeck[dc]) byDeck[dc] = { hands: 0, wins: 0, net: 0 };
                byDeck[dc].hands++;
                if (h.overallResult === "win") byDeck[dc].wins++;
                byDeck[dc].net += h.netResult || 0;
              }
              return Object.entries(byDeck).sort(([a],[b]) => Number(a) - Number(b)).map(([dc, d]) => (
                <div key={dc} style={statRow}>
                  <span>{dc} deck{Number(dc) !== 1 ? "s" : ""}</span>
                  <span>{d.hands} hands, {d.hands > 0 ? (d.wins/d.hands*100).toFixed(1) : 0}% WR, <span style={{ color: d.net >= 0 ? "#4caf50" : "#ef5350" }}>{d.net >= 0 ? "+" : ""}${d.net.toLocaleString()}</span></span>
                </div>
              ));
            })()}
          </div>)}

          {tab === "export" && (<div>
            <div style={sec}>EXPORT DATA</div>
            <div style={{ display: "flex", gap: 10, marginTop: 10, flexWrap: "wrap" }}>
              <button onClick={exportJSON} style={{ padding: "10px 20px", borderRadius: 6, border: "none", background: "#4caf50", color: "#fff", fontWeight: "bold", cursor: "pointer" }}>

              </button>
            </div>
            <p style={{ color: "#888", fontSize: 12, marginTop: 8 }}>JSON includes full hand detail (cards, actions). CSV includes summary columns for spreadsheet analysis.</p>

            <div style={sec}>IMPORT DATA</div>
            <div style={{ display: "flex", gap: 10, marginTop: 10 }}>
              <button onClick={importJSON} style={{ padding: "10px 20px", borderRadius: 6, border: "none", background: "#ff9800", color: "#fff", fontWeight: "bold", cursor: "pointer" }}>
                Import JSON File
              </button>
            </div>
            <p style={{ color: "#888", fontSize: 12, marginTop: 8 }}>Import a previously exported JSON file to restore your data.</p>

            <div style={sec}>CLEAR DATA</div>
            {!confirmClear ? (
              <button onClick={() => setConfirmClear(true)} style={{ marginTop: 10, padding: "10px 20px", borderRadius: 6, border: "1px solid #ef5350", background: "transparent", color: "#ef5350", fontWeight: "bold", cursor: "pointer" }}>
                Clear All Data
              </button>
            ) : (
              <div style={{ marginTop: 10, display: "flex", gap: 10, alignItems: "center" }}>
                <span style={{ color: "#ef5350", fontSize: 14 }}>Are you sure? This cannot be undone.</span>
                <button onClick={clearData} style={{ padding: "8px 16px", borderRadius: 6, border: "none", background: "#ef5350", color: "#fff", fontWeight: "bold", cursor: "pointer" }}>Yes, Delete All</button>
                <button onClick={() => setConfirmClear(false)} style={{ padding: "8px 16px", borderRadius: 6, border: "1px solid #555", background: "transparent", color: "#aaa", cursor: "pointer" }}>Cancel</button>
              </div>
            )}

            <div style={sec}>DATA FIELDS TRACKED PER HAND</div>
            <div style={{ fontSize: 11, color: "#666", lineHeight: 1.6, marginTop: 6, columnCount: 2, columnGap: 20 }}>
              {["timestamp","sessionId","playerName","gameType","handNumber","numPlayers","humanSeat","deckCount","penetration",
                "tableMin","tableMax","dealerHitsSoft17","dealerPeeks","doubleOn","surrender",
                "playerHands (cards, totals, bets, results)","dealerUpCard","dealerHoleCard","dealerFinalCards",
                "dealerFinalTotal","dealerBusted","dealerBlackjack","dealer22Push",
                "actions (every action with timestamp)","didDouble","didSplit","didSurrender","wasBlackjack","splitCount","numHands",
                "potOfGoldBet","potOfGoldTokens","potOfGoldPayout","sideBet9x","sideBet9xResult",
                "insuranceTaken","insuranceAmount","freeBetTokensEarned",
                "playerBusted","playerBustCount","lostToDealerBeat","lostToBust","lostToDealerBJ",
                "dealerUpCardRank","dealerCardCount","dealerHitCount","dealerSoft",
                "playerHandDetails (per-hand bust/double/split detail)",
                "overallResult","handResults","totalBet","netResult","bankrollBefore","bankrollAfter",
                "runningCount","trueCount","shoeCardsRemaining",
                "currentWinStreak","currentLossStreak","maxWinStreakSession","maxLossStreakSession"
              ].map(f => <div key={f}>{f}</div>)}
            </div>
          </div>)}

        </div>
      </div>
    </div>
  );
}

// ===================== SEAT PICKER SCREEN (FULL-SCREEN) =====================
function SeatPickerScreen({ settings, onUpdate, onDeal, onBack }) {
  const s = settings;
  const config = s.seatConfig || [];
  const filledCount = config.filter(sc => sc.type !== "empty").length;
  const humanCount = config.filter(sc => sc.type === "human").length;
  const aiCount = config.filter(sc => sc.type === "ai").length;
  const hasHost = config.some(sc => sc.isHost && sc.type === "human");

  // Step 1: "Which seat are you sitting in?" — shows on entry if no host tagged yet
  const [hostPicked, setHostPicked] = useState(hasHost);

  // popup: null | { seatIdx, mode: "choose"|"edit"|"playerSetup"|"hostSetup" }
  const [popup, setPopup] = useState(null);

  const setSeatType = (i, type) => {
    const newConfig = [...config];
    const seat = newConfig[i];
    if (type === "empty") {
      // Don't allow removing the last filled seat
      const otherFilled = newConfig.filter((sc, idx) => idx !== i && sc.type !== "empty").length;
      if (otherFilled === 0 && seat.isHost) return; // Can't remove host
    }
    if (type !== "human" && seat.type === "human" && seat.isHost) {
      // Removing the host seat — transfer host to next human if one exists
      const otherHumans = newConfig.filter((sc, idx) => idx !== i && sc.type === "human");
      if (otherHumans.length === 0 && type === "empty") return; // Must keep at least one human
    }
    newConfig[i] = { ...newConfig[i], type, name: type === "empty" ? "" : newConfig[i].name, buyIn: (type === "empty" || type === "ai") ? 0 : newConfig[i].buyIn };
    // Auto-manage isHost: if removing a host, transfer to next human
    if (seat.isHost && type !== "human") {
      newConfig[i].isHost = false;
      const nextHuman = newConfig.findIndex((sc, idx) => idx !== i && sc.type === "human");
      if (nextHuman >= 0) newConfig[nextHuman] = { ...newConfig[nextHuman], isHost: true };
    }
    if (type === "human" && !newConfig.some(sc => sc.isHost && sc.type === "human")) {
      newConfig[i].isHost = true;
    }
    onUpdate({ ...s, seatConfig: newConfig });
  };

  const removeSeat = (i) => {
    setSeatType(i, "empty");
    setPopup(null);
  };

  const updateSeatField = (i, field, value) => {
    const newConfig = [...config];
    newConfig[i] = { ...newConfig[i], [field]: value };
    // If the host changes their buy-in, it becomes the table default
    if (field === "buyIn" && newConfig[i].isHost && value > 0) {
      onUpdate({ ...s, buyIn: value, seatConfig: newConfig });
    } else {
      onUpdate({ ...s, seatConfig: newConfig });
    }
  };

  // Host picks their seat — step 1 of the flow
  const claimHostSeat = (i) => {
    const newConfig = config.map((sc, idx) => {
      if (idx === i) return { ...sc, type: "human", isHost: true, name: sc.name || "", buyIn: 0 };
      return { ...sc, isHost: false };
    });
    onUpdate({ ...s, seatConfig: newConfig });
    setHostPicked(true);
    // Immediately open the host setup popup (name + buy-in)
    setPopup({ seatIdx: i, mode: "hostSetup" });
  };

  const handleDeal = () => {
    if (!canDeal) return;
    onDeal();
  };

  const canDeal = filledCount >= 1 && humanCount >= 1 && hasHost;

  const seatPositions = [
    { left: "92%", top: "24%" },
    { left: "78%", top: "46%" },
    { left: "60%", top: "60%" },
    { left: "40%", top: "60%" },
    { left: "22%", top: "46%" },
    { left: "8%",  top: "24%" },
  ];

  const popupBtnStyle = (color, bg, border) => ({
    padding: "14px 28px", borderRadius: 12, fontSize: 16, fontWeight: "bold", cursor: "pointer",
    border: `2px solid ${border}`, background: bg, color: color,
    letterSpacing: 1, transition: "all 0.15s", minWidth: 140, textAlign: "center",
    boxShadow: "0 3px 12px rgba(0,0,0,0.3)",
  });

  // Custom buy-in input state
  const [customBuyIn, setCustomBuyIn] = useState("");

  // Buy-in section (shared by hostSetup and playerSetup)
  const buyInSection = (seatIdx) => {
    const seat = config[seatIdx];
    const isHost = seat.isHost;
    const amounts = [500, 700, 1000, 2000, 5000, 10000];
    const activeBuyIn = seat.buyIn > 0 ? seat.buyIn : s.buyIn;
    const isCustom = seat.buyIn > 0 && !amounts.includes(seat.buyIn) && !((!isHost) && seat.buyIn === 0);
    return (
      <div>
        <div style={{ display: "flex", gap: 5, flexWrap: "wrap", justifyContent: "center", marginBottom: 10 }}>
          {amounts.map(v => {
            const isActive = isHost ? (activeBuyIn === v) : (seat.buyIn === v);
            const isDefault = !isHost && seat.buyIn === 0 && v === s.buyIn;
            const highlighted = isActive || isDefault;
            return (
              <button key={v} onClick={() => { updateSeatField(seatIdx, "buyIn", v); setCustomBuyIn(""); }}
                style={{
                  padding: "9px 14px", borderRadius: 8, fontSize: 14, fontWeight: "bold", cursor: "pointer",
                  border: "2px solid " + (highlighted ? "#ffd700" : "rgba(255,215,0,0.15)"),
                  background: highlighted ? "rgba(255,215,0,0.2)" : "rgba(0,0,0,0.3)",
                  color: highlighted ? "#ffd700" : "rgba(255,255,255,0.45)",
                  transition: "all 0.15s",
                }}>${v.toLocaleString()}</button>
            );
          })}
        </div>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
          <span style={{ color: "rgba(255,215,0,0.5)", fontSize: 13 }}>or</span>
          <div style={{ position: "relative", display: "inline-flex", alignItems: "center" }}>
            <span style={{ position: "absolute", left: 12, color: isCustom ? "#ffd700" : "rgba(255,215,0,0.4)", fontSize: 16, fontWeight: "bold", pointerEvents: "none" }}>$</span>
            <input type="text" inputMode="numeric" placeholder="Custom..."
              value={customBuyIn}
              onChange={e => {
                const val = e.target.value.replace(/[^0-9]/g, "");
                setCustomBuyIn(val);
                const num = parseInt(val);
                if (num >= 100) updateSeatField(seatIdx, "buyIn", num);
              }}
              onFocus={() => { if (isCustom) setCustomBuyIn(String(seat.buyIn)); }}
              style={{
                padding: "9px 12px 9px 26px", borderRadius: 8, width: 140,
                border: "2px solid " + (isCustom ? "#ffd700" : "rgba(255,215,0,0.15)"),
                background: isCustom ? "rgba(255,215,0,0.2)" : "rgba(0,0,0,0.3)",
                color: isCustom ? "#ffd700" : "#fff", fontSize: 14, fontWeight: "bold",
                outline: "none", transition: "all 0.15s",
              }} />
          </div>
        </div>
      </div>
    );
  };

  return (
    <div style={{
      height: "100vh", width: "100vw", overflow: "auto",
      background: "radial-gradient(ellipse 130% 90% at 50% 40%, #1a5c1a 0%, #0e3d0e 40%, #071a07 100%)",
      display: "flex", flexDirection: "column", alignItems: "center",
      fontFamily: "'Segoe UI', sans-serif",
    }}>
      {/* Inject animations */}
      <style>{`
        @keyframes arrowPulse { 0%,100% { opacity: 0.4; transform: translateY(0); } 50% { opacity: 1; transform: translateY(4px); } }
        @keyframes seatGlow { 0%,100% { transform: translate(-50%, 0) scale(1); } 50% { transform: translate(-50%, 0) scale(1.04); } }
      `}</style>

      {/* Header */}
      <div style={{ textAlign: "center", paddingTop: 10, marginBottom: 0 }}>
        <h1 style={{ fontFamily: "'Rye', serif", color: "#ffd700", fontSize: 26, letterSpacing: 4, textShadow: "0 2px 12px rgba(255,215,0,0.3)", margin: 0 }}>CASINO 6020</h1>
        <h2 style={{ fontFamily: "'Rye', serif", color: "rgba(255,215,0,0.45)", fontSize: 13, letterSpacing: 3, fontWeight: "normal", margin: "2px 0 0" }}>
          {hostPicked ? "FILL YOUR TABLE" : "CHOOSE YOUR SEAT"}
        </h2>
      </div>

      {/* Open felt area — seats curve below dealer */}
      <div style={{
        position: "relative", width: "96%", maxWidth: 960, height: 380,
        margin: "0 auto",
      }}>
        {/* Dealer chip */}
        <div style={{ position: "absolute", top: 0, left: "50%", transform: "translateX(-50%)", background: "linear-gradient(135deg, #1a3d1a, #0d2b0d)", border: "2px solid rgba(255,215,0,0.5)", borderRadius: 12, padding: "8px 32px", fontFamily: "'Rye', serif", fontSize: 16, color: "#ffd700", letterSpacing: 4, boxShadow: "0 4px 16px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,215,0,0.15), 0 0 20px rgba(255,215,0,0.08)", zIndex: 5 }}>DEALER</div>

        {/* Hint bar — below dealer, above seats */}
        <div style={{
          position: "absolute", top: 44, left: "50%", transform: "translateX(-50%)",
          width: "80%", maxWidth: 520, padding: !hostPicked ? "12px 20px" : "10px 20px",
          background: !hostPicked ? "linear-gradient(135deg, #c41e3a, #8b0000)" : "linear-gradient(180deg, rgba(0,0,0,0.4), rgba(0,0,0,0.55))",
          borderRadius: 12,
          border: !hostPicked ? "2px solid rgba(255,215,0,0.5)" : "1.5px solid rgba(255,215,0,0.15)",
          textAlign: "center", zIndex: 5,
          boxShadow: !hostPicked ? "0 4px 20px rgba(196,30,58,0.5), 0 0 12px rgba(255,215,0,0.1)" : "none",
        }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 10 }}>
            <span style={{ color: "#ffd700", fontSize: !hostPicked ? 18 : 16, animation: "arrowPulse 1.8s ease-in-out infinite" }}>&#9660;</span>
            <span style={{ color: "#ffd700", fontSize: !hostPicked ? 16 : 14, fontWeight: !hostPicked ? "bold" : "600", letterSpacing: !hostPicked ? 1 : 0.5, textShadow: "0 1px 6px rgba(255,215,0,0.25)", fontFamily: !hostPicked ? "'Rye', serif" : "inherit" }}>
              {!hostPicked ? "Pick the seat where you want to sit" : "Tap any seat to add, edit, or remove a player"}
            </span>
            <span style={{ color: "#ffd700", fontSize: !hostPicked ? 18 : 16, animation: "arrowPulse 1.8s ease-in-out infinite" }}>&#9660;</span>
          </div>
        </div>

        {/* 6 seats */}
        {[0,1,2,3,4,5].map(i => {

              style={{
                position: "absolute", left: pos.left, top: pos.top, transform: "translate(-50%, 0)",

              <div style={{ fontSize: 10, color: "rgba(255,215,0,0.4)", marginBottom: 3, letterSpacing: 2, fontFamily: "'Rye', serif" }}>SEAT {i+1}</div>
              <div style={{ position: "relative", width: 70, height: 70, margin: "0 auto 5px" }}>
                <div style={{
                  width: 70, height: 70, borderRadius: "50%",
                  border: isEmpty ? (!hostPicked ? "2px solid rgba(255,215,0,0.6)" : "2px dashed rgba(255,215,0,0.45)") : isHuman ? "3px solid #ffd700" : "3px solid #4a90d9",
                  background: isEmpty ? (!hostPicked ? "radial-gradient(circle, rgba(255,215,0,0.1), rgba(0,0,0,0.3))" : "rgba(0,0,0,0.15)") : isHuman ? "radial-gradient(circle, rgba(255,215,0,0.2), rgba(0,0,0,0.4))" : "radial-gradient(circle, rgba(74,144,217,0.15), rgba(0,0,0,0.4))",
                  display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column",
                  boxShadow: !hostPicked ? "0 0 16px rgba(255,215,0,0.15)" : isHuman ? "0 0 12px rgba(255,215,0,0.2)" : isAI ? "0 0 8px rgba(74,144,217,0.15)" : "none",
                  transition: "all 0.2s",
                }}>
                  {isEmpty && <div style={{ fontSize: 22, color: "rgba(255,255,255,0.8)", lineHeight: 1 }}>{!hostPicked ? "⭐" : "🪑"}</div>}
                  {isHuman && <div style={{ fontSize: 26, lineHeight: 1 }}>⭐</div>}
                  {isAI && <div style={{ lineHeight: 1 }}><img src={AI_ICON} alt="AI" style={{ width: 26, height: 26, borderRadius: "50%" }} /></div>}
                  {!isEmpty && <div style={{ fontSize: 8, color: isHuman ? "#ffd700" : "#8fc9ff", fontWeight: "bold", letterSpacing: 1, marginTop: 2 }}>{isHuman ? (seat.isHost ? "YOU" : "PLAYER") : "AI"}</div>}
                </div>
              </div>
              <div style={{ fontSize: 13, color: isEmpty ? "rgba(255,215,0,0.7)" : isHuman ? "#ffd700" : "rgba(255,255,255,0.6)", fontWeight: isHuman ? "bold" : "normal", minHeight: 16 }}>
                {isEmpty ? (!hostPicked ? "Sit Here" : "Tap to Add") : isHuman ? (seat.name || "Player") : AI_NAMES[i % AI_NAMES.length]}
              </div>
            </div>
          );
        })}

        {/* 6 seats — explicit symmetric positions */}
        {[0,1,2,3,4,5].map(i => {

          const pos = seatPositions[i];
          const isHuman = seat.type === "human";
          const isAI = seat.type === "ai";
          const isEmpty = seat.type === "empty";
          const isSelected = selectedSeat === i;

          return (

              style={{ position: "absolute", left: pos.left, top: pos.top, transform: "translate(-50%, 0)", textAlign: "center", width: 120, zIndex: 4, cursor: "pointer" }}>
              {/* Seat label */}

                {/* Crown badge — top-right of circle */}
                {seat.isHost && isHuman && (
                  <div style={{
                    position: "absolute", top: -6, right: -6, zIndex: 6,

                    background: "linear-gradient(135deg, #ffd700, #ff8f00)",
                    border: "2px solid #fff", display: "flex", alignItems: "center", justifyContent: "center",

                  width: 70, height: 70, borderRadius: "50%",
                  border: isEmpty ? "2px dashed rgba(255,215,0,0.45)" : isHuman ? (seat.isHost ? "3px solid #ffd700" : "3px solid #b8860b") : "3px solid #4a90d9",
                  background: isEmpty ? "rgba(0,0,0,0.15)" : isHuman ? "radial-gradient(circle, rgba(255,215,0,0.2), rgba(0,0,0,0.4))" : "radial-gradient(circle, rgba(74,144,217,0.15), rgba(0,0,0,0.4))",
                  display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column",
                  boxShadow: isSelected ? "0 0 24px rgba(255,215,0,0.5), inset 0 0 12px rgba(255,215,0,0.2)" : seat.isHost && isHuman ? "0 0 16px rgba(255,215,0,0.35)" : isHuman ? "0 0 12px rgba(255,215,0,0.2)" : isAI ? "0 0 8px rgba(74,144,217,0.15)" : "none",
                  transition: "all 0.2s",
                }}>
                  {isEmpty && <div style={{ fontSize: 22, color: "rgba(255,255,255,0.8)", lineHeight: 1 }}>🪑</div>}
                  {isHuman && <div style={{ fontSize: 26, lineHeight: 1 }}>⭐</div>}
                  {isAI && <div style={{ lineHeight: 1 }}><img src={AI_ICON} alt="AI" style={{ width: 26, height: 26, borderRadius: "50%" }} /></div>}
                  {!isEmpty && <div style={{ fontSize: 8, color: isHuman ? "#ffd700" : "#8fc9ff", fontWeight: "bold", letterSpacing: 1, marginTop: 2 }}>{seat.isHost && isHuman ? "HOST" : isHuman ? "PLAYER" : "AI"}</div>}
                </div>
              </div>
              {/* Name below circle */}
              <div style={{ fontSize: 13, color: isEmpty ? "rgba(255,215,0,0.7)" : isHuman ? "#ffd700" : "rgba(255,255,255,0.6)", fontWeight: isHuman ? "bold" : "normal", marginBottom: 5, minHeight: 16 }}>
                {isEmpty ? "Tap to Add" : isHuman ? (seat.name || (seat.isHost ? "Host" : "Player")) : AI_NAMES[i % AI_NAMES.length]}
              </div>
              {/* Labeled toggle buttons */}
              <div style={{ display: "flex", gap: 3, justifyContent: "center" }}>
                {[
                  { type: "human", label: "Player", color: "#ffd700", bg: "rgba(255,215,0,0.18)", borderC: "rgba(255,215,0,0.6)" },
                  { type: "ai", label: "AI", color: "#8fc9ff", bg: "rgba(74,144,217,0.18)", borderC: "rgba(74,144,217,0.6)" },
                  { type: "empty", label: "Empty", color: "#999", bg: "rgba(255,255,255,0.05)", borderC: "rgba(255,255,255,0.25)" },
                ].map(opt => {
                  const active = seat.type === opt.type;
                  return (
                    <button key={opt.type} onClick={(e) => { e.stopPropagation(); setSeatType(i, opt.type); }} style={{
                      padding: "4px 8px", borderRadius: 5, fontSize: 11, fontWeight: active ? "bold" : "normal", cursor: "pointer",
                      border: `1.5px solid ${active ? opt.borderC : "rgba(255,255,255,0.35)"}`,
                      background: active ? opt.bg : "rgba(0,0,0,0.25)",
                      color: active ? opt.color : "rgba(255,255,255,0.65)",
                      transition: "all 0.15s", letterSpacing: 0.3, lineHeight: 1.3,
                    }}>
                      {opt.label}
                    </button>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>

      {/* Summary + action buttons */}
      <div style={{ textAlign: "center", marginTop: 6, marginBottom: 14 }}>
        <div style={{ fontSize: 12, color: "rgba(255,215,0,0.35)", fontFamily: "'Rye', serif", letterSpacing: 1, marginBottom: 12 }}>
          {hostPicked ? (filledCount + " of 6 seats \u2014 " + humanCount + " player" + (humanCount !== 1 ? "s" : "") + ", " + aiCount + " AI") : "Step 1: Choose your seat"}
        </div>
        <div style={{ display: "flex", gap: 14, justifyContent: "center", flexWrap: "wrap" }}>
          {hostPicked && (
            <button onClick={handleDeal}
              style={{
                padding: "14px 56px", borderRadius: 12, fontSize: 18, fontWeight: "bold",
                fontFamily: "'Rye', serif", letterSpacing: 3, cursor: canDeal ? "pointer" : "not-allowed",
                background: canDeal ? "linear-gradient(135deg, #c41e3a, #8b0000)" : "rgba(255,255,255,0.08)",
                color: canDeal ? "#ffd700" : "rgba(255,255,255,0.2)",
                border: canDeal ? "2px solid rgba(255,215,0,0.4)" : "1px solid rgba(255,255,255,0.1)",
                boxShadow: canDeal ? "0 4px 20px rgba(196,30,58,0.4), 0 0 12px rgba(255,215,0,0.1)" : "none",
                opacity: canDeal ? 1 : 0.5,
              }}>DEAL CARDS</button>
          )}
          <button onClick={onBack} style={{
            padding: "14px 28px", borderRadius: 12, fontSize: 13, fontWeight: "bold",
            border: "1.5px solid rgba(255,255,255,0.15)", background: "rgba(0,0,0,0.4)",
            color: "rgba(255,255,255,0.5)", cursor: "pointer", letterSpacing: 1,
          }}>Back to Settings</button>
        </div>
      </div>

      {/* ═══ POPUP OVERLAY ═══ */}
      {popup && (
        <div onClick={() => setPopup(null)} style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.7)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100 }}>
          <div onClick={e => e.stopPropagation()} style={{
            background: "radial-gradient(ellipse at 50% 30%, #1a5c1a 0%, #0e3d0e 50%, #071a07 100%)",
            borderRadius: 20, padding: "28px 32px", minWidth: 320, maxWidth: 420, width: "90%",
            border: "2px solid rgba(255,215,0,0.35)", textAlign: "center",
            boxShadow: "0 0 40px rgba(255,215,0,0.08), 0 12px 40px rgba(0,0,0,0.6)",
          }}>
            <div style={{ fontFamily: "'Rye', serif", color: "#ffd700", fontSize: 18, letterSpacing: 3, marginBottom: 4, textShadow: "0 2px 8px rgba(255,215,0,0.25)" }}>SEAT {popup.seatIdx + 1}</div>

            {/* MODE: hostSetup — the host's name + buy-in (first step, sets table default) */}
            {popup.mode === "hostSetup" && (() => {
              const seat = config[popup.seatIdx];
              return (
                <div>
                  <div style={{ color: "rgba(255,215,0,0.6)", fontSize: 14, marginBottom: 16 }}>Your seat — set your name and the table buy-in</div>
                  <div style={{ marginBottom: 14 }}>
                    <div style={{ fontSize: 12, color: "#ffd700", marginBottom: 6, letterSpacing: 1.5, fontWeight: "bold" }}>YOUR NICKNAME</div>
                    <input type="text" maxLength={16} placeholder="Pick any name..."
                      value={seat.name}
                      onChange={e => updateSeatField(popup.seatIdx, "name", e.target.value.slice(0, 16))}
                      style={{
                        padding: "11px 16px", borderRadius: 10, width: "100%", maxWidth: 260,
                        border: "2px solid rgba(255,215,0,0.4)", background: "rgba(0,0,0,0.55)",
                        color: "#fff", fontSize: 18, fontWeight: "bold", outline: "none",
                        letterSpacing: 1, textAlign: "center",
                        boxShadow: "inset 0 2px 4px rgba(0,0,0,0.3)",
                      }} />
                  </div>
                  <div style={{ marginBottom: 14 }}>
                    <div style={{ fontSize: 12, color: "#ffd700", marginBottom: 6, letterSpacing: 1.5, fontWeight: "bold" }}>TABLE BUY-IN</div>
                    <div style={{ fontSize: 10, color: "rgba(255,255,255,0.35)", marginBottom: 8, fontStyle: "italic" }}>This sets the buy-in for you and all AI players</div>
                    {buyInSection(popup.seatIdx)}
                  </div>
                  <button onClick={() => setPopup(null)} style={{
                    padding: "14px 48px", borderRadius: 10, fontSize: 16, fontWeight: "bold", cursor: "pointer",
                    border: "2px solid rgba(196,30,58,0.6)", background: "linear-gradient(135deg, #c41e3a, #8b0000)",
                    color: "#ffd700", letterSpacing: 2, fontFamily: "'Rye', serif",
                    boxShadow: "0 4px 16px rgba(196,30,58,0.4), 0 0 8px rgba(255,215,0,0.1)",
                  }}>TAKE YOUR SEAT</button>
                </div>
              );
            })()}

            {/* MODE: choose — empty seat, pick Player or AI */}
            {popup.mode === "choose" && (
              <div>
                <div style={{ color: "rgba(255,215,0,0.6)", fontSize: 14, marginBottom: 20 }}>Who takes this seat?</div>
                <div style={{ display: "flex", gap: 14, justifyContent: "center", flexWrap: "wrap" }}>
                  <button onClick={() => { setSeatType(popup.seatIdx, "human"); setPopup({ seatIdx: popup.seatIdx, mode: "playerSetup" }); }}
                    style={popupBtnStyle("#ffd700", "linear-gradient(135deg, rgba(255,215,0,0.15), rgba(0,0,0,0.3))", "rgba(255,215,0,0.5)")}>
                    <div style={{ fontSize: 28, marginBottom: 4 }}>⭐</div>Player
                  </button>
                  <button onClick={() => { setSeatType(popup.seatIdx, "ai"); setPopup(null); }}
                    style={popupBtnStyle("#8fc9ff", "linear-gradient(135deg, rgba(74,144,217,0.15), rgba(0,0,0,0.3))", "rgba(74,144,217,0.5)")}>
                    <div style={{ marginBottom: 4 }}><img src={AI_ICON} alt="AI" style={{ width: 28, height: 28, borderRadius: "50%" }} /></div>AI
                  </button>
                </div>
                <button onClick={() => setPopup(null)} style={{ marginTop: 18, padding: "8px 24px", borderRadius: 8, border: "1px solid rgba(255,255,255,0.15)", background: "transparent", color: "rgba(255,255,255,0.4)", cursor: "pointer", fontSize: 13 }}>Cancel</button>
              </div>
            )}

            {/* MODE: playerSetup — name and buy-in for a non-host human player */}
            {popup.mode === "playerSetup" && (() => {
              const seat = config[popup.seatIdx];
              return (
                <div>
                  <div style={{ color: "rgba(255,215,0,0.6)", fontSize: 14, marginBottom: 16 }}>Set up this player</div>
                  <div style={{ marginBottom: 14 }}>
                    <div style={{ fontSize: 12, color: "#ffd700", marginBottom: 6, letterSpacing: 1.5, fontWeight: "bold" }}>NICKNAME</div>
                    <input type="text" maxLength={16} placeholder="Pick any name..."
                      value={seat.name}
                      onChange={e => updateSeatField(popup.seatIdx, "name", e.target.value.slice(0, 16))}
                      style={{
                        padding: "11px 16px", borderRadius: 10, width: "100%", maxWidth: 260,
                        border: "2px solid rgba(255,215,0,0.4)", background: "rgba(0,0,0,0.55)",
                        color: "#fff", fontSize: 18, fontWeight: "bold", outline: "none",
                        letterSpacing: 1, textAlign: "center",
                        boxShadow: "inset 0 2px 4px rgba(0,0,0,0.3)",
                      }} />
                    <div style={{ fontSize: 10, color: "rgba(255,255,255,0.25)", marginTop: 4, fontStyle: "italic" }}>No personal info needed — pick any name</div>
                  </div>
                  <div style={{ marginBottom: 14 }}>
                    <div style={{ fontSize: 12, color: "#ffd700", marginBottom: 6, letterSpacing: 1.5, fontWeight: "bold" }}>BUY-IN</div>
                    <div style={{ fontSize: 10, color: "rgba(255,255,255,0.35)", marginBottom: 8, fontStyle: "italic" }}>Same as table default, or set a custom amount</div>
                    {buyInSection(popup.seatIdx)}
                  </div>
                  <div style={{ display: "flex", gap: 12, justifyContent: "center" }}>
                    <button onClick={() => setPopup(null)} style={{
                      padding: "12px 36px", borderRadius: 10, fontSize: 15, fontWeight: "bold", cursor: "pointer",
                      border: "2px solid rgba(196,30,58,0.6)", background: "linear-gradient(135deg, #c41e3a, #8b0000)",
                      color: "#ffd700", letterSpacing: 1, boxShadow: "0 3px 12px rgba(196,30,58,0.3)",
                    }}>Take Your Seat</button>
                    <button onClick={() => removeSeat(popup.seatIdx)} style={{
                      padding: "12px 24px", borderRadius: 10, fontSize: 13, fontWeight: "bold", cursor: "pointer",
                      border: "1.5px solid rgba(255,255,255,0.15)", background: "rgba(0,0,0,0.4)",
                      color: "rgba(255,255,255,0.4)", letterSpacing: 0.5,
                    }}>Remove</button>
                  </div>
                </div>
              );
            })()}

            {/* MODE: edit — occupied seat options */}
            {popup.mode === "edit" && (() => {
              const seat = config[popup.seatIdx];
              const isHuman = seat.type === "human";
              const isAI = seat.type === "ai";
              const seatName = isHuman ? (seat.name || "Player") : AI_NAMES[popup.seatIdx % AI_NAMES.length];
              return (
                <div>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, marginBottom: 16 }}>
                    <span style={{ fontSize: 24 }}>{isHuman ? "⭐" : <img src={AI_ICON} alt="AI" style={{ width: 24, height: 24, borderRadius: "50%", verticalAlign: "middle" }} />}</span>
                    <span style={{ color: isHuman ? "#ffd700" : "#8fc9ff", fontSize: 18, fontWeight: "bold" }}>{seatName}</span>
                    <span style={{ color: "rgba(255,255,255,0.35)", fontSize: 13 }}>({isHuman ? (seat.isHost ? "You" : "Player") : "AI"})</span>
                  </div>
                  <div style={{ display: "flex", gap: 12, justifyContent: "center", flexWrap: "wrap" }}>
                    {isHuman && (
                      <button onClick={() => setPopup({ seatIdx: popup.seatIdx, mode: seat.isHost ? "hostSetup" : "playerSetup" })}
                        style={popupBtnStyle("#ffd700", "linear-gradient(135deg, rgba(255,215,0,0.15), rgba(0,0,0,0.3))", "rgba(255,215,0,0.4)")}>
                        Edit
                      </button>
                    )}
                    <button onClick={() => removeSeat(popup.seatIdx)}
                      style={popupBtnStyle("#ff6e40", "linear-gradient(135deg, rgba(196,30,58,0.2), rgba(0,0,0,0.3))", "rgba(196,30,58,0.5)")}>
                      Remove
                    </button>
                    {isAI && (
                      <button onClick={() => { setSeatType(popup.seatIdx, "human"); setPopup({ seatIdx: popup.seatIdx, mode: "playerSetup" }); }}
                        style={popupBtnStyle("#ffd700", "linear-gradient(135deg, rgba(255,215,0,0.1), rgba(0,0,0,0.3))", "rgba(255,215,0,0.3)")}>
                        Switch to Player
                      </button>
                    )}
                    {isHuman && !seat.isHost && (
                      <button onClick={() => { setSeatType(popup.seatIdx, "ai"); setPopup(null); }}
                        style={popupBtnStyle("#8fc9ff", "linear-gradient(135deg, rgba(74,144,217,0.1), rgba(0,0,0,0.3))", "rgba(74,144,217,0.3)")}>
                        Switch to AI
                      </button>
                    )}
                  </div>
                  <button onClick={() => setPopup(null)} style={{ marginTop: 18, padding: "8px 24px", borderRadius: 8, border: "1px solid rgba(255,255,255,0.15)", background: "transparent", color: "rgba(255,255,255,0.4)", cursor: "pointer", fontSize: 13 }}>Cancel</button>
                </div>
              );
            })()}
          </div>
        </div>
      )}
    </div>
  );
}

// ===================== MAIN APP =====================
const DEFAULT_SEAT_CONFIG = [
  { type: "human", name: "", buyIn: 0, isHost: true },
  { type: "empty", name: "", buyIn: 0, isHost: false },
  { type: "empty", name: "", buyIn: 0, isHost: false },
  { type: "empty", name: "", buyIn: 0, isHost: false },
  { type: "empty", name: "", buyIn: 0, isHost: false },
  { type: "empty", name: "", buyIn: 0, isHost: false },
];
function App({ onExitToLobby } = {}) {
  const [screen, setScreen] = useState("settings");
  const [settings, setSettings] = useState(DEFAULT_SETTINGS);
  const exitGame = useCallback(() => {
    // Reset seat config to host-only defaults when leaving a game
    setSettings(prev => ({ ...prev, seatConfig: DEFAULT_SEAT_CONFIG.map(s => ({ ...s })) }));
    setScreen("settings");
  }, []);
  if (screen === "settings") return <SettingsScreen settings={settings} onUpdate={setSettings} onStart={() => setScreen("game")} onChooseSeats={() => setScreen("seats")} onDataCenter={() => setScreen("data")} onExitToLobby={onExitToLobby} />;
  if (screen === "seats") return <SeatPickerScreen settings={settings} onUpdate={setSettings} onDeal={() => setScreen("game")} onBack={() => setScreen("settings")} />;
  if (screen === "data") return <DataCenter onBack={() => setScreen("settings")} />;
  return <GameTable settings={settings} onBack={exitGame} />;
}




ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script></body></html>
